<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
    Global (operation-level) form error field.

    Every data-entry form includes the `form-error` slot once, near the top of
    the form. It is filled three ways:
    - a full render with the standardized `error` model key (single
      operation-level message, see the htmx-form skill) shows it directly;
    - handlers report handled failures with the HTMX DSL's
      `globalFormError(errorId, message)` — an OOB swap of the
      `form-error-oob` fragment below plus a real 4xx/5xx status;
    - the client safety net in app-shell.js fills it for unhandled 4xx/5xx.
    The slot is cleared automatically when the form issues its next HTMX
    request (app-shell.js).
    -->

    <!-- The slot: include once per form with a page-unique id. -->
    <div th:fragment="form-error(id)"
         th:id="${id}"
         class="alert alert-error form-global-error"
         data-form-error
         role="alert"
         th:hidden="${error == null || #strings.isEmpty(error)}"
         th:text="${error}"></div>

    <!-- OOB variant: replaces the slot in shaped error responses (globalFormError). -->
    <div th:fragment="form-error-oob(id, message)"
         th:id="${id}"
         class="alert alert-error form-global-error"
         data-form-error
         role="alert"
         hx-swap-oob="outerHTML"
         th:text="${message}"></div>

    <!--
    Per-FIELD inline error span (the upload family's error track).

    Unlike the global slot above, this is one span per field, addressed by a
    page-unique id so a handler can OOB-swap JUST the messages while leaving the
    form body untouched. That is what the multipart uploads (font, image) need:
    a browser cannot repopulate <input type=file> (and font face-rows have no
    hydration), so their error path must never re-render the form body. The
    handler renders every field's span each time (empty where resolved, so a
    fixed error clears) via the HTMX DSL's `dialogFieldErrorsOob`.

    Used two ways off the SAME id:
      - inside the form, oob=false → a plain inline span (empty on first render);
      - in the error response, oob=true → the same span carrying hx-swap-oob, so
        it replaces the in-form one in place.

    The message itself is styled red by the shared `.form-error` rule (forms.css).
    Unlike the re-rendering forms, the upload group is never re-rendered, so it
    carries no `.form-group.error` class and the input keeps its normal border —
    the inline red message is the error affordance. No `data-form-error` here:
    that marks the GLOBAL slot the 5xx client safety net writes into; per-field
    spans must not intercept it.
    -->
    <span th:fragment="field-error(id, message, oob)"
          th:id="${id}"
          class="form-error"
          th:attr="hx-swap-oob=${oob} ? 'outerHTML' : null"
          th:text="${message}"></span>
</body>
</html>
