<html xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="page-header"
         th:with="
            pageDescription=${pageDescription} ?: null,
            backLinkHref=${backLinkHref} ?: null,
            backLinkLabel=${backLinkLabel} ?: null,
            searchPlaceholder=${searchPlaceholder} ?: 'Search...',
            searchUrl=${searchUrl} ?: null,
            searchTargetId=${searchTargetId} ?: null,
            actions=${actions} ?: null,
            stage=${stage} ?: null
         "
         class="page-header">

        <div class="content">
            <a th:if="${backLinkHref != null and backLinkLabel != null}"
               th:href="${backLinkHref}"
               class="back-link">
                <th:block th:replace="~{epistola-web/icon :: icon(name='arrow-left', class='ep-icon ep-icon-sm')}" />
                <span th:text="${backLinkLabel}"></span>
            </a>
            <h1 data-testid="page-title">
                <span th:text="${pageTitle}"></span>
                <span th:if="${stage != null and stage.badgeClass != null}"
                      th:class="${'badge ' + stage.badgeClass}"
                      th:text="${stage.label}">Beta</span>
            </h1>
            <p th:if="${!#strings.isEmpty(pageDescription)}" th:text="${pageDescription}"></p>
        </div>

        <div th:if="${searchUrl != null or actions != null}" class="page-actions">
            <th:block th:if="${searchUrl != null}">
                <th:block th:replace="~{fragments/search :: search-box(
                    placeholder=${searchPlaceholder},
                    searchUrl=${searchUrl},
                    targetId=${searchTargetId}
                )}"></th:block>
            </th:block>

            <th:block th:if="${actions != null}">
                <th:block th:replace="${actions}"></th:block>
            </th:block>
        </div>

    </div>

</body>
</html>
