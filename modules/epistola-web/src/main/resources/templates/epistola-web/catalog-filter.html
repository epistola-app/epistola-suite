<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    Shared "filter by catalog" <select> for list pages. A plain form field (name="catalog")
    serialized by the enclosing list form; the empty value is the "All catalogs" sentinel the
    handler maps back to "no filter". Renders nothing when the tenant has no catalogs.

    Parameters:
    - catalogs:        the tenant's catalogs (each exposing .id + .name); null/empty → nothing
    - selectedCatalog: the active catalog id ('' = All catalogs)
-->
<body>
<div th:fragment="catalog-filter(catalogs, selectedCatalog)"
     th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
    <select name="catalog" class="ep-select" data-testid="catalog-filter"
            aria-label="Filter by catalog" style="max-width: 300px;">
        <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
        <option th:each="cat : ${catalogs}"
                th:value="${cat.id}"
                th:text="${cat.name}"
                th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
    </select>
</div>
</body>
</html>
