<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div class="ep-dialog-header">
            <h2>Submit Feedback</h2>
            <button type="button" class="ep-btn ep-btn-ghost ep-btn-icon" data-close-dialog>
                <th:block th:replace="~{epistola-web/icon :: icon(name='x', class='ep-icon')}" />
            </button>
        </div>

        <!-- data-feedback-form: feedback.js wires auto-capture + screenshots on htmx:load. -->
        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback(tenantId=${tenantId})}"
              hx-target="closest .feedback-dialog-content"
              hx-swap="innerHTML"
              data-feedback-form
              th:attr="data-app-version=${appVersion}">
            <div th:replace="~{epistola-web/form-error :: form-error(id='submit-feedback-error')}"></div>

            <div class="ep-dialog-body ep-stack ep-gap-4">
                <div class="form-group" th:classappend="${errors?.containsKey('title')} ? 'error' : ''">
                    <label class="ep-label" for="fb-title">Title</label>
                    <input type="text" id="fb-title" name="title" class="ep-input"
                           required placeholder="Brief summary of the issue"
                           th:value="${formData?.title}">
                    <span class="form-error" th:if="${errors?.containsKey('title')}" th:text="${errors.title}"></span>
                </div>

                <div class="ep-row ep-gap-3">
                    <div class="form-group" style="flex: 1;" th:classappend="${errors?.containsKey('category')} ? 'error' : ''">
                        <label class="ep-label" for="fb-category">Category</label>
                        <select id="fb-category" name="category" class="ep-select" required>
                            <option value="" disabled selected>Select...</option>
                            <option th:each="c : ${categories}" th:value="${c.name()}"
                                    th:text="${c.name()}"
                                    th:selected="${formData?.category == c.name()}">CATEGORY</option>
                        </select>
                        <span class="form-error" th:if="${errors?.containsKey('category')}" th:text="${errors.category}"></span>
                    </div>

                    <div class="form-group" style="flex: 1;" th:classappend="${errors?.containsKey('priority')} ? 'error' : ''">
                        <label class="ep-label" for="fb-priority">Priority</label>
                        <select id="fb-priority" name="priority" class="ep-select" required>
                            <option th:each="p : ${priorities}" th:value="${p.name()}"
                                    th:text="${p.name()}"
                                    th:selected="${formData?.priority == p.name() || (formData == null && p.name() == 'MEDIUM')}">PRIORITY</option>
                        </select>
                        <span class="form-error" th:if="${errors?.containsKey('priority')}" th:text="${errors.priority}"></span>
                    </div>
                </div>

                <div class="form-group" th:classappend="${errors?.containsKey('description')} ? 'error' : ''">
                    <label class="ep-label" for="fb-description">Description</label>
                    <textarea id="fb-description" name="description" class="ep-textarea"
                              required rows="5"
                              placeholder="Describe the issue in detail..."
                              th:text="${formData?.description}"></textarea>
                    <span class="form-error" th:if="${errors?.containsKey('description')}" th:text="${errors.description}"></span>
                </div>

                <!-- Screenshot capture -->
                <div class="form-group">
                    <label class="ep-label">Screenshot (optional)</label>
                    <div id="fb-screenshot-actions" class="ep-row">
                        <button type="button" id="fb-capture-region" class="ep-btn ep-btn-outline ep-btn-sm">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='scan', class='ep-icon')}" />
                            Capture Region
                        </button>
                        <button type="button" id="fb-capture-viewport" class="ep-btn ep-btn-outline ep-btn-sm">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='monitor', class='ep-icon')}" />
                            Capture Visible
                        </button>
                    </div>
                    <div id="fb-screenshot-unsupported" style="display: none; color: var(--ep-muted-foreground); font-size: var(--ep-text-sm);">
                        Screenshot capture is not supported in this browser.
                    </div>
                    <div id="fb-screenshot-error" style="display: none; margin-top: var(--ep-space-1); color: var(--ep-destructive, #dc2626); font-size: var(--ep-text-sm);"></div>
                    <div id="fb-screenshot-preview" style="display: none; margin-top: var(--ep-space-2); width: 100%; max-height: 200px;">
                        <img id="fb-screenshot-img" style="max-width: 100%; max-height: 180px; border-radius: var(--ep-radius);" alt="Screenshot preview">
                        <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm" id="fb-screenshot-remove"
                                style="margin-top: var(--ep-space-1);">Remove</button>
                    </div>
                </div>

                <!-- Auto-captured fields (hidden) -->
                <input type="hidden" name="sourceUrl" id="fb-sourceUrl">
                <input type="hidden" name="consoleLogs" id="fb-consoleLogs">
                <input type="hidden" name="metadata" id="fb-metadata">
                <input type="hidden" name="screenshotData" id="fb-screenshotData">
            </div>

            <div class="ep-dialog-footer">
                <button type="button" class="ep-btn ep-btn-outline" data-close-dialog>Cancel</button>
                <button type="submit" class="ep-btn ep-btn-primary">Submit Feedback</button>
            </div>
        </form>

        <script type="module" th:src="@{/feedback/feedback.js}"></script>
    </th:block>
</body>
</html>
