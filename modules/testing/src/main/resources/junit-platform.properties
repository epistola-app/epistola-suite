junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
# Fail discovery on WARNING-severity issues instead of silently skipping tests.
# A Kotlin expression-body @Test returning a value (e.g. ending in an AssertJ
# chain) is only a WARNING by default — JUnit logs it and never runs the test.
junit.platform.discovery.issue.severity.critical=warning
