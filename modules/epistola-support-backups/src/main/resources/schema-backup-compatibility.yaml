# Per-migration tenant-backup restore compatibility.
#
# A backup taken at one schema can be restored into a different schema only when every
# migration *crossed* between them is declared compatible in the relevant direction.
# A migration NOT listed here is treated as incompatible in BOTH directions (default deny).
#
#   backward: an OLDER backup may restore into a schema that HAS this migration applied
#             (the common case — restoring after an upgrade). Read live from this file by
#             the running (newer) app.
#   forward:  a NEWER backup (taken on a schema that has this migration) may restore into a
#             schema that does NOT have it (restoring after a downgrade). The flag is
#             snapshotted into the backup manifest at build time, because the older app
#             doing the restore can't see migrations newer than itself.
#
# Every `version` must be a real migration (validated against flyway_schema_history by
# SchemaBackupCompatibilityFileTest). Add an entry when a migration is safe to cross;
# leave a restore-breaking migration out (it becomes the compatibility boundary).
migrations:
  - version: "20260618204750"
    backward: true
    forward: true
    reason: "Data-only: UPDATE feature_toggles for the support-compatibility-check rename; no structural change to backed-up tables."
