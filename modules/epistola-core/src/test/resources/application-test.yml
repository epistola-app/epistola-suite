spring:
  main:
    banner-mode: off
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

epistola:
  logs:
    # Don't attach the DB log appender across the whole suite — capture/retention
    # tests opt in per-class with properties = ["epistola.logs.enabled=true"].
    enabled: false
  generation:
    polling:
      enabled: true
      interval-ms: 100
      max-concurrent-jobs: 2
