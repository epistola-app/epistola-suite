version = 1
SPDX-PackageName = "Epistola Suite"
SPDX-PackageSupplier = "Epistola Nederland B.V."
SPDX-PackageDownloadLocation = "https://github.com/epistola-app/epistola-suite"

[[annotations]]
path = [
  "LICENSE",
  "README.md",
  "CODE_OF_CONDUCT.md",
  "CONTRIBUTING.md",
  "DISCLAIMER.md",
  "SUPPORT_POLICY.md",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Epistola Nederland B.V."
SPDX-License-Identifier = "AGPL-3.0-only"

[[annotations]]
path = [
  "pnpm-lock.yaml",
  "openapitools.json",
  "package.json",
  ".claude/settings.json",
  ".mcp.json",
  ".oxfmtrc.json",
  ".oxlintrc.json",
  ".github/badges/*.json",
  ".husky/package.json",
  "renovate.json",
  "modules/*/package.json",
  "modules/editor/tsconfig*.json",
  "scripts/gh-mcp/package.json",
]
precedence = "override"
SPDX-FileCopyrightText = "Epistola Nederland B.V."
SPDX-License-Identifier = "AGPL-3.0-only"

[[annotations]]
path = [
  "apps/epistola/docker/keycloak/realm-export.json",
  "charts/*/templates/*.tpl",
  "charts/epistola/values.schema.json",
  "modules/epistola-core/src/main/resources/epistola/catalogs/**/*.json",
  "modules/epistola-core/src/main/resources/schemas/*.json",
  "modules/epistola-core/src/test/resources/**/*.json",
  "modules/generation/src/test/resources/**/*.json",
]
precedence = "override"
SPDX-FileCopyrightText = "Epistola Nederland B.V."
SPDX-License-Identifier = "AGPL-3.0-only"

[[annotations]]
path = [
  "apps/epistola/src/main/resources/banner.txt",
  "charts/epistola/templates/NOTES.txt",
  "docs/adr/*.md",
  "modules/generation/src/test/resources/baselines/*.txt",
  "modules/testing/src/main/resources/META-INF/services/*",
]
precedence = "override"
SPDX-FileCopyrightText = "Epistola Nederland B.V."
SPDX-License-Identifier = "AGPL-3.0-only"

[[annotations]]
path = "org/springframework/boot/flyway/autoconfigure/FlywayProperties.java"
precedence = "override"
SPDX-FileCopyrightText = "2012-present the original author or authors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "modules/epistola-core/src/main/resources/epistola/fonts/inter/**"
precedence = "override"
SPDX-FileCopyrightText = "2020 The Inter Project Authors (https://github.com/rsms/inter)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "modules/epistola-core/src/main/resources/epistola/fonts/jetbrains-mono/**"
precedence = "override"
SPDX-FileCopyrightText = "2020 The JetBrains Mono Project Authors (https://github.com/JetBrains/JetBrainsMono)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "modules/epistola-core/src/main/resources/epistola/fonts/lato/**"
precedence = "override"
SPDX-FileCopyrightText = "2010-2014 tyPoland Lukasz Dziedzic (team@latofonts.com)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "modules/epistola-core/src/main/resources/epistola/fonts/lora/**"
precedence = "override"
SPDX-FileCopyrightText = "2011 The Lora Project Authors (https://github.com/cyrealtype/Lora-Cyrillic)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "modules/epistola-core/src/main/resources/epistola/fonts/merriweather/**"
precedence = "override"
SPDX-FileCopyrightText = "2020 The Merriweather Project Authors (https://github.com/EbenSorkin/Merriweather4)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "modules/epistola-core/src/main/resources/epistola/fonts/roboto/**"
precedence = "override"
SPDX-FileCopyrightText = "2011 The Roboto Project Authors (https://github.com/googlefonts/roboto-classic)"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
