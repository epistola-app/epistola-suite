apiVersion: v2
name: epistola-observability
description: >-
  Grafana dashboards and alerts for Epistola Suite, as grafana-operator custom
  resources. Install alongside the epistola chart on clusters that run
  grafana-operator. Separate from the app chart so the app never depends on
  grafana-operator.
type: application
# Source of truth for releases — bump this in a PR and CI publishes it on merge.
version: 0.1.0
# appVersion is synced to the latest app tag at publish time by CI.
appVersion: "latest"
home: https://github.com/epistola-app/epistola-suite
sources:
  - https://github.com/epistola-app/epistola-suite
