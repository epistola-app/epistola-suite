# Default values for epistola.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/epistola-app/epistola-suite
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials? Off by default — the
  # app does not call the Kubernetes API, so it needs no token. Set true only if
  # you add something that does.
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: epistola.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: epistola-tls
  #    hosts:
  #      - epistola.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Liveness and readiness probes. These hit the MAIN application port (http)
# at /livez and /readyz — the add-additional-paths probe endpoints — NOT the
# actuator health endpoints, which move to a separate, cluster-internal
# management port in production (and a probe against that port could pass while
# the main app is broken).
startupProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30
  timeoutSeconds: 3

livenessProbe:
  httpGet:
    path: /livez
    port: http
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
# Note: tmp-dir is required for readOnlyRootFilesystem since Java needs a writable /tmp
volumes:
  - name: tmp-dir
    emptyDir: {}

# Additional volumeMounts on the output Deployment definition.
# Note: /tmp mount is required for readOnlyRootFilesystem since Java needs a writable /tmp
volumeMounts:
  - name: tmp-dir
    mountPath: /tmp

nodeSelector: {}

tolerations: []

affinity: {}

# JVM configuration
jvm:
  # JAVA_TOOL_OPTIONS passed to the JVM
  options: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"

# Additional trusted root CA certificates for OUTBOUND TLS — e.g. an internal
# Keycloak, a private catalog server, the epistola-hub, or a corporate
# TLS-inspecting egress proxy that re-signs traffic with its own root CA.
#
# Certs are delivered to the app as a Paketo `ca-certificates` service binding;
# the buildpack launch helper merges them into the JVM truststore at startup,
# ALONGSIDE the public CA bundle (nothing is replaced, so public-internet HTTPS
# keeps working). No init container, and compatible with the hardened pod
# (non-root, readOnlyRootFilesystem).
extraCaCerts:
  enabled: false
  # Use a pre-existing Secret whose keys are PEM files (one cert each); the key
  # name is cosmetic. Takes precedence over `certs` below. Leave blank to have
  # the chart render a Secret from `certs`.
  existingSecret: ""
  # Inline PEM certificates; the chart renders them into a Secret. One cert per
  # key; the key name is cosmetic (it becomes the cert's filename in the binding).
  certs: {}
  #   corp-root-ca.crt: |
  #     -----BEGIN CERTIFICATE-----
  #     ...
  #     -----END CERTIFICATE-----

# Observability configuration
observability:
  # OpenTelemetry exporter endpoint (e.g., http://otel-collector:4318)
  otlpEndpoint: ""
  # Bring-your-own OpenTelemetry agent friendliness. Enable when you attach the
  # OTel Java agent (e.g. via jvm.options) so it inherits a stable identity
  # consistent with the app's own NodeIdentity and metric tags. Purely for the
  # customer's own telemetry pipeline — the app's Micrometer OTLP export stays
  # off unless observability.otlpEndpoint is set, so the agent owns the OTLP leg
  # with no double export. The epistola-hub leg (commercial support tier) is
  # configured at runtime by the support module, NOT here.
  otelAgent:
    enabled: false
    # service.name reported to the agent.
    serviceName: epistola-suite
    # Optional service.namespace resource attribute.
    serviceNamespace: ""
    # deployment.environment resource attribute. Falls back to
    # support.installation.environment when left blank.
    deploymentEnvironment: ""
    # Extra OTEL resource attributes as key/value pairs (merged in).
    resourceAttributes: {}
  # Prometheus scrape annotations on pods.
  prometheus:
    enabled: false
    # Scrape port. Blank → derived from config.profiles: the actuator serves on
    # the management port 4040 under the `prod` profile, else on the main port
    # 4000. Set explicitly to override (e.g. a non-standard management port).
    port: ""
    path: /actuator/prometheus
  # Grafana dashboards + alerts have moved to the separate `epistola-observability`
  # chart (they are grafana-operator CRs and shouldn't couple this chart to the
  # operator). Install that chart alongside this one on clusters running
  # grafana-operator. This chart still emits the Prometheus scrape annotations
  # (observability.prometheus) and OTel agent env (observability.otelAgent) above.

# Credential encryption at rest (catalog/code-list auth, hub credentials).
# AES-256-GCM with key-id-tagged envelopes. See docs/encryption.md.
#
# REQUIRED in production: the app's `prod` profile fails to start if encryption
# is enabled but no key is configured. Generate a key with:
#   openssl rand -base64 32
# and store it in a Kubernetes Secret, then reference it below.
encryption:
  # Enabled by default (fail-closed). Opt out with `enabled: false`.
  enabled: true
  # Key id used for all NEW encryptions. Must match one of the `keys[].id` below.
  primaryKeyId: ""
  # The keyset. All listed keys are available for decryption (this is how
  # rotation works: add a new key, point primaryKeyId at it, re-encrypt, then
  # remove the old key). Each entry's 32-byte base64 material is sourced ONLY
  # from a Kubernetes Secret — inline material is not supported, so key material
  # never lands in values.yaml, the pod spec, or the Helm release:
  #   keys:
  #     - id: k1
  #       existingSecret: epistola-encryption   # Secret name (required)
  #       secretKey: k1                          # key within the Secret (defaults to id)
  keys: []

# OIDC login configuration (optional, requires config.profiles to include "keycloak")
oidc:
  enabled: false
  # Client ID used for browser login and resource-server validation.
  clientId: epistola-suite
  # Name of an existing Kubernetes Secret holding the OIDC client secret.
  # Required when oidc.enabled is true — the chart never takes an inline secret.
  existingSecret: ""
  # Key within the existing secret that holds the client secret.
  secretKey: client-secret
  # Issuer URI for browser-facing OAuth2 / JWT validation.
  issuerUri: ""
  # Internal base URL for server-to-server OIDC calls (token, JWK, userinfo).
  # Use when Keycloak is reachable at a different URL from within the cluster
  # than from the browser (e.g., http://keycloak-svc/auth vs https://auth.example.com/auth).
  backchannelBaseUrl: ""
  # JWT claim name to read flat-role strings (`epg_*` / `ept_*_*` / `eps_*`) from.
  # Leave blank to use the application default (`roles`). Override when your IdP
  # emits the flat-role list under a different claim name (e.g., `app_roles`).
  # Also re-points the Keycloak `epistola-realm-roles` mapper when
  # `keycloakAdmin.ensureGroups=true`. See docs/keycloak-setup.md.
  flatRolesClaimName: ""

# Keycloak admin/provisioning configuration (optional, for group bootstrap)
keycloakAdmin:
  enabled: false
  # Explicit admin URL for the Keycloak Admin REST API.
  adminUrl: ""
  # Realm to manage.
  realm: epistola
  # Client ID used for client-credentials authentication.
  clientId: epistola-suite
  # Name of an existing Kubernetes Secret holding the admin client secret.
  # Required when keycloakAdmin.enabled is true — no inline secret is accepted.
  existingSecret: ""
  # Key within the existing secret that holds the client secret.
  secretKey: client-secret
  # Ensure base group hierarchy (/epistola/tenants, /epistola/global/*, /epistola/platform/*) exists on startup.
  ensureGroups: false

# Optional commercial support tier (epistola-hub integration).
# When enabled, the application registers itself with epistola-hub on startup
# for feedback sync, monitoring, quality checks, and version-compatibility
# services. OSS deployments leave this disabled — the support module ships in
# the image but never constructs any beans. See modules/epistola-support.
support:
  enabled: false

  # Installation identity. Required when support.enabled is true.
  # The companyName/environment combination becomes the default installation
  # name reported to the hub; override via installation.name.
  installation:
    companyName: ""
    adminEmail: ""
    environment: "" # e.g., "production", "staging"
    # Optional display name override. Blank → "{companyName} - {environment}".
    name: ""
    # Optional free-form description shown in the hub.
    description: ""

  # Forward application logs + metrics to epistola-hub over OTLP-over-gRPC.
  # On by default when support.enabled is true (like every support feature) —
  # the hub's `support-telemetry` entitlement is the real gate, so nothing is
  # shipped until the installation is entitled. Set to false to opt out. The
  # endpoint is the hub's own gRPC endpoint, derived at runtime by the support
  # module — nothing to configure here. See modules/epistola-support-telemetry.
  telemetry:
    enabled: true

  # Hub connection (only used when support.enabled is true).
  hub:
    # Override the hub discovery URL for self-hosted deployments.
    # Blank → use the SaaS default baked into the hub client.
    # Kubernetes deployments resolve the hub via `.well-known` discovery;
    # the direct host/port mode is a local-dev / debug convenience and is
    # intentionally NOT exposed here.
    discoveryUrl: ""
    # NOTE: node id is intentionally NOT a chart value. It must differ per pod,
    # but a Deployment value is identical for every replica — so it can't give
    # per-pod identity. Node identity is resolved at runtime from the pod's
    # hostname (Kubernetes sets the hostname to the pod name), so each replica
    # is distinct automatically. (The app property epistola.support.hub.node-id
    # still exists for rare single-instance overrides outside Kubernetes.)

# Application configuration
config:
  # Spring profiles to activate
  # Production:    "prod,keycloak"
  # Staging/Test:  "keycloak,demo" or "keycloak,demo,localauth"
  profiles: ""
  # Additional environment variables
  env: {}

# Logging levels (optional). Blank values fall back to the application's
# built-in defaults. Applied to the app pods only; the migration step keeps
# its own minimal logging. For any logger other than the two below, set the
# corresponding LOGGING_LEVEL_<LOGGER> env var via config.env.
logging:
  # Root logger level → LOGGING_LEVEL_ROOT. One of TRACE, DEBUG, INFO, WARN,
  # ERROR, OFF.
  level: ""
  # Level for the application's own `app.epistola` packages →
  # LOGGING_LEVEL_APP_EPISTOLA. Raise to DEBUG to trace app behaviour without
  # turning the whole root logger (and all libraries) verbose.
  appLevel: ""

# Database migration strategy. Migrations can run as a separate, explicit step
# (recommended for multi-replica / production) or embedded at app startup.
#   job           — a Helm pre-install/pre-upgrade hook Job runs migrations once
#                    per release before app pods start; a failed migration fails
#                    the release with its own logs/exit code. App pods then only
#                    validate the schema and fail fast if it is behind.
#   initContainer — every app pod runs an init container that migrates
#                    (idempotent) before the app container starts. App pods
#                    validate the schema as with `job`.
#   embedded      — the app runs Flyway at boot (single-process convenience,
#                    e.g. local/dev or single-replica).
migration:
  mode: job
  # Migration-JVM per-socket read timeout (SECONDS). The migration JVM shares the
  # app's application.yaml, but long DDL (index builds, big ALTERs) can read with
  # no socket traffic for longer than the app's 30s socketTimeout, which would
  # abort the migration — so migrations diverge here. 0 = no socket timeout; the
  # migration is already bounded by job.activeDeadlineSeconds. Raise to a finite
  # value (e.g. matching activeDeadlineSeconds) if you prefer a hard cap.
  socketTimeoutSeconds: 0
  # Image for the wait-for-db init container (job / initContainer modes).
  waitImage: busybox:1.38
  # Resources for the migrate container.
  resources: {}
  # Optional (database.type=external only): run the migration container as a
  # SEPARATE database role from the app pods. Set this to the role that holds DDL,
  # so the app's own role (database.*) can run with NO DDL privileges — the app
  # performs partition maintenance only via SECURITY DEFINER functions (see #438
  # and docs/deployment.md "Running with a DDL-less runtime role"). The database
  # URL is shared (same host/db); only the username/password differ.
  #
  # Not supported with database.type=cnpgExisting (that path is single-role: the
  # app already connects as the cluster owner, which holds DDL) — setting this
  # with cnpgExisting FAILS the render. For a two-role setup on CNPG, use
  # database.type=external pointed at the cluster's -rw service; the migration
  # role is then the CNPG cluster OWNER, whose password is in CNPG's own
  # <clusterName>-app Secret. See docs/deployment.md.
  #
  # Leave `username` empty to reuse the app credentials (single-role, default —
  # unchanged behaviour). You provision this role and its password Secret out of
  # band.
  credentials:
    # Migration-role username. When empty, the migration container reuses the
    # app credentials from `database.*`.
    username: ""
    # Name of an existing Secret holding the migration role's password.
    # Required when `username` is set.
    existingSecret: ""
    # Key within `existingSecret` that holds the password.
    secretKey: password
  # Helm hook Job tuning (job mode only).
  job:
    backoffLimit: 3
    activeDeadlineSeconds: 600
    # Requires the TTL-after-finished controller. Succeeded Jobs are also
    # removed by the hook-delete-policy on the next release.
    ttlSecondsAfterFinished: 600
    # Extra annotations merged onto the migration Job's metadata (keys here
    # override the chart's helm.sh/hook defaults). Plain `helm` and Flux's
    # helm-controller need nothing here — they run Helm, so the hooks fire
    # natively. When the chart is rendered to manifests and applied by a tool
    # that ignores Helm hooks, add that tool's hook annotation so the migration
    # still runs before the app, e.g. Argo CD:
    #   annotations:
    #     argocd.argoproj.io/hook: PreSync
    #     argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    annotations: {}

# Connection pool (HikariCP) tuning. The base liveness/recovery settings
# (socketTimeout, keepalive, leak detection, …) live in the app's
# application.yaml and apply by default; these values let operators size the
# pool and tune the app-side socket timeout per deployment without re-templating.
datasource:
  hikari:
    # Per-replica pool size (fixed: minimum-idle is pinned to this). Each replica
    # owns its own pool, so the cluster total is replicas * maximumPoolSize. Ensure
    # Postgres max_connections comfortably exceeds
    # (maxReplicas * maximumPoolSize) + migration job + reserve. Raise your
    # database's max_connections (or front PG with PgBouncer) when scaling
    # replicaCount / autoscaling.
    maximumPoolSize: 20
    # APP per-socket read timeout (SECONDS). Breaks a wedged active read (post
    # DB-failover / network blip) so the pool self-heals without a restart. Keep
    # it >= your slowest normal query. Migrations use migration.socketTimeoutSeconds.
    socketTimeoutSeconds: 30

# Database configuration. The chart CONSUMES a database; it does not provision
# one — the database has its own lifecycle and must never be tied to (and deleted
# with) the app release. Supported types:
#   - none:         No datasource wired (supply it yourself via config.env).
#   - external:     Any PostgreSQL by host/port/credentials.
#   - cnpgExisting: An existing CloudNativePG cluster's credentials (you manage
#                   the CNPG Cluster resource separately — see
#                   charts/epistola/examples/cnpg-cluster.yaml and docs/deployment.md).
database:
  type: "none"

  # External PostgreSQL configuration (type: external)
  external:
    host: ""
    port: 5432
    database: epistola
    username: epistola
    # Name of existing secret containing the password
    existingSecret: ""
    # Key in the secret containing the password
    secretKey: password

  # Existing CNPG Cluster configuration (type: cnpgExisting). Single-role: the app
  # connects as the cluster OWNER via the CNPG `-app` secret. For a two-role setup
  # on CNPG (a restricted, DDL-less app role) use `database.type=external` pointed
  # at the cluster's `-rw` service — see the two-role recipe in docs/deployment.md.
  cnpgExisting:
    # Name of the existing CNPG cluster
    clusterName: ""
    # Name of the credentials Secret (defaults to <clusterName>-app, which CNPG
    # generates for the cluster owner).
    existingSecret: ""
