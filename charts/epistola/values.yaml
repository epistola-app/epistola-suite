# Default values for epistola.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/epistola-app/epistola-suite
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: epistola.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: epistola-tls
  #    hosts:
  #      - epistola.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Liveness and readiness probes using Spring Boot Actuator
startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30
  timeoutSeconds: 3

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
# Note: tmp-dir is required for readOnlyRootFilesystem since Java needs a writable /tmp
volumes:
  - name: tmp-dir
    emptyDir: {}

# Additional volumeMounts on the output Deployment definition.
# Note: /tmp mount is required for readOnlyRootFilesystem since Java needs a writable /tmp
volumeMounts:
  - name: tmp-dir
    mountPath: /tmp

nodeSelector: {}

tolerations: []

affinity: {}

# JVM configuration
jvm:
  # JAVA_TOOL_OPTIONS passed to the JVM
  options: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"

# Additional trusted root CA certificates for OUTBOUND TLS — e.g. an internal
# Keycloak, a private catalog server, the epistola-hub, or a corporate
# TLS-inspecting egress proxy that re-signs traffic with its own root CA.
#
# An init container merges these PEM certs into a COPY of the JVM's default
# truststore (in an emptyDir); the app then trusts BOTH the public CA bundle and
# these. Nothing is replaced, so public-internet HTTPS keeps working. Compatible
# with the hardened pod (non-root, readOnlyRootFilesystem) — only the emptyDir is
# written.
extraCaCerts:
  enabled: false
  # Use a pre-existing Secret whose keys are PEM files (*.crt / *.pem, one cert
  # each). Takes precedence over `certs` below. Leave blank to have the chart
  # render a Secret from `certs`.
  existingSecret: ""
  # Inline PEM certificates; the chart renders them into a Secret. The map key
  # becomes the truststore alias, so keep keys unique and descriptive.
  certs: {}
  #   corp-root-ca.crt: |
  #     -----BEGIN CERTIFICATE-----
  #     ...
  #     -----END CERTIFICATE-----
  # Init container image. Defaults to the app image, which is guaranteed to
  # contain the exact JAVA_HOME/cacerts + keytool the app uses. Override only if
  # the app image ever ships without keytool (use a JRE image, e.g.
  # eclipse-temurin:25-jre).
  image: ""
  # Password of the JDK default truststore (and the merged copy).
  trustStorePassword: changeit

# Observability configuration
observability:
  # OpenTelemetry exporter endpoint (e.g., http://otel-collector:4318)
  otlpEndpoint: ""
  # Prometheus scrape annotations on pods
  prometheus:
    enabled: false
    port: 4000
    path: /actuator/prometheus
  # Grafana Operator CRDs (dashboards + alerts)
  grafana:
    enabled: false
    instanceSelector:
      matchLabels:
        dashboards: "grafana"
    datasourceName: "Prometheus"
    folder: "Epistola"

# OIDC login configuration (optional, requires config.profiles to include "keycloak")
oidc:
  enabled: false
  # Client ID used for browser login and resource-server validation.
  clientId: epistola-suite
  # Client secret used for the OIDC client.
  clientSecret: ""
  # Reference a pre-existing secret containing the OIDC client secret.
  existingSecret: ""
  # Key within the existing secret that holds the client secret.
  secretKey: client-secret
  # Issuer URI for browser-facing OAuth2 / JWT validation.
  issuerUri: ""
  # Internal base URL for server-to-server OIDC calls (token, JWK, userinfo).
  # Use when Keycloak is reachable at a different URL from within the cluster
  # than from the browser (e.g., http://keycloak-svc/auth vs https://auth.example.com/auth).
  backchannelBaseUrl: ""
  # JWT claim name to read flat-role strings (`epg_*` / `ept_*_*` / `eps_*`) from.
  # Leave blank to use the application default (`roles`). Override when your IdP
  # emits the flat-role list under a different claim name (e.g., `app_roles`).
  # Also re-points the Keycloak `epistola-realm-roles` mapper when
  # `keycloakAdmin.ensureGroups=true`. See docs/keycloak-setup.md.
  flatRolesClaimName: ""

# Keycloak admin/provisioning configuration (optional, for group bootstrap)
keycloakAdmin:
  enabled: false
  # Explicit admin URL for the Keycloak Admin REST API.
  adminUrl: ""
  # Realm to manage.
  realm: epistola
  # Client ID used for client-credentials authentication.
  clientId: epistola-suite
  # Client secret used for client-credentials authentication.
  clientSecret: ""
  # Reference a pre-existing secret containing the admin client secret.
  existingSecret: ""
  # Key within the existing secret that holds the client secret.
  secretKey: client-secret
  # Ensure base group hierarchy (/epistola/tenants, /epistola/global/*, /epistola/platform/*) exists on startup.
  ensureGroups: false

# Optional commercial support tier (epistola-hub integration).
# When enabled, the application registers itself with epistola-hub on startup
# for feedback sync, monitoring, quality checks, and version-compatibility
# services. OSS deployments leave this disabled — the support module ships in
# the image but never constructs any beans. See modules/epistola-support.
support:
  enabled: false

  # Installation identity. Required when support.enabled is true.
  # The companyName/environment combination becomes the default installation
  # name reported to the hub; override via installation.name.
  installation:
    companyName: ""
    adminEmail: ""
    environment: "" # e.g., "production", "staging"
    # Optional display name override. Blank → "{companyName} - {environment}".
    name: ""
    # Optional free-form description shown in the hub.
    description: ""

  # Hub connection (only used when support.enabled is true).
  hub:
    # Override the hub discovery URL for self-hosted deployments.
    # Blank → use the SaaS default baked into the hub client.
    # Kubernetes deployments resolve the hub via `.well-known` discovery;
    # the direct host/port mode is a local-dev / debug convenience and is
    # intentionally NOT exposed here.
    discoveryUrl: ""
    # Override the per-pod node id reported to the hub. Blank → auto-detect
    # from EPISTOLA_NODE_ID / HOSTNAME / POD_NAME / local hostname.
    # In Kubernetes you usually want to set this to the pod name via the
    # downward API (an example is in deployment.yaml when enabled).
    nodeId: ""

# Application configuration
config:
  # Spring profiles to activate
  # Production:    "prod,keycloak"
  # Staging/Test:  "keycloak,demo" or "keycloak,demo,localauth"
  profiles: ""
  # Additional environment variables
  env: {}
  # Example:
  #   SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"

# Database migration strategy. Migrations can run as a separate, explicit step
# (recommended for multi-replica / production) or embedded at app startup.
#   job           — a Helm pre-install/pre-upgrade hook Job runs migrations once
#                    per release before app pods start; a failed migration fails
#                    the release with its own logs/exit code. App pods then only
#                    validate the schema and fail fast if it is behind.
#   initContainer — every app pod runs an init container that migrates
#                    (idempotent) before the app container starts. App pods
#                    validate the schema as with `job`.
#   embedded      — the app runs Flyway at boot (single-process convenience,
#                    e.g. local/dev or single-replica).
#
# NOTE: with database.type=cnpg the CNPG Cluster is created after Helm hooks, so
# on a *fresh* install the `job` mode cannot reach the database yet. Use
# `initContainer` (or `embedded`) for the first install of a managed CNPG
# database, or pre-create the cluster / use cnpgExisting.
migration:
  mode: job
  # Image for the wait-for-db init container (job / initContainer modes).
  waitImage: busybox:1.38
  # Resources for the migrate container.
  resources: {}
  # Helm hook Job tuning (job mode only).
  job:
    backoffLimit: 3
    activeDeadlineSeconds: 600
    # Requires the TTL-after-finished controller. Succeeded Jobs are also
    # removed by the hook-delete-policy on the next release.
    ttlSecondsAfterFinished: 600
    # Extra annotations merged onto the migration Job's metadata (keys here
    # override the chart's helm.sh/hook defaults). Plain `helm` and Flux's
    # helm-controller need nothing here — they run Helm, so the hooks fire
    # natively. When the chart is rendered to manifests and applied by a tool
    # that ignores Helm hooks, add that tool's hook annotation so the migration
    # still runs before the app, e.g. Argo CD:
    #   annotations:
    #     argocd.argoproj.io/hook: PreSync
    #     argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    annotations: {}

# Database configuration
# Supported types:
#   - none: No database configuration (use config.env for manual setup)
#   - external: External PostgreSQL (manual host/port/credentials)
#   - cnpg: Create a new CloudNativePG Cluster (requires CNPG operator)
#   - cnpgExisting: Use existing CloudNativePG Cluster credentials
database:
  type: "none"

  # External PostgreSQL configuration (type: external)
  external:
    host: ""
    port: 5432
    database: epistola
    username: epistola
    # Name of existing secret containing the password
    existingSecret: ""
    # Key in the secret containing the password
    secretKey: password

  # CloudNativePG Cluster configuration (type: cnpg)
  cnpg:
    # Cluster name (defaults to release fullname + "-db")
    name: ""
    # Number of PostgreSQL instances
    instances: 1
    # PostgreSQL major version
    postgresVersion: 17
    # Database to create
    database: epistola
    # Application user to create (owner of the database)
    owner: epistola
    # Storage configuration
    storage:
      size: 8Gi
      storageClass: ""
    # Resource requests/limits for PostgreSQL pods
    resources: {}
    #   requests:
    #     memory: 256Mi
    #     cpu: 100m
    #   limits:
    #     memory: 1Gi
    #     cpu: 1000m
    # Additional PostgreSQL parameters
    parameters: {}
    #   max_connections: "100"
    #   shared_buffers: "256MB"

  # Existing CNPG Cluster configuration (type: cnpgExisting)
  cnpgExisting:
    # Name of the existing CNPG cluster
    clusterName: ""
    # Secret name (defaults to <clusterName>-app)
    secretName: ""
