{{- if eq .Values.migration.mode "job" }}
{{- /*
  Pre-install / pre-upgrade hook Job: runs DB migrations exactly once per
  release, before the Deployment is applied/updated. A failed migration fails
  `helm upgrade` (the new app version is never rolled out) and the failed Job
  is kept for log inspection. App pods boot in validate mode (wired by the
  Deployment), so they refuse to serve traffic until this Job has succeeded.

  The database is always provisioned outside this chart (external or an existing
  CNPG cluster via cnpgExisting), so it exists before hooks run; the wait-for-db
  init container tolerates a CNPG cluster still finishing async provisioning.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "epistola.fullname" . }}-migrate
  labels:
    {{- include "epistola.labels" . | nindent 4 }}
  annotations:
    {{- /* The helm.sh/hook annotations order this Job under plain `helm` and
           Flux's helm-controller (both run Helm, so the hooks fire natively).
           When the chart is rendered to manifests and applied by a tool that
           ignores Helm hooks — Argo CD, or Flux's kustomize-controller — set
           migration.job.annotations to that tool's own hook annotation; keys
           set there override these defaults. */}}
    {{- $hookDefaults := dict "helm.sh/hook" "pre-install,pre-upgrade" "helm.sh/hook-weight" "5" "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded" }}
    {{- toYaml (merge (deepCopy (default dict .Values.migration.job.annotations)) $hookDefaults) | nindent 4 }}
spec:
  backoffLimit: {{ .Values.migration.job.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.job.activeDeadlineSeconds }}
  {{- if .Values.migration.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.migration.job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "epistola.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "epistola.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if ne (include "epistola.database.effectiveType" .) "none" }}
      initContainers:
        {{- include "epistola.waitForDb" . | nindent 8 }}
      {{- end }}
      containers:
        {{- include "epistola.migrateContainer" . | nindent 8 }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
