apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "epistola.fullname" . }}
  labels:
    {{- include "epistola.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "epistola.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.observability.prometheus.enabled .Values.podAnnotations }}
      annotations:
        {{- if .Values.observability.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.observability.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.observability.prometheus.path | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "epistola.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "epistola.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if eq .Values.migration.mode "initContainer" }}
      initContainers:
        {{- if ne (include "epistola.database.effectiveType" .) "none" }}
        {{- include "epistola.waitForDb" . | nindent 8 }}
        {{- end }}
        {{- include "epistola.migrateContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
            # Actuator/management endpoints (health, info, prometheus) in the
            # prod profile. Declared for in-cluster scraping only — intentionally
            # NOT added to the Service, so it is never exposed via the Ingress.
            - name: management
              containerPort: 4040
              protocol: TCP
          env:
            {{- if .Values.jvm.options }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.jvm.options | quote }}
            {{- end }}
            {{- /* Trusted CA certificates are delivered as a Paketo `ca-certificates`
                   service binding (see volumes below); the buildpack launcher merges
                   them into the JVM truststore at startup. */}}
            {{- if .Values.extraCaCerts.enabled }}
            - name: SERVICE_BINDING_ROOT
              value: /bindings
            {{- end }}
            {{- if .Values.config.profiles }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.config.profiles | quote }}
            {{- end }}
            {{- /* OpenTelemetry */}}
            {{- if .Values.observability.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "true"
            - name: MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED
              value: "true"
            - name: MANAGEMENT_LOGGING_EXPORT_OTLP_ENABLED
              value: "true"
            {{- else }}
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "false"
            - name: MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED
              value: "false"
            - name: MANAGEMENT_LOGGING_EXPORT_OTLP_ENABLED
              value: "false"
            {{- end }}
            {{- /* Bring-your-own OpenTelemetry agent friendliness. When an
                   operator attaches the OTel Java agent, these give it a stable
                   identity consistent with the app's own NodeIdentity (pod name)
                   and common metric tags. service.instance.id uses the
                   downward-API POD_NAME, so it must be declared first for the
                   $(POD_NAME) reference to resolve. The epistola-hub leg is
                   configured at runtime by the support module, not here. */}}
            {{- if .Values.observability.otelAgent.enabled }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.otelAgent.serviceName | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "epistola.otelResourceAttributes" . | quote }}
            {{- end }}
            {{- /* OIDC / OAuth2 login */}}
            {{- if .Values.oidc.enabled }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENTID
              value: {{ .Values.oidc.clientId | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENTSECRET
              {{- if .Values.oidc.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "oidc.existingSecret is required when oidc.enabled is true and oidc.clientSecret is empty" .Values.oidc.existingSecret }}
                  key: {{ .Values.oidc.secretKey }}
              {{- else }}
              value: {{ required "oidc.clientSecret is required when oidc.enabled is true and oidc.existingSecret is empty" .Values.oidc.clientSecret | quote }}
              {{- end }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUERURI
              value: {{ required "oidc.issuerUri is required when oidc.enabled is true" .Values.oidc.issuerUri | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI
              value: {{ .Values.oidc.issuerUri | quote }}
            {{- if .Values.oidc.backchannelBaseUrl }}
            - name: EPISTOLA_AUTH_OIDC_BACKCHANNELBASEURL
              value: {{ .Values.oidc.backchannelBaseUrl | quote }}
            {{- end }}
            {{- if .Values.oidc.flatRolesClaimName }}
            - name: EPISTOLA_AUTH_FLATROLES_CLAIMNAME
              value: {{ .Values.oidc.flatRolesClaimName | quote }}
            {{- end }}
            {{- end }}

            {{- /* Keycloak admin / provisioning */}}
            {{- if .Values.keycloakAdmin.enabled }}
            - name: EPISTOLA_KEYCLOAK_ADMINURL
              value: {{ required "keycloakAdmin.adminUrl is required when keycloakAdmin.enabled is true" .Values.keycloakAdmin.adminUrl | quote }}
            - name: EPISTOLA_KEYCLOAK_REALM
              value: {{ required "keycloakAdmin.realm is required when keycloakAdmin.enabled is true" .Values.keycloakAdmin.realm | quote }}
            - name: EPISTOLA_KEYCLOAK_CLIENTID
              value: {{ .Values.keycloakAdmin.clientId | quote }}
            - name: EPISTOLA_KEYCLOAK_CLIENTSECRET
              {{- if .Values.keycloakAdmin.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "keycloakAdmin.existingSecret is required when keycloakAdmin.enabled is true and keycloakAdmin.clientSecret is empty" .Values.keycloakAdmin.existingSecret }}
                  key: {{ .Values.keycloakAdmin.secretKey }}
              {{- else }}
              value: {{ required "keycloakAdmin.clientSecret is required when keycloakAdmin.enabled is true and keycloakAdmin.existingSecret is empty" .Values.keycloakAdmin.clientSecret | quote }}
              {{- end }}
            {{- if .Values.keycloakAdmin.ensureGroups }}
            - name: EPISTOLA_KEYCLOAK_ENSUREGROUPS
              value: "true"
            {{- end }}
            {{- end }}
            {{- /* Commercial support tier (epistola-hub integration) */}}
            {{- if .Values.support.enabled }}
            - name: EPISTOLA_SUPPORT_ENABLED
              value: "true"
            - name: EPISTOLA_INSTALLATION_COMPANYNAME
              value: {{ required "support.installation.companyName is required when support.enabled is true" .Values.support.installation.companyName | quote }}
            - name: EPISTOLA_INSTALLATION_ADMINEMAIL
              value: {{ required "support.installation.adminEmail is required when support.enabled is true" .Values.support.installation.adminEmail | quote }}
            - name: EPISTOLA_INSTALLATION_ENVIRONMENT
              value: {{ required "support.installation.environment is required when support.enabled is true" .Values.support.installation.environment | quote }}
            {{- if .Values.support.installation.name }}
            - name: EPISTOLA_INSTALLATION_NAME
              value: {{ .Values.support.installation.name | quote }}
            {{- end }}
            {{- if .Values.support.installation.description }}
            - name: EPISTOLA_INSTALLATION_DESCRIPTION
              value: {{ .Values.support.installation.description | quote }}
            {{- end }}
            {{- if .Values.support.hub.discoveryUrl }}
            - name: EPISTOLA_SUPPORT_HUB_DISCOVERYURL
              value: {{ .Values.support.hub.discoveryUrl | quote }}
            {{- end }}
            {{- /* Forward application logs + metrics to the hub over OTLP-over-gRPC. On by
                   default with the support tier; the hub's `support-telemetry` entitlement
                   gates whether anything ships. Rendered as the value so it can be opted out. */}}
            - name: EPISTOLA_SUPPORT_TELEMETRY_ENABLED
              value: {{ .Values.support.telemetry.enabled | quote }}
            {{- /* No node-id env is injected. A chart value lives on the
                   Deployment, so it is identical for every replica and could
                   never provide per-pod identity. Node identity is resolved at
                   runtime by NodeIdentity (hostname → pod name), giving each
                   pod a distinct id automatically. */}}
            {{- end }}

            {{- /* Database configuration (shared with the migration Job / init container) */}}
            {{- include "epistola.databaseEnv" . | nindent 12 }}
            {{- /* Credential encryption-at-rest keyset (app pods only) */}}
            {{- include "epistola.encryptionEnv" . | nindent 12 }}
            {{- /* When migrations run as a separate step, app pods must only
                   validate the schema and fail fast if it is behind. */}}
            {{- if ne .Values.migration.mode "embedded" }}
            - name: EPISTOLA_MIGRATION_MODE
              value: "validate"
            {{- end }}
            {{- range $key, $value := .Values.config.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.volumeMounts .Values.extraCaCerts.enabled }}
          volumeMounts:
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.extraCaCerts.enabled }}
            - name: ca-cert-binding
              mountPath: /bindings/ca-certificates
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.volumes .Values.extraCaCerts.enabled }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.extraCaCerts.enabled }}
        {{- /* A Paketo `ca-certificates` service binding: a `type` file (from a
               chart-managed ConfigMap) plus one PEM cert per key (from the cert
               Secret), projected into a single directory. The buildpack's launch
               helper reads $SERVICE_BINDING_ROOT, adds these CAs to the JVM
               truststore — no init container, works under readOnlyRootFilesystem. */}}
        - name: ca-cert-binding
          projected:
            sources:
              - configMap:
                  name: {{ printf "%s-ca-binding-type" (include "epistola.fullname" .) }}
              - secret:
                  name: {{ .Values.extraCaCerts.existingSecret | default (printf "%s-ca-certs" (include "epistola.fullname" .)) }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
