apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "epistola.fullname" . }}
  labels:
    {{- include "epistola.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "epistola.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.observability.prometheus.enabled .Values.podAnnotations }}
      annotations:
        {{- if .Values.observability.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.observability.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.observability.prometheus.path | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "epistola.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "epistola.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            {{- if .Values.jvm.options }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.jvm.options | quote }}
            {{- end }}
            {{- if .Values.config.profiles }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.config.profiles | quote }}
            {{- end }}
            {{- /* OpenTelemetry */}}
            {{- if .Values.observability.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "true"
            - name: MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED
              value: "true"
            - name: MANAGEMENT_LOGGING_EXPORT_OTLP_ENABLED
              value: "true"
            {{- end }}
            {{- /* OIDC / OAuth2 login */}}
            {{- if .Values.oidc.enabled }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENTID
              value: {{ .Values.oidc.clientId | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENTSECRET
              {{- if .Values.oidc.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "oidc.existingSecret is required when oidc.enabled is true and oidc.clientSecret is empty" .Values.oidc.existingSecret }}
                  key: {{ .Values.oidc.secretKey }}
              {{- else }}
              value: {{ required "oidc.clientSecret is required when oidc.enabled is true and oidc.existingSecret is empty" .Values.oidc.clientSecret | quote }}
              {{- end }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUERURI
              value: {{ required "oidc.issuerUri is required when oidc.enabled is true" .Values.oidc.issuerUri | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI
              value: {{ .Values.oidc.issuerUri | quote }}
            {{- if .Values.oidc.backchannelBaseUrl }}
            - name: EPISTOLA_AUTH_OIDC_BACKCHANNELBASEURL
              value: {{ .Values.oidc.backchannelBaseUrl | quote }}
            {{- end }}
            {{- end }}

            {{- /* Keycloak admin / provisioning */}}
            {{- if .Values.keycloakAdmin.enabled }}
            - name: EPISTOLA_KEYCLOAK_ADMINURL
              value: {{ required "keycloakAdmin.adminUrl is required when keycloakAdmin.enabled is true" .Values.keycloakAdmin.adminUrl | quote }}
            - name: EPISTOLA_KEYCLOAK_REALM
              value: {{ required "keycloakAdmin.realm is required when keycloakAdmin.enabled is true" .Values.keycloakAdmin.realm | quote }}
            - name: EPISTOLA_KEYCLOAK_CLIENTID
              value: {{ .Values.keycloakAdmin.clientId | quote }}
            - name: EPISTOLA_KEYCLOAK_CLIENTSECRET
              {{- if .Values.keycloakAdmin.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "keycloakAdmin.existingSecret is required when keycloakAdmin.enabled is true and keycloakAdmin.clientSecret is empty" .Values.keycloakAdmin.existingSecret }}
                  key: {{ .Values.keycloakAdmin.secretKey }}
              {{- else }}
              value: {{ required "keycloakAdmin.clientSecret is required when keycloakAdmin.enabled is true and keycloakAdmin.existingSecret is empty" .Values.keycloakAdmin.clientSecret | quote }}
              {{- end }}
            {{- if .Values.keycloakAdmin.ensureGroups }}
            - name: EPISTOLA_KEYCLOAK_ENSUREGROUPS
              value: "true"
            {{- end }}
            {{- end }}
            {{- /* Database configuration */}}
            {{- $dbType := include "epistola.database.effectiveType" . }}
            {{- /* CNPG mode - use CNPG secret with jdbc-uri */}}
            {{- if or (eq $dbType "cnpg") (eq $dbType "cnpgExisting") }}
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "epistola.cnpg.secretName" . }}
                  key: jdbc-uri
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "epistola.cnpg.secretName" . }}
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "epistola.cnpg.secretName" . }}
                  key: password
            {{- /* External PostgreSQL mode */}}
            {{- else if eq $dbType "external" }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.database.external.host }}:{{ .Values.database.external.port }}/{{ .Values.database.external.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.database.external.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "database.external.existingSecret is required when database.type is 'external'" .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.secretKey }}
            {{- end }}
            {{- range $key, $value := .Values.config.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
