{{- if eq .Values.database.type "cnpg" }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "epistola.cnpg.clusterName" . }}
  labels:
    {{- include "epistola.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.database.cnpg.instances }}

  postgresql:
    {{- with .Values.database.cnpg.parameters }}
    parameters:
      {{- toYaml . | nindent 6 }}
    {{- end }}

  bootstrap:
    initdb:
      database: {{ .Values.database.cnpg.database }}
      owner: {{ .Values.database.cnpg.owner }}
      {{- with .Values.database.cnpg.postInitApplicationSQL }}
      # Runs once at bootstrap, as the database owner, in the application database.
      postInitApplicationSQL:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.database.cnpg.postInitSQL }}
      # Runs once at bootstrap, as a superuser, in the 'postgres' database.
      postInitSQL:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  {{- with .Values.database.cnpg.managedRoles }}
  # Additional Postgres roles CNPG creates/reconciles (e.g. a DDL-less runtime
  # role or a separate migration role for the two-role split — see
  # docs/deployment.md). Each role's password comes from a referenced Secret.
  managed:
    roles:
      {{- toYaml . | nindent 6 }}
  {{- end }}

  storage:
    size: {{ .Values.database.cnpg.storage.size }}
    {{- if .Values.database.cnpg.storage.storageClass }}
    storageClass: {{ .Values.database.cnpg.storage.storageClass }}
    {{- end }}

  {{- with .Values.database.cnpg.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
