{{- if .Values.extraCaCerts.enabled }}
{{- /*
  Trusted CA certificates are delivered to the app as a Paketo `ca-certificates`
  service binding — a directory containing a `type` file plus one PEM cert per
  entry. We assemble that directory with a projected volume (see deployment.yaml)
  from two sources:

    * this ConfigMap — supplies the required `type: ca-certificates` marker file;
    * a Secret — supplies the PEM certificates (rendered below from inline
      `extraCaCerts.certs`, or referenced via `extraCaCerts.existingSecret`).

  The buildpack launch helper reads $SERVICE_BINDING_ROOT and merges these CAs
  into the JVM truststore at startup. No init container; works under the hardened
  (non-root, readOnlyRootFilesystem) pod.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-ca-binding-type" (include "epistola.fullname" .) }}
  labels:
    {{- include "epistola.labels" . | nindent 4 }}
data:
  type: ca-certificates
{{- if not .Values.extraCaCerts.existingSecret }}
{{- if not .Values.extraCaCerts.certs }}
{{- fail "extraCaCerts.enabled is true but neither extraCaCerts.existingSecret nor extraCaCerts.certs is set" }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-ca-certs" (include "epistola.fullname" .) }}
  labels:
    {{- include "epistola.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $name, $pem := .Values.extraCaCerts.certs }}
  {{ $name }}: |
    {{- $pem | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
