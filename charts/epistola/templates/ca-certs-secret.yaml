{{- /*
  Renders the trusted CA certificates into a Secret when inline `extraCaCerts.certs`
  are provided. Skipped when `extraCaCerts.existingSecret` references a user-managed
  Secret, or when the feature is disabled.
*/}}
{{- if and .Values.extraCaCerts.enabled (not .Values.extraCaCerts.existingSecret) }}
{{- if not .Values.extraCaCerts.certs }}
{{- fail "extraCaCerts.enabled is true but neither extraCaCerts.existingSecret nor extraCaCerts.certs is set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-ca-certs" (include "epistola.fullname" .) }}
  labels:
    {{- include "epistola.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $name, $pem := .Values.extraCaCerts.certs }}
  {{ $name }}: |
    {{- $pem | nindent 4 }}
  {{- end }}
{{- end }}
