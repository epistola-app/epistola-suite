name: Helm Chart

# Version-driven release: bump a chart's Chart.yaml `version` in a PR, and on
# merge to main CI publishes that chart to the OCI registry (and cuts a
# `<chart>-<version>` GitHub Release for provenance). No manual release tags.
on:
  push:
    branches: [main]
    paths:
      - "charts/**"
  pull_request:
    branches: [main]
    paths:
      - "charts/**"

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: [epistola, epistola-observability]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v4.2.2"

      - name: Lint Helm chart
        run: helm lint charts/${{ matrix.chart }}

      - name: Scan Helm chart for misconfigurations
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          scan-type: "config"
          scan-ref: "charts/${{ matrix.chart }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  release:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: lint
    # Only on merge to main; skips any chart whose version is already published.
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        chart: [epistola, epistola-observability]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v4.2.2"

      - name: Publish chart if Chart.yaml version is new
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHART="${{ matrix.chart }}"
          DIR="charts/${CHART}"
          VERSION="$(grep -E '^version:' "${DIR}/Chart.yaml" | head -n1 | awk '{print $2}' | tr -d '"')"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::${CHART}: invalid version '${VERSION}' in Chart.yaml (expected semver)"; exit 1
          fi

          echo "${GITHUB_TOKEN}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

          # Idempotent: skip if this version is already in the registry.
          if helm show chart "oci://${REGISTRY}/epistola-app/charts/${CHART}" --version "${VERSION}" >/dev/null 2>&1; then
            echo "${CHART} ${VERSION} already published — nothing to do."
            exit 0
          fi
          echo "Publishing ${CHART} ${VERSION}"

          # Sync appVersion with the latest app tag (published chart only, not committed).
          APP_VERSION="$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')"
          if [ -n "${APP_VERSION}" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" "${DIR}/Chart.yaml"
          fi

          mkdir -p .helm-packages
          helm package "${DIR}" --destination .helm-packages
          helm push ".helm-packages/${CHART}-${VERSION}.tgz" "oci://${REGISTRY}/epistola-app/charts"

          # Release notes = the CHANGELOG section for this version (authored in the
          # release PR). Fail if it is missing, so a release always has real notes.
          NOTES_FILE="$(mktemp)"
          awk -v ver="${VERSION}" '
            $0 ~ ("^## \\[" ver "\\]") { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' "${DIR}/CHANGELOG.md" > "${NOTES_FILE}"
          if ! grep -q '[^[:space:]]' "${NOTES_FILE}"; then
            echo "::error::${CHART}: no '## [${VERSION}]' section in ${DIR}/CHANGELOG.md — finalize the changelog before releasing."
            exit 1
          fi
          {
            echo
            echo "## Install / upgrade"
            echo
            echo "    helm upgrade --install ${CHART} oci://${REGISTRY}/epistola-app/charts/${CHART} --version ${VERSION}"
          } >> "${NOTES_FILE}"

          # Cut a GitHub Release (clean <chart>-<version> tag) for provenance + artifact.
          TAG="${CHART}-${VERSION}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" ".helm-packages/${CHART}-${VERSION}.tgz" --clobber
          else
            gh release create "${TAG}" ".helm-packages/${CHART}-${VERSION}.tgz" \
              --target "${{ github.sha }}" --title "${CHART} ${VERSION}" --notes-file "${NOTES_FILE}"
          fi
