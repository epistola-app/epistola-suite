name: Helm Chart

# Tag-driven release. A chart's Chart.yaml `version:` is the source of truth; a
# release strips its -SNAPSHOT and pushes a matching tag `<chart>-<version>` (via
# the release-helm-chart skill, which also cuts the GitHub Release from the
# CHANGELOG). This workflow reacts to that tag, asserts the tag == Chart.yaml
# version, and publishes to the OCI registry. Disjoint from the app's `v*` tags,
# so the two release streams never cross-fire.
on:
  pull_request:
    paths:
      - "charts/**"
  push:
    tags:
      - "epistola-*"

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: [epistola, epistola-observability]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v4.2.2"

      - name: Lint Helm chart
        run: helm lint charts/${{ matrix.chart }}

      - name: Scan Helm chart for misconfigurations
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          scan-type: "config"
          scan-ref: "charts/${{ matrix.chart }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v4.2.2"

      - name: Publish the tagged chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Parse <chart-name>-<semver> from the tag (pre-release-safe).
          if [[ ! "$GITHUB_REF_NAME" =~ ^(.+)-([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "::error::tag '$GITHUB_REF_NAME' is not <chart>-<semver>"; exit 1
          fi
          CHART="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          DIR="charts/${CHART}"
          test -f "${DIR}/Chart.yaml" || { echo "::error::no chart at ${DIR}"; exit 1; }

          # The tag must match the version file (blocks releasing a -SNAPSHOT).
          FILE_VER="$(grep -E '^version:' "${DIR}/Chart.yaml" | head -n1 | awk '{print $2}' | tr -d '"')"
          if [ "$VERSION" != "$FILE_VER" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} (version ${VERSION}) != ${DIR}/Chart.yaml version ${FILE_VER}"; exit 1
          fi
          echo "Publishing ${CHART} ${VERSION}"

          # Sync appVersion with the latest app tag (published chart only).
          APP_VERSION="$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')"
          if [ -n "${APP_VERSION}" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" "${DIR}/Chart.yaml"
          fi

          echo "${GITHUB_TOKEN}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin
          mkdir -p .helm-packages
          helm package "${DIR}" --destination .helm-packages
          helm push ".helm-packages/${CHART}-${VERSION}.tgz" "oci://${REGISTRY}/epistola-app/charts"
