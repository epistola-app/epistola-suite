name: Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version to release (e.g. 1.1.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v3.14.0"

      - name: Lint Helm chart
        run: helm lint charts/epistola

      - name: Scan Helm chart for misconfigurations
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: "config"
          scan-ref: "charts/epistola"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  release:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate version input
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '$VERSION'. Expected semver (e.g. 1.1.0)"
            exit 1
          fi
          if git tag -l "chart-$VERSION" | grep -q .; then
            echo "::error::Tag chart-$VERSION already exists"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v3.14.0"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/epistola/Chart.yaml

          # Sync appVersion with latest app tag
          APP_VERSION=$(git tag -l "v*" --sort=-v:refname | head -n 1 | sed 's/^v//')
          if [ -n "$APP_VERSION" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" charts/epistola/Chart.yaml
          fi

          echo "Updated Chart.yaml:"
          cat charts/epistola/Chart.yaml

      - name: Lint Helm chart
        run: helm lint charts/epistola

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package charts/epistola --destination .helm-packages

      - name: Push Helm chart to OCI registry
        run: |
          helm push .helm-packages/epistola-${VERSION}.tgz oci://ghcr.io/epistola-app/charts

      - name: Create tag and GitHub release
        run: |
          git tag "chart-${VERSION}"
          git push origin "chart-${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Helm Chart Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: chart-${{ env.VERSION }}
          name: Helm Chart ${{ env.VERSION }}
          body: |
            ## Helm Chart Release ${{ env.VERSION }}

            ### Installation
            ```bash
            helm install epistola oci://ghcr.io/epistola-app/charts/epistola --version ${{ env.VERSION }}
            ```

            ### Upgrade
            ```bash
            helm upgrade epistola oci://ghcr.io/epistola-app/charts/epistola --version ${{ env.VERSION }}
            ```
          files: |
            .helm-packages/epistola-${{ env.VERSION }}.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
