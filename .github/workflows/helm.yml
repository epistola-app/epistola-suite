name: Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'chart-')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v3.14.0"

      - name: Lint Helm chart
        run: helm lint charts/epistola

      - name: Scan Helm chart for misconfigurations
        uses: aquasecurity/trivy-action@1994662b5555670344cd84d29ed3cad4bd26f31c # master
        with:
          scan-type: "config"
          scan-ref: "charts/epistola"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  release:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'chart-')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Extract version from release tag
        id: tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#chart-}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '$VERSION'. Expected semver (e.g. 1.1.0)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Release version: $VERSION"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: "v3.14.0"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/epistola/Chart.yaml

          # Sync appVersion with latest app tag
          APP_VERSION=$(git tag -l "v*" --sort=-v:refname | head -n 1 | sed 's/^v//')
          if [ -n "$APP_VERSION" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" charts/epistola/Chart.yaml
          fi

          echo "Updated Chart.yaml:"
          cat charts/epistola/Chart.yaml

      - name: Lint Helm chart
        run: helm lint charts/epistola

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package charts/epistola --destination .helm-packages

      - name: Push Helm chart to OCI registry
        run: |
          helm push .helm-packages/epistola-${VERSION}.tgz oci://ghcr.io/epistola-app/charts

      - name: Upload chart to GitHub release
        run: |
          gh release upload "chart-${VERSION}" .helm-packages/epistola-${VERSION}.tgz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
