name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 6" # Saturday at 6 AM UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Setup tools with mise
        if: matrix.build-mode == 'manual'
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Get pnpm store directory
        if: matrix.build-mode == 'manual'
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        if: matrix.build-mode == 'manual'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        if: matrix.build-mode == 'manual'
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: matrix.build-mode == 'manual'
        run: pnpm build

      - name: Setup Gradle cache
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build backend
        if: matrix.build-mode == 'manual'
        # CodeQL's manual build mode reserves almost all of the runner's RAM for
        # its extractor (CODEQL_RAM defaults to total - 2g ≈ 14.5g on a 16g
        # runner), which starves the Kotlin compile daemon and fails compileKotlin
        # with "OutOfMemoryError: Java heap space". Cap CodeQL's budget to leave
        # headroom and give the Gradle/Kotlin JVMs explicit, bounded heaps.
        env:
          CODEQL_RAM: "6144"
          CODEQL_EXTRACTOR_JAVA_RAM: "6144"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g"
        run: gradle classes --no-daemon --no-build-cache -Pkotlin.daemon.jvmargs=-Xmx4g

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: "/language:${{ matrix.language }}"
