name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 6" # Saturday at 6 AM UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Setup tools with mise
        if: matrix.build-mode == 'manual'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Get pnpm store directory
        if: matrix.build-mode == 'manual'
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        if: matrix.build-mode == 'manual'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        if: matrix.build-mode == 'manual'
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: matrix.build-mode == 'manual'
        run: pnpm build

      - name: Setup Gradle cache
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build backend
        if: matrix.build-mode == 'manual'
        # CodeQL's manual build mode reserves almost all of the runner's RAM for
        # its extractor (CODEQL_RAM defaults to total - 2g ≈ 14.5g on a 16g
        # runner), which starves the Kotlin compile daemon and fails compileKotlin
        # with "OutOfMemoryError: Java heap space". Cap CodeQL's budget to leave
        # headroom and give the Gradle/Kotlin JVMs explicit, bounded heaps.
        env:
          CODEQL_RAM: "6144"
          CODEQL_EXTRACTOR_JAVA_RAM: "6144"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g"
        run: gradle classes --no-daemon --no-build-cache -Pkotlin.daemon.jvmargs=-Xmx4g

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: "/language:${{ matrix.language }}"
