name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Compile once + frontend + SBOM. Primes the Gradle build cache so the
  # parallel test jobs reuse compiled outputs instead of recompiling.
  build:
    name: Build (compile + frontend + SBOM)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check contract version
        if: github.event_name == 'pull_request'
        run: |
          VERSION=$(grep 'epistola-contract\s*=' gradle/libs.versions.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Contract version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT* ]] || [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "::warning::Contract version '$VERSION' is a snapshot/feature-stamped version. Update to a released version before merging."
          fi

      - name: Setup tools with mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Check format
        run: pnpm format:check

      - name: Build frontend
        run: pnpm build

      - name: Test frontend
        run: pnpm test

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Compile (primes the Gradle build cache for the test jobs)
        run: gradle testClasses

      # setup-gradle does NOT share the local build cache across jobs, so we
      # ship it explicitly. It is content-addressed (location-independent), so
      # the test jobs' compileKotlin/compileJava tasks become FROM-CACHE.
      - name: Package Gradle build cache
        run: |
          if [ -d "$HOME/.gradle/caches/build-cache-1" ]; then
            tar -C "$HOME" -czf gradle-build-cache.tgz .gradle/caches/build-cache-1
            echo "Packaged $(du -sh gradle-build-cache.tgz | cut -f1) Gradle build cache"
          else
            echo "::error::No Gradle build-cache-1 directory produced by the compile step"
            exit 1
          fi

      - name: Upload Gradle build cache
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gradle-build-cache
          path: gradle-build-cache.tgz
          retention-days: 1
          if-no-files-found: error

      - name: Generate SBOMs
        run: |
          gradle :apps:epistola:generateSbom
          pnpm --filter @epistola/editor sbom

      - name: Scan backend SBOM for vulnerabilities
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          scan-type: "sbom"
          scan-ref: "apps/epistola/build/sbom/bom.json"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL"
          output: "backend-vulnerability-report.txt"

      - name: Scan frontend SBOM for vulnerabilities
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          scan-type: "sbom"
          scan-ref: "modules/editor/build/sbom.json"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL"
          output: "frontend-vulnerability-report.txt"

      - name: Check vulnerability scan results
        run: |
          failed=false
          for report in backend-vulnerability-report.txt frontend-vulnerability-report.txt; do
            if [ -f "$report" ]; then
              name="${report%-vulnerability-report.txt}"
              # Check if any vulnerabilities were found (Total: N where N > 0)
              if grep -qP 'Total: [1-9]' "$report"; then
                echo "::error::Critical vulnerabilities found in $name dependencies:"
                echo ""
                cat "$report"
                echo ""
                failed=true
              fi
            fi
          done
          if [ "$failed" = true ]; then
            echo "::error::Vulnerability scan failed. Update the affected dependencies to fixed versions."
            exit 1
          fi
          echo "No critical vulnerabilities found."

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: |
            apps/epistola/build/sbom/bom.json
            modules/editor/build/sbom.json
          retention-days: 7

      - name: Upload vulnerability reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: vulnerability-reports
          path: |
            backend-vulnerability-report.txt
            frontend-vulnerability-report.txt
          retention-days: 7

  # Unit + integration via the Kover-instrumented catch-all `test` task
  # (excludes ui/perf). Runs on its own runner, in parallel with test-ui.
  test-unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup tools with mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          cache-read-only: true

      - name: Download Gradle build cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gradle-build-cache

      - name: Restore Gradle build cache (compile-once reuse)
        run: |
          mkdir -p "$HOME/.gradle/caches"
          tar -C "$HOME" -xzf gradle-build-cache.tgz
          echo "Restored Gradle build cache from the build job"

      - name: Unit + integration tests (+ aggregated coverage)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle test koverXmlReport

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-integration-reports
          path: "**/build/reports/tests/"
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload aggregated coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: build/reports/kover/report.xml
          retention-days: 7
          if-no-files-found: ignore

  # UI tests via the hardened `uiTest` task (serial, 2g, --disable-dev-shm-usage).
  # Dedicated runner = zero CPU contention (the #418 root cause). Re-run THIS job
  # alone to satisfy the #418 "3 consecutive green UI runs" gate.
  test-ui:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup tools with mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          cache-read-only: true

      - name: Download Gradle build cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gradle-build-cache

      - name: Restore Gradle build cache (compile-once reuse)
        run: |
          mkdir -p "$HOME/.gradle/caches"
          tar -C "$HOME" -xzf gradle-build-cache.tgz
          echo "Restored Gradle build cache from the build job"

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('gradle/libs.versions.toml') }}

      # Install the Chromium build + OS deps that match the pinned Playwright
      # version BEFORE the test task. Idempotent (fast no-op on a cache hit); on a
      # cache miss this stops the first UI test class from racing a browser install
      # while it also tries to launch Chromium. Java Playwright reads the same
      # ~/.cache/ms-playwright as the npm CLI of the same version.
      - name: Install Playwright browsers
        run: |
          PLAYWRIGHT_VERSION=$(grep '^playwright\s*=' gradle/libs.versions.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Installing Playwright $PLAYWRIGHT_VERSION (chromium, --with-deps)"
          npx --yes "playwright@${PLAYWRIGHT_VERSION}" install --with-deps chromium

      - name: UI tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle uiTest

      - name: Upload Playwright traces and test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-failures
          path: |
            apps/epistola/build/playwright-traces/
            apps/epistola/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore

  # Badge only when BOTH test buckets are green (needs both) and only on a
  # push to main (unchanged behavior). The Kover .ic comes solely from the
  # instrumented `test` task, so coverage just consumes the report artifact.
  coverage:
    name: Coverage Badge
    runs-on: ubuntu-latest
    needs: [test-unit-integration, test-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download aggregated coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-report
          path: build/reports/kover

      - name: Generate coverage badge
        id: coverage
        run: |
          # Parse coverage percentage from Kover XML report
          REPORT_FILE="build/reports/kover/report.xml"
          if [ -f "$REPORT_FILE" ]; then
            # Extract instruction coverage from the summary counter (last INSTRUCTION counter in report)
            COVERED=$(grep -o 'type="INSTRUCTION"[^/]*' "$REPORT_FILE" | tail -1 | grep -oP 'covered="\K[0-9]+')
            MISSED=$(grep -o 'type="INSTRUCTION"[^/]*' "$REPORT_FILE" | tail -1 | grep -oP 'missed="\K[0-9]+')

            if [ -n "$COVERED" ] && [ -n "$MISSED" ]; then
              TOTAL=$((COVERED + MISSED))
              if [ "$TOTAL" -gt 0 ]; then
                PERCENTAGE=$((COVERED * 100 / TOTAL))
              else
                PERCENTAGE=0
              fi
            else
              PERCENTAGE=0
            fi
          else
            PERCENTAGE=0
          fi

          echo "percentage=$PERCENTAGE" >> $GITHUB_OUTPUT

          # Determine badge color based on coverage
          if [ "$PERCENTAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$PERCENTAGE" -ge 60 ]; then
            COLOR="green"
          elif [ "$PERCENTAGE" -ge 40 ]; then
            COLOR="yellow"
          elif [ "$PERCENTAGE" -ge 20 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi

          # Create shields.io endpoint JSON
          mkdir -p .github/badges
          cat > .github/badges/coverage.json << EOF
          {"schemaVersion":1,"label":"coverage","message":"${PERCENTAGE}%","color":"${COLOR}"}
          EOF

          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Commit coverage badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE_PATH=".github/badges/coverage.json"

          # Get current file SHA if it exists (required for updates)
          CURRENT_SHA=$(gh api repos/${{ github.repository }}/contents/${FILE_PATH} --jq '.sha' 2>/dev/null || echo "")

          # Read new content and base64 encode it
          NEW_CONTENT=$(base64 -w0 ${FILE_PATH})

          # Check if content has changed by comparing with existing
          if [ -n "$CURRENT_SHA" ]; then
            EXISTING_CONTENT=$(gh api repos/${{ github.repository }}/contents/${FILE_PATH} --jq '.content' | tr -d '\n')
            if [ "$NEW_CONTENT" = "$EXISTING_CONTENT" ]; then
              echo "No changes to coverage badge"
              exit 0
            fi
          fi

          # Create or update the file via GitHub API (commits are automatically signed)
          if [ -n "$CURRENT_SHA" ]; then
            gh api repos/${{ github.repository }}/contents/${FILE_PATH} \
              --method PUT \
              -f message="chore: update coverage badge [skip ci]" \
              -f content="${NEW_CONTENT}" \
              -f branch="main" \
              -f sha="${CURRENT_SHA}"
          else
            gh api repos/${{ github.repository }}/contents/${FILE_PATH} \
              --method PUT \
              -f message="chore: update coverage badge [skip ci]" \
              -f content="${NEW_CONTENT}" \
              -f branch="main"
          fi

          echo "Coverage badge updated and committed (signed by GitHub)"

  docker:
    name: Build and Push ${{ matrix.variant }} Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit-integration, test-ui]
    if: github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'publish')
    concurrency:
      group: docker-publish
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - variant: JVM
            gradle-args: ""
            image-suffix: ""
            enabled: true
          - variant: Native
            gradle-args: -PnativeImage=true
            image-suffix: "-native"
            # Disabled: JDBI/Kotlin reflection doesn't work with GraalVM native images
            # See: https://github.com/jdbi/jdbi/issues/2475
            enabled: false
      fail-fast: false
    steps:
      - name: Check if variant is enabled
        if: ${{ !matrix.enabled }}
        run: |
          echo "::notice::${{ matrix.variant }} build is disabled"
          exit 0

      - name: Checkout
        if: ${{ matrix.enabled }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup tools with mise
        if: ${{ matrix.enabled }}
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Get pnpm store directory
        if: ${{ matrix.enabled }}
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        if: ${{ matrix.enabled }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        if: ${{ matrix.enabled }}
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: ${{ matrix.enabled }}
        run: pnpm build

      - name: Setup Gradle cache
        if: ${{ matrix.enabled }}
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Log in to Container Registry
        if: ${{ matrix.enabled }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        if: ${{ matrix.enabled }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Extract version from release tag
        if: ${{ matrix.enabled && github.event_name == 'release' }}
        id: tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "new_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "new_tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Get previous tag (PR)
        if: ${{ matrix.enabled && github.event_name == 'pull_request' }}
        id: previoustag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "tag=${PREV_TAG#v}" >> $GITHUB_OUTPUT

      - name: Determine build version
        if: ${{ matrix.enabled }}
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="${{ steps.previoustag.outputs.tag }}-pr${{ github.event.pull_request.number }}"
          fi
          VERSION="${VERSION:-dev}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate SBOMs
        if: ${{ matrix.enabled && matrix.variant == 'JVM' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gradle :apps:epistola:generateSbom -PreleaseVersion=$VERSION
          pnpm --filter @epistola/editor sbom

      - name: Build Docker image
        if: ${{ matrix.enabled }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: gradle :apps:epistola:bootBuildImage -PreleaseVersion=$VERSION ${{ matrix.gradle-args }} --imageName=epistola-suite:$VERSION${{ matrix.image-suffix }}

      - name: Tag and push Docker image (PR)
        if: ${{ matrix.enabled && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'publish') }}
        id: push_pr
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PR_TAG: ${{ steps.previoustag.outputs.tag }}-pr-${{ github.event.pull_request.number }}-${{ github.run_number }}
          SUFFIX: ${{ matrix.image-suffix }}
        run: |
          docker tag epistola-suite:$VERSION$SUFFIX ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$PR_TAG$SUFFIX
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$PR_TAG$SUFFIX
          echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$PR_TAG$SUFFIX | cut -d'@' -f2)" >> $GITHUB_OUTPUT

      - name: Sign Docker image (PR)
        if: ${{ matrix.enabled && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'publish') }}
        env:
          DIGEST: ${{ steps.push_pr.outputs.digest }}
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}

      - name: Tag and push Docker image (release)
        if: ${{ matrix.enabled && github.event_name == 'release' }}
        id: push_release
        env:
          VERSION: ${{ steps.tag.outputs.new_version }}
          SUFFIX: ${{ matrix.image-suffix }}
        run: |
          docker tag epistola-suite:$VERSION$SUFFIX ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION$SUFFIX
          docker tag epistola-suite:$VERSION$SUFFIX ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}$SUFFIX
          docker tag epistola-suite:$VERSION$SUFFIX ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest$SUFFIX
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION$SUFFIX
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}$SUFFIX
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest$SUFFIX
          echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION$SUFFIX | cut -d'@' -f2)" >> $GITHUB_OUTPUT

      - name: Sign Docker image (release)
        if: ${{ matrix.enabled && github.event_name == 'release' }}
        env:
          DIGEST: ${{ steps.push_release.outputs.digest }}
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}

      - name: Attest SBOM to Docker image (release)
        if: ${{ matrix.enabled && matrix.variant == 'JVM' && github.event_name == 'release' }}
        env:
          DIGEST: ${{ steps.push_release.outputs.digest }}
        run: cosign attest --yes --predicate apps/epistola/build/sbom/bom.json --type cyclonedx ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}

      - name: Prepare release artifacts
        if: ${{ matrix.enabled && matrix.variant == 'JVM' && github.event_name == 'release' }}
        run: |
          mkdir -p release-artifacts
          cp apps/epistola/build/sbom/bom.json release-artifacts/epistola-backend-sbom.json
          cp modules/editor/build/sbom.json release-artifacts/epistola-editor-sbom.json

      - name: Upload release artifacts
        if: ${{ matrix.enabled && matrix.variant == 'JVM' && github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" release-artifacts/* --clobber
