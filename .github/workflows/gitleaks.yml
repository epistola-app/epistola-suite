name: Secret Scan

# Hard gate for committed secrets (the .husky/pre-commit hook is the fast local
# check, but it is bypassable with --no-verify). Scans full git history with the
# gitleaks version pinned in .mise.toml; allowlist lives in .gitleaks.toml.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history so the scan covers every commit

      - name: Setup tools with mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Scan for secrets
        run: gitleaks git --no-banner --redact --exit-code 1
