# Production hardening. OAuth2/OIDC comes from SPRING_SECURITY_OAUTH2_* env vars
# (emitted by the Helm chart's oidc.* values) — no auth profile is needed.
#
# Usage: spring.profiles.active=prod

spring:
  flyway:
    clean-disabled: true # NEVER allow clean in production

  # Session configuration
  session:
    timeout: 8h

# Isolate the actuator/management endpoints (health, info, prometheus) onto a
# separate port so they are NOT served on the public application port. The
# management port is meant to stay cluster-internal (never exposed via the
# Service/Ingress); an in-cluster Prometheus scrapes it directly. Kubernetes
# liveness/readiness probes use /livez and /readyz on the MAIN port instead
# (management.endpoint.health.probes.add-additional-paths in application.yaml),
# because a separate management context can report healthy even when the main
# application is not.
management:
  server:
    port: 4040

epistola:
  # Migrations run as a separate step in production (Helm migration Job / init
  # container, or a manual EPISTOLA_RUN_MODE=migrate run). App pods must only
  # validate the schema and fail fast if it is behind — never migrate at boot.
  migration:
    mode: validate

  # Document generation configuration
  generation:
    polling:
      # Scale up concurrent jobs for production throughput
      max-concurrent-jobs: 50

      # Consider jobs stale after 15 minutes
      stale-timeout-minutes: 15

  # Partition maintenance configuration
  partitions:
    # Enable partition maintenance
    enabled: true

    # Retain partitions for 3 months before dropping
    retention-months: 3

    # Run partition maintenance daily at 2 AM (after other cleanups)
    maintenance-cron: "0 0 2 * * ?"

  # Load test cleanup configuration
  loadtest:
    cleanup:
      # Retain load test run metrics for 90 days
      runs-retention-days: 90

      # Run cleanup daily at 3 AM
      cron: "0 0 3 * * ?"
