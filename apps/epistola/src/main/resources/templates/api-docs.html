<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epistola API Docs</title>
</head>
<body>
    <!-- Scalar discovers its mount point via #api-reference[data-configuration];
         a div (not the classic <script> tag) keeps the page free of inline
         scripts under the strict CSP (ADR 0010). -->
    <div
        id="api-reference"
        th:attr="data-url=@{/api-docs/epistola-contract.yaml}"
        data-configuration='{"theme": "default"}'>
    </div>
    <script th:src="@{/js/vendor/scalar-api-reference.js}"></script>
</body>
</html>
