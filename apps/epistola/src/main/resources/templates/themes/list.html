<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <section class="page-header">
            <h1>Themes</h1>
            <div class="page-actions">
                <div th:replace="~{fragments/search :: search-box(
                    placeholder='Search themes...',
                    searchUrl=@{/tenants/{tenantId}/themes/search(tenantId=${tenantId})},
                    targetId='theme-rows'
                )}"></div>
                <a th:if="${auth.has('THEME_EDIT')}"
                   th:href="@{/tenants/{tenantId}/themes/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary">
                    <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                    New Theme
                </a>
            </div>
        </section>

        <section th:if="${catalogs != null && !catalogs.isEmpty()}" class="ep-mb-4">
            <select id="catalog-filter" class="ep-select">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id.toString())}"></option>
            </select>
            <script th:inline="javascript">
                document.getElementById('catalog-filter').addEventListener('change', function() {
                    var tenantId = /*[[${tenantId}]]*/ '';
                    var catalog = this.value;
                    var url = '/tenants/' + tenantId + '/themes';
                    if (catalog) url += '?catalog=' + encodeURIComponent(catalog);
                    window.location.href = url;
                });
            </script>
        </section>

        <section th:if="${#lists.isEmpty(themes)}" class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{fragments/icon :: icon(name='palette', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No themes yet</div>
            <div class="empty-state-description">Create a theme to define the visual styling of your documents.</div>
            <a th:if="${auth.has('THEME_EDIT')}"
               th:href="@{/tenants/{tenantId}/themes/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary ep-mt-4">
                <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                New Theme
            </a>
        </section>

        <table th:if="${!#lists.isEmpty(themes)}" class="ep-table">
            <thead>
                <tr>
                    <th class="ep-table-truncate">Name</th>
                    <th>Catalog</th>
                    <th class="ep-table-truncate">Description</th>
                    <th>Last Modified</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="theme-rows">
                <th:block th:fragment="rows">
                    <tr th:each="theme : ${themes}"
                        th:with="isDefault=${tenant?.defaultThemeKey == theme.id and tenant?.defaultThemeCatalogKey == theme.catalogKey}">
                        <td>
                            <a th:href="@{/tenants/{tenantId}/themes/{catalogId}/{themeId}(tenantId=${tenantId},catalogId=${theme.catalogKey},themeId=${theme.id})}"
                                th:text="${theme.name}" th:title="${theme.name}" class="ep-table-truncate ep-font-medium"></a>
                            <span th:if="${isDefault}" class="badge badge-primary" data-testid="theme-default-badge">Default</span>
                        </td>
                        <td><code class="ep-code" th:text="${theme.catalogKey}"></code></td>
                        <td>
                            <span th:if="${theme.description != null}" th:text="${theme.description}" th:title="${theme.description}" class="ep-table-truncate"></span>
                            <span th:unless="${theme.description != null}" class="ep-text-muted">-</span>
                        </td>
                        <td th:text="${#temporals.format(theme.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="actions">
                            <span th:if="${theme.catalogType.name() == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                            <form th:if="${auth.has('TENANT_SETTINGS') and !isDefault}"
                                  th:hx-post="@{/tenants/{tenantId}/default-theme(tenantId=${tenantId})}"
                                  hx-target="#theme-rows"
                                  hx-swap="innerHTML"
                                  class="ep-inline">
                                <input type="hidden" name="themeId" th:value="${theme.id}">
                                <input type="hidden" name="catalogKey" th:value="${theme.catalogKey}">
                                <button type="submit" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="Set as default">
                                    <th:block th:replace="~{fragments/icon :: icon(name='star', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </form>
                            <form th:if="${auth.has('TENANT_SETTINGS') and isDefault}"
                                  th:hx-post="@{/tenants/{tenantId}/default-theme(tenantId=${tenantId})}"
                                  hx-target="#theme-rows"
                                  hx-swap="innerHTML"
                                  class="ep-inline">
                                <input type="hidden" name="themeId" value="">
                                <button type="submit" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="Clear default theme">
                                    <th:block th:replace="~{fragments/icon :: icon(name='ban', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </form>
                            <th:block th:if="${theme.catalogType.name() == 'AUTHORED'}">
                                <a th:href="@{/tenants/{tenantId}/themes/{catalogId}/{themeId}(tenantId=${tenantId},catalogId=${theme.catalogKey},themeId=${theme.id})}"
                                   class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="Edit theme">
                                    <th:block th:replace="~{fragments/icon :: icon(name='pencil', class='ep-icon ep-icon-sm')}" />
                                </a>
                                <button th:if="${auth.has('THEME_EDIT') and !isDefault}"
                                        type="button"
                                        class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon"
                                        title="Delete theme"
                                        data-confirm-title="Delete Theme"
                                        th:attr="data-confirm-message='Delete theme &quot;' + ${theme.name} + '&quot;? Templates using it will fall back to their own styles.',data-confirm-url=@{/tenants/{tenantId}/themes/{catalogId}/{themeId}/delete(tenantId=${tenantId},catalogId=${theme.catalogKey},themeId=${theme.id})}"
                                        data-confirm-target="#theme-rows"
                                        onclick="openConfirmDialog(this)">
                                    <th:block th:replace="~{fragments/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </th:block>
                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
    </th:block>
</body>
</html>
