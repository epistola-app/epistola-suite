<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Shared list-page chrome (form + header + hx wiring); this page supplies the inner
         swap content (data-table-fragment) and its slots. See ADR 0007. -->
    <th:block th:fragment="content">
        <th:block th:replace="~{epistola-web/list-page :: page(
            basePath=${query.basePath},
            pageTitle='Themes',
            pageDescription=null,
            searchEnabled=true,
            searchPlaceholder='Search themes...',
            searchValue=${query.filters['q']},
            actions=~{::theme-list-actions},
            body=~{::data-table-fragment}
        )}"></th:block>

        <!-- Rendered once in the page chrome, not part of the swapped table. -->
        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
    </th:block>

    <!-- Inner #data-table-container content: page-specific catalog filter + the data-table.
         Rendered directly by the handler on an htmx request, and via list-page on full load. -->
    <th:block th:fragment="data-table-fragment">
        <!-- Page-specific filter bar: a plain form field, submitted by the enclosing form. -->
        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select name="catalog" class="ep-select" data-testid="catalog-filter"
                    aria-label="Filter by catalog" style="max-width: 300px;">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
            </select>
        </div>

        <div th:replace="~{epistola-web/data-table :: data-table(
            columns=${columns},
            query=${query},
            paged=${paged},
            rows=~{::rows},
            pageSizeOptions=${pageSizeOptions},
            emptyState=~{::empty-state}
        )}"></div>
    </th:block>

    <!-- Shown by the data-table when there are no rows (passed in as the emptyState slot). -->
    <th:block th:fragment="empty-state">
        <div class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{epistola-web/icon :: icon(name='palette', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No themes yet</div>
            <div class="empty-state-description">Create a theme to define the visual styling of your documents.</div>
            <a th:if="${auth.has('THEME_EDIT')}"
               th:href="@{/tenants/{tenantId}/themes/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary" style="margin-top: var(--ep-space-4);">
                <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
                New Theme
            </a>
        </div>
    </th:block>

    <!--
        Row markup passed into the data-table via ~{::rows}. Defined OUTSIDE the content
        fragment so it renders only where injected (the table body), not duplicated inline.

        The set/clear-default controls are <button hx-post> (NOT <form>) so they can live
        inside the enclosing list <form> without nesting forms; type="button" stops them
        submitting it, and they target #data-table-container to re-render the whole table.
    -->
    <th:block th:fragment="rows">
        <tr th:each="theme : ${paged.items}" data-testid="theme-row"
            th:with="isDefault=${tenant?.defaultThemeKey == theme.id and tenant?.defaultThemeCatalogKey == theme.catalogKey}">
            <td class="ep-truncate" th:title="${theme.name}">
                <a th:href="@{/tenants/{tenantId}/themes/{catalogId}/{themeId}(tenantId=${tenantId},catalogId=${theme.catalogKey},themeId=${theme.id})}"
                   th:text="${theme.name}" style="font-weight: 500;"></a>
                <span th:if="${isDefault}" class="badge badge-primary" style="margin-left: var(--ep-space-2);" data-testid="theme-default-badge">Default</span>
            </td>
            <td class="ep-truncate" th:title="${theme.catalogKey}"><span class="badge badge-default" th:text="${theme.catalogKey}"></span></td>
            <td class="ep-truncate" th:title="${theme.description}">
                <span th:if="${theme.description != null}" th:text="${theme.description}"></span>
                <span th:unless="${theme.description != null}" class="text-muted">-</span>
            </td>
            <td th:text="${#temporals.format(theme.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td class="actions">
                <span th:if="${theme.catalogType.name() == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                <button th:if="${auth.has('TENANT_SETTINGS') and !isDefault}"
                        type="button"
                        class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="Set as default"
                        th:hx-post="@{/tenants/{tenantId}/default-theme(tenantId=${tenantId},themeId=${theme.id},catalogKey=${theme.catalogKey})}"
                        hx-target="#data-table-container" hx-swap="innerHTML">
                    <th:block th:replace="~{epistola-web/icon :: icon(name='star', class='ep-icon ep-icon-sm')}" />
                </button>
                <button th:if="${auth.has('TENANT_SETTINGS') and isDefault}"
                        type="button"
                        class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="Clear default theme"
                        th:hx-post="@{/tenants/{tenantId}/default-theme(tenantId=${tenantId})}"
                        hx-target="#data-table-container" hx-swap="innerHTML">
                    <th:block th:replace="~{epistola-web/icon :: icon(name='ban', class='ep-icon ep-icon-sm')}" />
                </button>
                <th:block th:if="${theme.catalogType.name() == 'AUTHORED'}">
                    <a th:href="@{/tenants/{tenantId}/themes/{catalogId}/{themeId}(tenantId=${tenantId},catalogId=${theme.catalogKey},themeId=${theme.id})}"
                       class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="Edit theme">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='pencil', class='ep-icon ep-icon-sm')}" />
                    </a>
                    <button th:if="${auth.has('THEME_EDIT') and !isDefault}"
                            type="button"
                            class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon"
                            title="Delete theme"
                            data-confirm-title="Delete Theme"
                            th:attr="data-confirm-message='Delete theme &quot;' + ${theme.name} + '&quot;? Templates using it will fall back to their own styles.',data-confirm-url=@{/tenants/{tenantId}/themes/{catalogId}/{themeId}/delete(tenantId=${tenantId},catalogId=${theme.catalogKey},themeId=${theme.id})}"
                            data-confirm-target="#data-table-container"
                            onclick="openConfirmDialog(this)">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                    </button>
                </th:block>
            </td>
        </tr>
    </th:block>

    <th:block th:fragment="theme-list-actions">
        <a th:if="${auth.has('THEME_EDIT')}"
           th:href="@{/tenants/{tenantId}/themes/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary">
            <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
            New Theme
        </a>
    </th:block>

</body>
</html>
