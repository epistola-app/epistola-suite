<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <link rel="stylesheet" th:href="@{/editor/theme-editor.css}">

        <nav class="breadcrumb">
            <a th:href="@{/tenants/{tenantId}/themes(tenantId=${tenantId})}">Themes</a> &raquo;
            <span th:text="${theme.name}">Theme Name</span>
        </nav>

        <div th:replace="~{fragments/page-header :: page-header(
            pageTitle=${theme.name},
            actions=~{fragments/page-actions :: theme-detail-actions(${tenantId}, ${catalogId}, ${theme}, ${editable})}
        )}"></div>

        <p th:if="${!editable}" class="text-muted" style="margin-bottom: var(--ep-space-4); font-size: var(--ep-text-sm);">
            <span class="badge badge-muted">Read-only</span> This theme belongs to a subscribed catalog.
        </p>

        <div class="detail-section">
            <div class="detail-section-header">
                <h2>Theme Editor</h2>
                <span class="text-muted" style="font-size: var(--ep-text-sm);">
                    Last modified: <span th:text="${#temporals.format(theme.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
                </span>
            </div>
            <div class="detail-section-body">
                <div id="theme-editor-container"></div>
            </div>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/
            window.THEME_EDITOR_CONFIG = /*[[${themeJson}]]*/ {};
            window.TENANT_ID = /*[[${tenantId}]]*/ '';
            window.CATALOG_ID = /*[[${catalogId}]]*/ '';
            window.THEME_ID = /*[[${theme.id}]]*/ '';

            window.getCsrfToken = function() {
                const match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
                return match ? decodeURIComponent(match[1]) : '';
            };
            /*]]>*/
        </script>
        <script type="module" th:inline="javascript">
            const { mountThemeEditor } = await import(/*[[@{/editor/theme-editor.js}]]*/ '/editor/theme-editor.js');

            const container = document.getElementById('theme-editor-container');
            const tenantId = window.TENANT_ID;
            const catalogId = window.CATALOG_ID;
            const themeId = window.THEME_ID;
            const themeData = window.THEME_EDITOR_CONFIG;

            const editable = /*[[${editable}]]*/ true;

            mountThemeEditor({
                container: container,
                theme: themeData,
                readonly: !editable,
                fontOptions: {
                    listFonts: async () => {
                        const resp = await fetch('/tenants/' + tenantId + '/fonts/search?catalog=' + catalogId, {
                            headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                        });
                        if (!resp.ok) throw new Error('Failed to list fonts');
                        return await resp.json();
                    },
                },
                onSave: async (payload) => {
                    const response = await fetch('/tenants/' + tenantId + '/themes/' + catalogId + '/' + themeId, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-XSRF-TOKEN': window.getCsrfToken(),
                        },
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        const text = await response.text().catch(() => response.statusText);
                        throw new Error('Failed to save theme: ' + text);
                    }

                    // Update page title if name changed
                    const result = await response.json();
                    if (result.name) {
                        document.title = result.name + ' - Epistola';
                        const h1 = document.querySelector('.page-header h1');
                        if (h1) h1.textContent = result.name;
                        const breadcrumbName = document.querySelector('.breadcrumb > span:last-child');
                        if (breadcrumbName) breadcrumbName.textContent = result.name;
                    }
                },
            });
        </script>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
    </th:block>
</body>
</html>
