<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <link rel="stylesheet" th:href="@{/editor/theme-editor.css}">


        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle=${theme.name},
            backLinkHref=@{/tenants/{tenantId}/themes(tenantId=${tenantId})},
            backLinkLabel='Themes',
            actions=~{::theme-detail-actions}
        )}"></div>

        <p th:if="${!editable}" class="text-muted" style="margin-bottom: var(--ep-space-4); font-size: var(--ep-text-sm);">
            <span class="badge badge-muted">Read-only</span> This theme belongs to a subscribed catalog.
        </p>

        <div class="ep-panel detail-section">
            <div class="detail-section-header">
                <h2>Theme Editor</h2>
                <span class="text-muted" style="font-size: var(--ep-text-sm);">
                    Last modified: <span th:text="${#temporals.format(theme.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
                </span>
            </div>
            <div class="detail-section-body">
                <div id="theme-editor-container"></div>
            </div>
        </div>

        <script type="application/json" id="theme-editor-config" th:inline="javascript">
        {
            "editorModuleUrl": [[@{/editor/theme-editor.js}]],
            "theme": [[${themeJson}]],
            "tenantId": [[${tenantId}]],
            "catalogId": [[${catalogId}]],
            "themeId": [[${theme.id}]],
            "editable": [[${editable}]]
        }
        </script>
        <script type="module" th:src="@{/js/theme-editor-boot.js}"></script>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
    </th:block>
    <th:block th:fragment="theme-detail-actions">
        <form th:if="${editable}" id="delete-theme-form"
              th:action="@{/tenants/{tenantId}/themes/{catalogId}/{themeId}/delete(tenantId=${tenantId},catalogId=${catalogId},themeId=${theme.id})}"
              method="post">
            <button type="button" class="ep-btn ep-btn-destructive ep-btn-sm" data-testid="delete-action"
                    data-confirm-submit="delete-theme-form"
                    data-confirm-submit-message="Are you sure you want to delete this theme? Templates using this theme will fall back to their own styles."
                    data-confirm-submit-title="Delete Theme"
                    data-confirm-submit-label="Delete">Delete Theme</button>
        </form>
    </th:block>

</body>
</html>
