<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
    The create-theme dialog. Rendered two ways off ThemeHandler:
      - `dialog` — swapped into #dialog-mount by the in-app trigger (hx-get), and
        embedded in the list page's #dialog-mount for direct navigation
        (openDialog=true); behaviors.js opens it.
      - `theme-form` — re-rendered on field errors (dialogFieldErrors retargets
        #create-theme-form), so the form swaps in place with inline errors and
        preserved values, leaving the <dialog> untouched.

    Model it needs: `tenantId` (URLs), `authoredCatalogs` (catalog <select> — a
    distinct key from the list's own `catalogs` filter var), and on error
    re-render `formData`/`errors`.
    -->
    <th:block th:fragment="dialog">
        <div th:replace="~{epistola-web/dialog :: dialog-shell(
            dialogId='create-theme-dialog',
            title='New Theme',
            closeUrl=@{/tenants/{tenantId}/themes(tenantId=${tenantId})},
            content=~{::theme-form})}"></div>
    </th:block>

    <form th:fragment="theme-form" id="create-theme-form"
          method="post" th:action="@{/tenants/{tenantId}/themes(tenantId=${tenantId})}"
          th:hx-post="@{/tenants/{tenantId}/themes(tenantId=${tenantId})}"
          hx-target="#create-theme-form" hx-swap="outerHTML">
        <div th:replace="~{epistola-web/form-error :: form-error(id='create-theme-error')}"></div>
        <div class="ep-dialog-body">
            <div th:if="${authoredCatalogs != null and !authoredCatalogs.isEmpty()}" class="form-group"
                 th:classappend="${errors?.containsKey('catalog')} ? 'error' : ''">
                <label class="ep-label" for="catalog">Catalog</label>
                <select id="catalog" name="catalog" class="ep-select">
                    <option th:each="cat : ${authoredCatalogs}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${#strings.equals(formData?.catalog, cat.id)}"></option>
                </select>
                <span class="form-error" th:if="${errors?.containsKey('catalog')}" th:text="${errors.catalog}"></span>
            </div>
            <div class="form-group" th:classappend="${errors?.containsKey('name')} ? 'error' : ''">
                <label class="ep-label" for="name">Name</label>
                <input type="text" id="name" name="name" class="ep-input"
                       required maxlength="100" placeholder="Corporate Theme" data-slug-source="slug"
                       th:value="${formData?.name}">
                <span class="form-error" th:if="${errors?.containsKey('name')}" th:text="${errors.name}"></span>
            </div>
            <div class="form-group" th:classappend="${errors?.containsKey('slug')} ? 'error' : ''">
                <label class="ep-label" for="slug">Theme ID (Slug)</label>
                <input type="text" id="slug" name="slug" class="ep-input"
                       required pattern="^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
                       minlength="3" maxlength="20"
                       placeholder="corporate"
                       th:value="${formData?.slug}">
                <span class="form-hint">3-20 characters, lowercase letters, numbers, and hyphens only</span>
                <span class="form-error" th:if="${errors?.containsKey('slug')}" th:text="${errors.slug}"></span>
            </div>
            <div class="form-group">
                <label class="ep-label" for="description">Description (optional)</label>
                <textarea id="description" name="description" class="ep-textarea" rows="2"
                          placeholder="Theme description"
                          th:text="${formData?.description}"></textarea>
            </div>
        </div>
        <div class="ep-dialog-footer">
            <button type="button" class="ep-btn ep-btn-ghost"
                    data-close-dialog="create-theme-dialog">Cancel</button>
            <button type="submit" class="ep-btn ep-btn-primary" data-testid="create-form-submit">Create Theme</button>
        </div>
    </form>
</body>
</html>
