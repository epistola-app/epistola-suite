<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">

        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle='Upload Image',
            backLinkHref=@{/tenants/{tenantId}/images(tenantId=${tenantId})},
            backLinkLabel='Images'
        )}"></div>

        <div class="card create-form-card">
            <div class="card-content">
                <form id="asset-upload-form" th:hx-post="@{/tenants/{tenantId}/images(tenantId=${tenantId})}" hx-encoding="multipart/form-data">
                    <div th:replace="~{epistola-web/form-error :: form-error(id='asset-upload-error')}"></div>
                    <div th:if="${catalogs != null && !catalogs.isEmpty()}" class="form-group">
                        <label class="ep-label" for="catalog">Catalog</label>
                        <select id="catalog" name="catalog" class="ep-select" required>
                            <option th:each="cat : ${catalogs}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="ep-label">Image file</label>
                        <!-- data-file-drop-zone: drag/drop assigns the file to the zone's
                             file input; data-file-preview shows the chosen file's name
                             (pages/asset-forms.js). -->
                        <div id="asset-upload-zone" class="asset-upload-zone" data-file-drop-zone>
                            <div class="asset-upload-content">
                                <th:block th:replace="~{epistola-web/icon :: icon(name='upload', class='ep-icon ep-icon-xl')}" />
                                <p>Drag and drop an image here or <label class="asset-upload-link" for="asset-file-input">browse</label></p>
                                <p class="text-muted text-sm">PNG, JPEG, WebP, SVG &mdash; max 5MB</p>
                            </div>
                            <input type="file" id="asset-file-input" name="file"
                                   accept="image/png,image/jpeg,image/webp,image/svg+xml"
                                   style="display: none;"
                                   data-file-preview="file-preview"
                                   required />
                        </div>
                        <div id="file-preview" style="display: none; margin-top: var(--ep-space-3);">
                            <span id="file-name" class="text-sm"></span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="ep-btn ep-btn-primary">Upload</button>
                        <a th:href="@{/tenants/{tenantId}/images(tenantId=${tenantId})}" class="ep-btn ep-btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

    </th:block>
</body>
</html>
