<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div class="page-header">
            <h1>Assets</h1>
            <div class="page-actions">
                <div th:replace="~{fragments/search :: search-box(
                    placeholder='Search assets...',
                    searchUrl=@{/tenants/{tenantId}/assets/search(tenantId=${tenantId})},
                    targetId='asset-grid-items'
                )}"></div>
                <a th:href="@{/tenants/{tenantId}/assets/new(tenantId=${tenantId})}" class="btn btn-primary">
                    <th:block th:replace="~{fragments/icon :: icon(name='upload', class='ep-icon ep-icon-sm')}" />
                    Upload Asset
                </a>
            </div>
        </div>

        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select id="catalog-filter" class="ep-input" style="max-width: 300px;">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id.toString())}"></option>
            </select>
            <script th:inline="javascript">
                document.getElementById('catalog-filter').addEventListener('change', function() {
                    var tenantId = /*[[${tenantId}]]*/ '';
                    var catalog = this.value;
                    var url = '/tenants/' + tenantId + '/assets';
                    if (catalog) url += '?catalog=' + encodeURIComponent(catalog);
                    window.location.href = url;
                });
            </script>
        </div>

        <!-- Upload area is on a dedicated page -->

        <div id="asset-grid-items">
            <th:block th:fragment="asset-grid-items">
                <div th:if="${#lists.isEmpty(assets)}" class="empty-state">
                    <div class="empty-state-icon">
                        <th:block th:replace="~{fragments/icon :: icon(name='image', class='ep-icon ep-icon-xl')}" />
                    </div>
                    <div class="empty-state-title">No assets yet</div>
                    <div class="empty-state-description">Upload images to use in your document templates.</div>
                </div>

                <div th:if="${!#lists.isEmpty(assets)}" class="asset-grid">
                    <div th:each="asset : ${assets}" class="asset-card">
                        <div class="asset-card-preview">
                            <img th:src="@{/tenants/{tenantId}/assets/{catalogId}/{assetId}/content(tenantId=${tenantId},catalogId=${asset.catalogKey},assetId=${asset.id})}"
                                 th:alt="${asset.name}"
                                 loading="lazy" />
                        </div>
                        <div class="asset-card-info">
                            <div class="asset-card-name" th:text="${asset.name}" th:title="${asset.name}"></div>
                            <div class="asset-card-meta">
                                <span th:text="${asset.mediaType.name()}"></span>
                                <span th:text="${asset.width != null ? asset.width + ' x ' + asset.height + ' px' : 'SVG'}"></span>
                                <span th:text="${asset.sizeBytes < 1024 ? asset.sizeBytes + ' B' : (asset.sizeBytes < 1048576 ? #numbers.formatDecimal(asset.sizeBytes / 1024.0, 1, 1) + ' KB' : #numbers.formatDecimal(asset.sizeBytes / 1048576.0, 1, 1) + ' MB')}"></span>
                            </div>
                        </div>
                        <div class="asset-card-actions">
                            <span th:if="${asset.catalogType.name() == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                            <th:block th:if="${asset.catalogType.name() == 'AUTHORED'}">
                                <button type="button"
                                        class="btn btn-sm btn-icon btn-ghost btn-ghost-destructive"
                                        title="Delete asset"
                                        data-confirm-title="Delete Asset"
                                        th:attr="data-confirm-message='Delete asset &quot;' + ${asset.name} + '&quot;? This action cannot be undone.',data-confirm-url=@{/tenants/{tenantId}/assets/{catalogId}/{assetId}/delete(tenantId=${tenantId},catalogId=${asset.catalogKey},assetId=${asset.id})}"
                                        data-confirm-target="#asset-grid-items"
                                        onclick="openConfirmDialog(this)">
                                    <th:block th:replace="~{fragments/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </th:block>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />

    </th:block>
</body>
</html>
