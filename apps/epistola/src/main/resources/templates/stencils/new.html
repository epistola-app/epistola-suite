<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        New Stencil create form. Mirrors templates/new and themes/new.
        Dialog-only (no full-page fallback): a shared `fields` set feeds the dialog
        shell (`createDialog`) and the self-swapping `createForm` re-rendered on
        validation error.
    -->
    <th:block th:fragment="createDialog(catalogs)">
        <dialog id="create-stencil-dialog" class="ep-dialog ep-dialog-wide" data-testid="create-stencil-dialog" data-create-dialog
                hx-headers='{"X-Epistola-Error-Region": "dialog-error"}'>
            <div class="ep-dialog-header">
                <h3>New Stencil</h3>
            </div>
            <th:block th:replace="~{fragments/dialog :: generalError}"></th:block>
            <th:block th:replace="~{stencils/new :: createForm}"></th:block>
        </dialog>
    </th:block>

    <form th:fragment="createForm" id="create-stencil-form"
          th:hx-post="@{/tenants/{tenantId}/stencils(tenantId=${tenantId})}"
          hx-target="this" hx-swap="outerHTML" hx-boost="false">
        <div class="ep-dialog-body">
            <th:block th:replace="~{stencils/new :: fields}"></th:block>
        </div>
        <th:block th:replace="~{fragments/dialog :: dialogFooter('Create Stencil', 'create-form-submit')}"></th:block>
    </form>

    <th:block th:fragment="fields">
        <div th:if="${catalogs != null && !catalogs.isEmpty()}" class="form-group">
            <label class="ep-label" for="catalog">Catalog</label>
            <select id="catalog" name="catalog" class="ep-select">
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${formData?.catalog == cat.id}"></option>
            </select>
            <span class="form-error" id="stencil-error-catalog" th:attr="data-error=${errors?.containsKey('catalog')}" th:text="${errors?.get('catalog')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="name">Name</label>
            <input type="text" id="name" name="name" class="ep-input"
                   required maxlength="100" placeholder="Corporate Header" data-slug-source="slug"
                   th:value="${formData?.name}">
            <span class="form-error" id="stencil-error-name" th:attr="data-error=${errors?.containsKey('name')}" th:text="${errors?.get('name')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="slug">Stencil ID (Slug)</label>
            <input type="text" id="slug" name="slug" class="ep-input"
                   required pattern="^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
                   minlength="3" maxlength="50"
                   placeholder="corporate-header"
                   th:value="${formData?.slug}">
            <span class="form-hint">3-50 characters, lowercase letters, numbers, and hyphens only</span>
            <span class="form-error" id="stencil-error-slug" th:attr="data-error=${errors?.containsKey('slug')}" th:text="${errors?.get('slug')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="description">Description (optional)</label>
            <textarea id="description" name="description" class="ep-textarea" rows="2"
                      placeholder="Stencil description"
                      th:text="${formData?.description}"></textarea>
            <span class="form-error" id="stencil-error-description" th:attr="data-error=${errors?.containsKey('description')}" th:text="${errors?.get('description')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="tags">Tags (optional)</label>
            <input type="text" id="tags" name="tags" class="ep-input"
                   placeholder="header, corporate, branding"
                   th:value="${formData?.tags}">
            <span class="form-hint">Comma-separated tags for categorization</span>
            <span class="form-error" id="stencil-error-tags" th:attr="data-error=${errors?.containsKey('tags')}" th:text="${errors?.get('tags')}"></span>
        </div>
    </th:block>
</body>
</html>
