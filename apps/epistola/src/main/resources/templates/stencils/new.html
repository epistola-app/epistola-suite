<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
    The create-stencil dialog. Rendered two ways off StencilHandler:
      - `dialog` — swapped into #dialog-mount by the in-app trigger (hx-get), and
        embedded in the list page's #dialog-mount for direct navigation
        (openDialog=true); behaviors.js opens it.
      - `stencil-form` — re-rendered on field errors (dialogFieldErrors retargets
        #create-stencil-form), so the form swaps in place with inline errors and
        preserved values, leaving the <dialog> untouched.

    Model it needs: `tenantId` (URLs), `authoredCatalogs` (catalog <select> — a
    distinct key from the list's own `catalogs` filter var), and on error
    re-render `formData`/`errors`.
    -->
    <th:block th:fragment="dialog">
        <div th:replace="~{epistola-web/dialog :: dialog-shell(
            dialogId='create-stencil-dialog',
            title='New Stencil',
            closeUrl=@{/tenants/{tenantId}/stencils(tenantId=${tenantId})},
            content=~{::stencil-form})}"></div>
    </th:block>

    <!--
    HTMX-ONLY form: `th:hx-post` only, no `method`/`th:action`. Unlike the theme /
    template / environment create dialogs, this form MUST NOT fall back to a plain
    form POST. The POST endpoint (StencilHandler.create) reserves the non-HTMX path
    for the editor's JSON API (createJson → 201); a no-JS, form-encoded POST would
    hit that path and fail. So this is the one create dialog that deliberately drops
    the progressive-enhancement fallback.
    -->
    <form th:fragment="stencil-form" id="create-stencil-form"
          th:hx-post="@{/tenants/{tenantId}/stencils(tenantId=${tenantId})}"
          hx-target="#create-stencil-form" hx-swap="outerHTML">
        <div th:replace="~{epistola-web/form-error :: form-error(id='create-stencil-error')}"></div>
        <div class="ep-dialog-body">
            <div th:if="${authoredCatalogs != null and !authoredCatalogs.isEmpty()}" class="form-group">
                <label class="ep-label" for="catalog">Catalog</label>
                <select id="catalog" name="catalog" class="ep-select">
                    <option th:each="cat : ${authoredCatalogs}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${#strings.equals(formData?.catalog, cat.id)}"></option>
                </select>
            </div>
            <div class="form-group" th:classappend="${errors?.containsKey('name')} ? 'error' : ''">
                <label class="ep-label" for="name">Name</label>
                <input type="text" id="name" name="name" class="ep-input"
                       required maxlength="255" placeholder="Corporate Header" data-slug-source="slug"
                       th:value="${formData?.name}">
                <span class="form-error" th:if="${errors?.containsKey('name')}" th:text="${errors.name}"></span>
            </div>
            <div class="form-group" th:classappend="${errors?.containsKey('slug')} ? 'error' : ''">
                <label class="ep-label" for="slug">Stencil ID (Slug)</label>
                <input type="text" id="slug" name="slug" class="ep-input"
                       required pattern="^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
                       minlength="3" maxlength="50"
                       placeholder="corporate-header"
                       th:value="${formData?.slug}">
                <span class="form-hint">3-50 characters, lowercase letters, numbers, and hyphens only</span>
                <span class="form-error" th:if="${errors?.containsKey('slug')}" th:text="${errors.slug}"></span>
            </div>
            <div class="form-group">
                <label class="ep-label" for="description">Description (optional)</label>
                <textarea id="description" name="description" class="ep-textarea" rows="2"
                          placeholder="Stencil description"
                          th:text="${formData?.description}"></textarea>
            </div>
            <div class="form-group">
                <label class="ep-label" for="tags">Tags (optional)</label>
                <input type="text" id="tags" name="tags" class="ep-input"
                       placeholder="header, corporate, branding"
                       th:value="${formData?.tags}">
                <span class="form-hint">Comma-separated tags for categorization</span>
            </div>
        </div>
        <div class="ep-dialog-footer">
            <button type="button" class="ep-btn ep-btn-ghost"
                    data-close-dialog="create-stencil-dialog">Cancel</button>
            <button type="submit" class="ep-btn ep-btn-primary" data-testid="create-form-submit">Create Stencil</button>
        </div>
    </form>
</body>
</html>
