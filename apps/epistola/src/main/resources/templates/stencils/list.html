<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle='Stencils',
            searchPlaceholder='Search stencils...',
            searchUrl=@{/tenants/{tenantId}/stencils/search(tenantId=${tenantId})},
            searchTargetId='stencil-rows',
            actions=~{::stencil-list-actions}
        )}"></div>

        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select id="catalog-filter" class="ep-select" style="max-width: 300px;"
                    th:attr="data-catalog-filter-base=@{/tenants/{tenantId}/stencils(tenantId=${tenantId})}">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
            </select>
        </div>

        <div th:if="${#lists.isEmpty(stencils)}" class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{epistola-web/icon :: icon(name='puzzle', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No stencils yet</div>
            <div class="empty-state-description">Create a stencil to build reusable template components.</div>
            <button th:if="${auth.has('STENCIL_EDIT')}" type="button"
                    class="ep-btn ep-btn-primary" style="margin-top: var(--ep-space-4);"
                    th:hx-get="@{/tenants/{tenantId}/stencils/new(tenantId=${tenantId})}"
                    hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                    data-testid="stencil-create-open">
                <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
                New Stencil
            </button>
        </div>

        <table th:if="${!#lists.isEmpty(stencils)}" class="ep-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Catalog</th>
                    <th>Description</th>
                    <th>Tags</th>
                    <th>Last Modified</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="stencil-rows">
                <th:block th:fragment="rows">
                    <tr th:each="stencil : ${stencils}">
                        <td>
                            <a th:href="@{/tenants/{tenantId}/stencils/{catalogId}/{stencilId}(tenantId=${tenantId},catalogId=${stencil.catalogKey},stencilId=${stencil.id})}"
                               th:text="${stencil.name}" style="font-weight: 500;"></a>
                        </td>
                        <td><span class="badge badge-default" th:text="${stencil.catalogKey}"></span></td>
                        <td>
                            <span th:if="${stencil.description != null}" th:text="${stencil.description}" class="text-truncate"></span>
                            <span th:unless="${stencil.description != null}" class="text-muted">-</span>
                        </td>
                        <td>
                            <span th:each="tag : ${stencil.tags}" class="badge" th:text="${tag}" style="margin-right: var(--ep-space-1);"></span>
                        </td>
                        <td th:text="${#temporals.format(stencil.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="actions">
                            <a th:href="@{/tenants/{tenantId}/stencils/{catalogId}/{stencilId}(tenantId=${tenantId},catalogId=${stencil.catalogKey},stencilId=${stencil.id})}"
                               class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="View stencil">
                                <th:block th:replace="~{epistola-web/icon :: icon(name='eye', class='ep-icon ep-icon-sm')}" />
                            </a>
                            <span th:if="${stencil.catalogType.name() == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                            <th:block th:if="${stencil.catalogType.name() == 'AUTHORED'}">
                                <button th:if="${auth.has('STENCIL_EDIT')}"
                                        type="button"
                                        class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon"
                                        title="Delete stencil"
                                        data-confirm-title="Delete Stencil"
                                        th:attr="data-confirm-message='Delete stencil &quot;' + ${stencil.name} + '&quot;? Templates using copies of this stencil are not affected.',data-confirm-url=@{/tenants/{tenantId}/stencils/{catalogId}/{stencilId}/delete(tenantId=${tenantId},catalogId=${stencil.catalogKey},stencilId=${stencil.id})}"
                                        data-confirm-target="#stencil-rows">
                                    <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </th:block>
                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />

        <!-- Dialog mount: the create dialog is swapped in here by the trigger
             (hx-get → #dialog-mount) and opened by static/js/behaviors.js. On
             direct navigation to /new the handler renders THIS page with
             openDialog=true, embedding the dialog as a plain <dialog> that the
             same JS opens on load.
             GOTCHA: the openDialog guard MUST wrap the th:replace on an OUTER
             element — th:replace (precedence 100) runs before th:if (300), so
             the two on the SAME element would include the dialog unconditionally.
             See docs/dialog-forms.md. -->
        <div id="dialog-mount" data-dialog-mount>
            <th:block th:if="${openDialog}">
                <th:block th:replace="~{stencils/new :: dialog}"></th:block>
            </th:block>
        </div>
    </th:block>
    <th:block th:fragment="stencil-list-actions">
        <button th:if="${auth.has('STENCIL_EDIT')}" type="button" class="ep-btn ep-btn-primary"
                th:hx-get="@{/tenants/{tenantId}/stencils/new(tenantId=${tenantId})}"
                hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                data-testid="stencil-create-open-action">
            <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
            New Stencil
        </button>
    </th:block>

</body>
</html>
