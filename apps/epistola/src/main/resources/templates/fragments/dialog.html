<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
  <!--
    Shared chrome for the create-dialog pattern. Defining the trigger and footer
    here (rather than per entity) keeps the nested-shell-safe attributes in one
    place: every dialog-opening trigger carries hx-boost="false" so a boosted
    full page can never be swapped into #dialog-host, and every Cancel is a
    no-request <button data-dialog-close> (never a boosted <a> that would inherit
    the form's hx-target). See docs/htmx.md "Create Forms: Modal Dialogs".
  -->

  <!--
    Opens a create/upload dialog: GETs the …/new fragment into #dialog-host.
    `canCreate` gates rendering (pass ${auth.has('<PERMISSION>')} or true).
    `icon` is the epistola-web/icon name ('plus' for create, 'upload' for uploads).
  -->
  <a th:fragment="openTrigger(url, label, icon, testid, canCreate)"
     th:if="${canCreate}"
     th:href="${url}" th:hx-get="${url}"
     hx-target="#dialog-host" hx-swap="innerHTML" hx-boost="false"
     class="ep-btn ep-btn-primary" th:data-testid="${testid}">
    <th:block th:replace="~{epistola-web/icon :: icon(name=${icon}, class='ep-icon')}" />
    <span th:text="${label}">New</span>
  </a>

  <!--
    Create-dialog footer: a no-request Cancel button + the submit. Used inside the
    `createForm` fragment of each <entity>/new.html.
  -->
  <div th:fragment="dialogFooter(submitLabel, submitTestid)" class="ep-dialog-footer">
    <button type="button" class="ep-btn ep-btn-ghost" data-dialog-close>Cancel</button>
    <button type="submit" class="ep-btn ep-btn-primary"
            th:data-testid="${submitTestid}" th:text="${submitLabel}">Create</button>
  </div>

  <!--
    Shared general (non-field) error region for a create dialog. Empty (and so
    invisible) until the shared UiExceptionFilter swaps an alert into it out-of-band
    for any error a handler throws (a `FormInputException`, an operational rejection,
    an unexpected failure). fragments/htmx clears it before each submit. The dialog
    that includes this must carry hx-headers='{"X-Epistola-Error-Region":"dialog-error"}'
    so its form submits tell the filter where to render.
  -->
  <div th:fragment="generalError" id="dialog-error" data-testid="dialog-error" class="ep-dialog-general-error"></div>

  <!--
    The out-of-band replacement that UiHandlerExceptionResolver renders into the
    general error region on a thrown error: same id (so HTMX swaps it in place) plus
    the alert. Thymeleaf escapes the region id and the message — no hand-built HTML.
  -->
  <th:block th:fragment="dialogError">
    <div th:id="${regionId}" th:attr="data-testid=${regionId}" hx-swap-oob="true" class="ep-dialog-general-error">
      <div class="alert alert-error" role="alert" th:text="${message}"></div>
    </div>
  </th:block>
</body>
</html>
