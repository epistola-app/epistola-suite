<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!--
        HTMX with CSRF token configuration.
        Include this fragment in templates that use HTMX.
    -->
    <th:block th:fragment="htmx">
        <script th:src="@{/js/vendor/htmx.min.js}"></script>
        <script>
            // Global helper to get CSRF token from cookie
            // Spring Security uses CookieCsrfTokenRepository with XSRF-TOKEN cookie
            window.getCsrfToken = function() {
                var match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
                return match ? decodeURIComponent(match[1]) : '';
            };

            // Configure HTMX to include CSRF token in all requests
            document.addEventListener('htmx:configRequest', function(event) {
                var token = window.getCsrfToken();
                if (token) {
                    event.detail.headers['X-XSRF-TOKEN'] = token;
                }
            });

            // ── Confirm dialog ──────────────────────────────────────────────

            /**
             * Opens a confirm dialog for destructive actions.
             * Reads data-confirm-* attributes from the trigger element:
             *   data-confirm-title   - Dialog title
             *   data-confirm-message - Dialog body text
             *   data-confirm-url     - POST URL for the action
             *   data-confirm-target  - CSS selector for HTMX target to swap on success
             */
            window.openConfirmDialog = function(trigger) {
                var dialog = document.getElementById('confirm-dialog');
                var titleEl = document.getElementById('confirm-dialog-title');
                var messageEl = document.getElementById('confirm-dialog-message');
                var errorEl = document.getElementById('confirm-dialog-error');
                var footerEl = document.getElementById('confirm-dialog-footer');

                titleEl.textContent = trigger.getAttribute('data-confirm-title') || 'Confirm';
                messageEl.textContent = trigger.getAttribute('data-confirm-message') || 'Are you sure?';
                errorEl.style.display = 'none';
                errorEl.textContent = '';

                // Build a fresh form with HTMX attributes
                var form = document.createElement('form');
                form.setAttribute('hx-post', trigger.getAttribute('data-confirm-url'));
                form.setAttribute('hx-target', trigger.getAttribute('data-confirm-target'));
                form.setAttribute('hx-swap', trigger.getAttribute('data-confirm-swap') || 'innerHTML');

                var submitBtn = document.createElement('button');
                submitBtn.type = 'submit';
                submitBtn.className = 'ep-btn ep-btn-destructive';
                submitBtn.textContent = 'Delete';
                submitBtn.setAttribute('data-testid', 'confirm-dialog-confirm');
                form.appendChild(submitBtn);

                footerEl.innerHTML = '';
                footerEl.appendChild(form);

                // Let HTMX process the dynamically created form
                htmx.process(form);

                // Handle success: close dialog
                form.addEventListener('htmx:afterRequest', function(event) {
                    if (event.detail.successful) {
                        closeConfirmDialog();
                    }
                });

                // Handle error: show error message in dialog
                form.addEventListener('htmx:responseError', function(event) {
                    try {
                        var body = JSON.parse(event.detail.xhr.responseText);
                        errorEl.textContent = body.detail || body.error || 'An error occurred.';
                    } catch (e) {
                        errorEl.textContent = 'An error occurred.';
                    }
                    errorEl.style.display = 'block';
                });

                dialog.showModal();
            };

            window.closeConfirmDialog = function() {
                var dialog = document.getElementById('confirm-dialog');
                if (dialog) {
                    dialog.close();
                }
            };

            // ── Close any open dialog on HX-Trigger: closeDialog ───────────
            document.addEventListener('closeDialog', function() {
                document.querySelectorAll('dialog[open]').forEach(function(d) { d.close(); });
            });

            // ── Form dialogs (create forms loaded into #dialog-host) ───────
            //
            // A trigger loads a <dialog> fragment into #dialog-host, e.g.
            //   <a hx-get=".../new" hx-target="#dialog-host" hx-swap="innerHTML">New…</a>
            // Once the fragment lands we open the dialog it contains. Buttons
            // marked [data-dialog-close] close their enclosing dialog. On a
            // successful submit the handler either sends HX-Redirect (navigate
            // away) or HX-Trigger: closeDialog (swap a list, close in place) —
            // a validation error re-renders the form inside the open dialog.
            document.addEventListener('htmx:afterSwap', function(event) {
                // htmx may fire afterSwap on the host or on the swapped-in node;
                // match either and open the dialog that landed in #dialog-host.
                var target = event.target;
                if (!target || !target.closest) return;
                var host = target.closest('#dialog-host') ||
                    (target.id === 'dialog-host' ? target : null);
                if (!host) return;
                var dialog = host.querySelector('dialog');
                if (dialog && typeof dialog.showModal === 'function' && !dialog.open) {
                    dialog.showModal();
                }
            });

            document.addEventListener('click', function(event) {
                var closer = event.target.closest('[data-dialog-close]');
                if (closer) {
                    var dialog = closer.closest('dialog');
                    if (dialog) dialog.close();
                }
            });

            // ── Clear the dialog's general error region before each submit ──
            // The shared UiExceptionFilter swaps a server/general error into
            // #dialog-error (out of band) whenever a dialog handler throws; clear
            // it before the next request so a stale message never lingers across
            // submits (field errors render in their own per-field spans).
            document.addEventListener('htmx:beforeRequest', function() {
                var region = document.getElementById('dialog-error');
                if (region) region.innerHTML = '';
            });

            // ── Deep-linkable create dialog: reconcile <dialog data-create-dialog> to ?create ──
            //
            // The URL is the single source of truth for whether the create dialog
            // is open. Opening pushes `?create` (the server sends HX-Push-Url on
            // the .../new response, merged with any existing params). This reconcile
            // path is strictly ONE-DIRECTIONAL: it only READS the URL and syncs the
            // dialog's open/closed state to match. It must never write history — that
            // is what prevents the close↔history loop (a close that wrote history
            // would re-trigger reconcile, which would close again, …).
            function epistolaReconcileCreateDialog() {
                var dialog = document.querySelector('dialog[data-create-dialog]');
                if (!dialog || typeof dialog.showModal !== 'function') return;
                // The dialog names its URL param via data-dialog-param (default
                // 'create'); the upload forms (fonts, assets) use 'upload'.
                var param = dialog.dataset.dialogParam || 'create';
                var wantsOpen = new URLSearchParams(window.location.search).has(param);
                // Source of truth is modal-ness (top layer), NOT the `open` attribute.
                // A restored history snapshot (back/forward) serializes a non-modal
                // `<dialog open>` — the open attribute survives, the top-layer/modal
                // state does not — so the dialog can report `.open === true` while not
                // actually being a modal. Reconcile on `:modal` so forward re-promotes it.
                var isModal = dialog.matches(':modal');
                if (wantsOpen && !isModal) {
                    // showModal() throws if the `open` attribute is already set, so clear
                    // a stale one first. removeAttribute does NOT fire a `close` event
                    // (unlike .close()), so this never re-enters the close→history path.
                    if (dialog.hasAttribute('open')) dialog.removeAttribute('open');
                    dialog.showModal();
                } else if (!wantsOpen && dialog.open) {
                    dialog.close();
                }
            }

            // Direct load, refresh, and boosted navigation land here.
            document.addEventListener('DOMContentLoaded', epistolaReconcileCreateDialog);
            // Back/forward restore: htmx restores a cached innerHTML snapshot (which
            // never re-runs inline scripts and gives a server-rendered <dialog> as
            // CLOSED, since modal state lives in the browser's top layer, not markup),
            // so we must re-open here too.
            document.addEventListener('htmx:historyRestore', epistolaReconcileCreateDialog);

            // Closing the create dialog (Cancel → .close(), ESC, or the closeDialog
            // event) is pure DOM and does NOT touch the URL — so the URL would keep
            // lying about an open dialog. Strip `create` here, on the dialog's own
            // `close` event, so every close path is covered once.
            //   - replaceState (not history.back): safe even on a deep link where
            //     `?create` is the FIRST history entry (back would leave the app).
            //   - preserve every other param: closing the dialog must not drop the
            //     templates list's own catalog filter.
            //   - guard on `create` being present: a reconcile-initiated close (back
            //     button) already cleared the URL, so there is nothing to write —
            //     this guard is the other half of the no-loop rule.
            document.addEventListener('close', function(event) {
                var dialog = event.target;
                if (!dialog.matches || !dialog.matches('dialog[data-create-dialog]')) return;

                var param = dialog.dataset.dialogParam || 'create';
                var params = new URLSearchParams(window.location.search);
                if (params.has(param)) {
                    params.delete(param);
                    var qs = params.toString();
                    window.history.replaceState(
                        window.history.state,
                        '',
                        window.location.pathname + (qs ? '?' + qs : '')
                    );
                }

                // A deep-link dialog is server-rendered into the list page (outside
                // #dialog-host); drop it on close so a later "New" click can inject a
                // fresh copy into #dialog-host without colliding on the shared id.
                if (!dialog.closest('#dialog-host')) {
                    dialog.remove();
                }
            }, true); // capture: the `close` event does not bubble

            // ── Promise-based confirm (replaces native confirm()) ─────────
            //
            // Returns a Promise<boolean> that resolves true when the user
            // clicks confirm, false on cancel / ESC / backdrop click.
            //
            // Options:
            //   title        — dialog heading (default "Confirm")
            //   confirmLabel — confirm button text (default "Delete")
            //   confirmClass — confirm button class (default "ep-btn-destructive")
            //   cancelLabel  — cancel button text (default "Cancel")
            //
            window.epistolaConfirm = function(message, options) {
                if (!options) options = {};
                return new Promise(function(resolve) {
                    var dialog = document.getElementById('confirm-dialog');
                    if (!dialog) {
                        resolve(window.confirm(message));
                        return;
                    }

                    var titleEl = document.getElementById('confirm-dialog-title');
                    var messageEl = document.getElementById('confirm-dialog-message');
                    var errorEl = document.getElementById('confirm-dialog-error');
                    var footerEl = document.getElementById('confirm-dialog-footer');

                    titleEl.textContent = options.title || 'Confirm';
                    messageEl.textContent = message;
                    errorEl.style.display = 'none';
                    errorEl.textContent = '';

                    footerEl.innerHTML = '';

                    var cancelBtn = document.createElement('button');
                    cancelBtn.type = 'button';
                    cancelBtn.className = 'ep-btn ep-btn-ghost';
                    cancelBtn.textContent = options.cancelLabel || 'Cancel';
                    cancelBtn.setAttribute('data-testid', 'confirm-dialog-cancel');
                    footerEl.appendChild(cancelBtn);

                    var confirmBtn = document.createElement('button');
                    confirmBtn.type = 'button';
                    confirmBtn.className = 'ep-btn ' + (options.confirmClass || 'ep-btn-destructive');
                    confirmBtn.textContent = options.confirmLabel || 'Delete';
                    confirmBtn.setAttribute('data-testid', 'confirm-dialog-confirm');
                    footerEl.appendChild(confirmBtn);

                    var resolved = false;

                    function done(value) {
                        if (resolved) return;
                        resolved = true;
                        dialog.removeEventListener('close', onClose);
                        dialog.close();
                        resolve(value);
                    }

                    function onCancel() { done(false); }
                    function onConfirm() { done(true); }
                    function onClose() { done(false); }

                    cancelBtn.addEventListener('click', onCancel);
                    confirmBtn.addEventListener('click', onConfirm);
                    dialog.addEventListener('close', onClose);

                    dialog.showModal();
                });
            };

            // ── Intercept hx-confirm to use our dialog instead of native ──
            document.addEventListener('htmx:confirm', function(event) {
                var question = event.detail && event.detail.question;
                if (!question) return;

                event.preventDefault();

                window.epistolaConfirm(question, {
                    title: 'Confirm',
                    confirmLabel: 'Confirm',
                    confirmClass: 'ep-btn-primary',
                }).then(function(ok) {
                    if (ok) {
                        event.detail.issueRequest(true);
                    }
                });
            });

            // ── Global safety net for unhandled errors ──────────────────────

            document.addEventListener('htmx:responseError', function(event) {
                var xhr = event.detail.xhr;
                if (!xhr) return;

                var message;
                if (xhr.status === 403) {
                    try {
                        var body = JSON.parse(xhr.responseText);
                        message = body.detail || body.error || 'You don\'t have permission to perform this action.';
                    } catch (e) {
                        message = 'You don\'t have permission to perform this action.';
                    }
                } else if (xhr.status >= 500) {
                    message = 'An unexpected error occurred. Please try again.';
                } else {
                    return;
                }

                // Don't show global error if the target is inside the confirm dialog
                var target = event.detail.target;
                if (target && target.closest && target.closest('#confirm-dialog')) return;

                // Insert error banner at top of main content
                var main = document.querySelector('#main-content') || document.querySelector('main');
                if (!main) return;

                // Remove any existing global error banner
                var existing = main.querySelector('.global-error-banner');
                if (existing) existing.remove();

                var banner = document.createElement('div');
                banner.className = 'alert alert-error global-error-banner';
                banner.style.marginBottom = 'var(--ep-space-4)';
                var span = document.createElement('span');
                span.textContent = message;
                banner.appendChild(span);
                var closeBtn = document.createElement('button');
                closeBtn.type = 'button';
                closeBtn.className = 'ep-btn ep-btn-sm ep-btn-ghost';
                closeBtn.style.marginLeft = 'auto';
                closeBtn.textContent = '\u00d7';
                closeBtn.addEventListener('click', function() { banner.remove(); });
                banner.appendChild(closeBtn);
                banner.style.display = 'flex';
                banner.style.alignItems = 'center';
                main.insertBefore(banner, main.firstChild);
            });
        </script>
    </th:block>
</head>
</html>
