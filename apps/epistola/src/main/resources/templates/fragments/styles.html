<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!--
        Shared CSS includes: Inter font, design system tokens, base resets, shared components, and app styles.
        Include this fragment in all templates that need styling.
    -->
    <th:block th:fragment="styles">
        <link rel="icon" type="image/svg+xml" th:href="@{/design-system/epistola-logo.svg}">
        <!-- Inter is self-hosted (vendored from @fontsource/inter, OFL 1.1) — no
             requests to Google Fonts (CSP allows no external origins; ADR 0010). -->
        <link rel="stylesheet" th:href="@{/fonts/inter/400.css}">
        <link rel="stylesheet" th:href="@{/fonts/inter/500.css}">
        <link rel="stylesheet" th:href="@{/fonts/inter/600.css}">
        <link rel="stylesheet" th:href="@{/fonts/inter/700.css}">
        <link rel="stylesheet" th:href="@{/design-system/tokens.css}">
        <link rel="stylesheet" th:href="@{/design-system/base.css}">
        <link rel="stylesheet" th:href="@{/design-system/components.css}">
        <link rel="stylesheet" th:href="@{/css/main.css}">
    </th:block>
</head>
</html>
