<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <th:block th:fragment="footer">
        <footer class="app-footer">
            <span th:text="${appName} ?: 'Epistola'">Epistola</span> <span class="version" th:text="'v' + (${appVersion} ?: 'dev')">v0.0.0</span>
            <span class="separator">|</span>
            <a th:href="@{/api-docs}" target="_blank" rel="noopener">API Docs</a>
            <span class="separator">|</span>
            <button type="button"
                    class="link-button"
                    id="changelog-button"
                    aria-haspopup="dialog"
                    aria-controls="changelog-dialog"
                    command="show-modal"
                    commandfor="changelog-dialog"
                    th:hx-get="@{/changelog}"
                    hx-target="#changelog-dialog-content"
                    hx-swap="innerHTML"
                    hx-trigger="click once">
                Changelog
            </button>
            <span sec:authorize="isAuthenticated()" class="user-info">
                <span class="separator">|</span>
                <span sec:authentication="name">username</span>
                <span class="separator">|</span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="link-button">Logout</button>
                </form>
            </span>
        </footer>

        <dialog id="changelog-dialog" class="ep-dialog ep-dialog-wide" aria-labelledby="changelog-title">
            <div id="changelog-dialog-content">
                <p class="changelog-loading">Loading changelog...</p>
            </div>
        </dialog>

        <!-- Session expiry dialogs (only for authenticated users) -->
        <th:block sec:authorize="isAuthenticated()">
            <th:block th:replace="~{fragments/session-dialogs :: session-dialogs}" />
            <script type="module" th:inline="javascript">
                const { initSessionMonitor } = await import(/*[[@{/js/modules/session-monitor.js}]]*/ '/js/modules/session-monitor.js');
                initSessionMonitor();
            </script>
        </th:block>

        <!-- Feedback FAB + console capture (tenant-scoped pages only) -->
        <th:block th:if="${tenantId != null}" sec:authorize="isAuthenticated()">
            <script th:src="@{/feedback/feedback-capture.js}"></script>
            <script type="module" th:inline="javascript">
                const { initFeedbackFab } = await import(/*[[@{/feedback/feedback-fab.js}]]*/ '/feedback/feedback-fab.js');
                initFeedbackFab(/*[[${tenantId}]]*/ 'tenant');
            </script>
        </th:block>
    </th:block>
</body>
</html>
