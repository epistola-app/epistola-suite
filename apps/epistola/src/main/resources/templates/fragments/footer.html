<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <th:block th:fragment="footer">
        <footer class="app-footer">
            <span th:text="${appName} ?: 'Epistola'">Epistola</span> <span class="version" th:text="'v' + (${appVersion} ?: 'dev')">v0.0.0</span>
            <span class="separator">|</span>
            <a th:href="@{/api-docs/index.html}">API Docs</a>
            <span sec:authorize="isAuthenticated()" class="user-info">
                <span class="separator">|</span>
                <span sec:authentication="name">username</span>
                <span class="separator">|</span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="link-button">Logout</button>
                </form>
            </span>
        </footer>

        <!-- Session expiry dialogs (only for authenticated users) -->
        <th:block sec:authorize="isAuthenticated()">
            <th:block th:replace="~{fragments/session-dialogs :: session-dialogs}" />
            <script type="module" th:inline="javascript">
                const { initSessionMonitor } = await import(/*[[@{/js/modules/session-monitor.js}]]*/ '/js/modules/session-monitor.js');
                initSessionMonitor();
            </script>
        </th:block>

        <!-- Feedback FAB + console capture (tenant-scoped pages only) -->
        <th:block th:if="${tenantId != null}" sec:authorize="isAuthenticated()">
            <script th:src="@{/js/modules/feedback-capture.js}"></script>
            <button type="button" class="feedback-fab"
                    title="Submit Feedback"
                    hx-get th:hx-get="@{/tenants/{tenantId}/feedback/submit-form(tenantId=${tenantId})}"
                    hx-target="#feedback-fab-dialog-content"
                    hx-swap="innerHTML"
                    onclick="document.getElementById('feedback-fab-dialog').showModal()">
                <th:block th:replace="~{fragments/icon :: icon(name='message-square-plus', class='ep-icon')}" />
            </button>
            <dialog id="feedback-fab-dialog" class="ep-dialog ep-dialog-wide">
                <div id="feedback-fab-dialog-content">
                    <!-- Loaded via HTMX -->
                </div>
            </dialog>
            <script>
                document.getElementById('feedback-fab-dialog')?.addEventListener('click', function(e) {
                    if (e.target === this) this.close();
                });
            </script>
        </th:block>
    </th:block>
</body>
</html>
