<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <th:block th:fragment="footer">
        <footer class="app-footer">
            <span th:text="${appName} ?: 'Epistola'">Epistola</span> <span class="version" th:text="'v' + (${appVersion} ?: 'dev')">v0.0.0</span>
            <span class="separator">|</span>
            <a th:href="@{/api-docs}" target="_blank" rel="noopener">API Docs</a>
            <span class="separator">|</span>
            <button type="button"
                    class="link-button"
                    id="changelog-button"
                    aria-haspopup="dialog"
                    aria-controls="changelog-dialog"
                    data-open-dialog="changelog-dialog"
                    th:hx-get="@{/changelog}"
                    hx-target="#changelog-dialog-content"
                    hx-swap="innerHTML"
                    hx-trigger="click once">
                Changelog
            </button>
            <span sec:authorize="isAuthenticated()" class="user-info">
                <span class="separator">|</span>
                <a th:href="@{/profile}" sec:authentication="name" title="Your profile">username</a>
                <span class="separator">|</span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="ep-btn ep-btn-primary ep-btn-sm">Logout</button>
                </form>
            </span>
        </footer>

        <dialog id="changelog-dialog" class="ep-dialog ep-dialog-wide" aria-labelledby="changelog-title">
            <div id="changelog-dialog-content">
                <p class="changelog-loading">Loading changelog...</p>
            </div>
        </dialog>

        <!-- Session expiry dialogs (only for authenticated users) -->
        <th:block sec:authorize="isAuthenticated()">
            <th:block th:replace="~{fragments/session-dialogs :: session-dialogs}" />
            <script type="module" th:src="@{/js/modules/session-monitor-boot.js}"></script>
        </th:block>


        <!-- Module-contributed footer chrome (see FooterContributor / FooterFragmentResolver) -->
        <th:block sec:authorize="isAuthenticated()">
            <th:block th:each="frag : ${footerFragments}">
                <th:block th:replace="~{__${frag.ref}__}" />
            </th:block>
        </th:block>
    </th:block>
</body>
</html>
