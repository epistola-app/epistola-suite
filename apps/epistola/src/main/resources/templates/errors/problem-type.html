<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${problemType.title + ' | Epistola Error'}">Epistola Error</title>
    <th:block th:replace="~{fragments/styles :: styles}" />
</head>
<body class="problem-type-page-body">
<main class="problem-type-page-main">
    <article class="problem-type-card">
        <div class="problem-type-eyebrow">Epistola Problem Type</div>
        <h1 class="problem-type-title" th:text="${problemType.title}">Problem Title</h1>
        <p th:text="${problemType.description}">Problem description.</p>

        <dl class="problem-type-details">
            <dt>Type URI</dt>
            <dd><code class="ep-code ep-code-info" th:text="${problemType.type}">https://epistola.app/errors/example</code></dd>
            <dt>HTTP status</dt>
            <dd><code class="ep-code ep-code-info" th:text="${problemType.status.value()}">400</code></dd>
            <dt>Machine code</dt>
            <dd><code class="ep-code ep-code-info" th:text="${problemType.code}">EXAMPLE</code></dd>
        </dl>

        <section th:if="${!problemType.extensionFields.isEmpty()}">
            <h2>Extension Members</h2>
            <ul class="problem-type-extensions">
                <li th:each="field : ${problemType.extensionFields}"><code class="ep-code ep-code-info" th:text="${field}">code</code></li>
            </ul>
        </section>

        <section>
            <h2>Example</h2>
            <pre class="problem-type-example" th:text="${exampleJson}">{}</pre>
        </section>

        <p><a href="/api-docs">View the full API reference</a></p>
    </article>
</main>
</body>
</html>
