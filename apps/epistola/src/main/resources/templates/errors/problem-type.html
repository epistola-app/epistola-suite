<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${problemType.title + ' | Epistola Error'}">Epistola Error</title>
    <link rel="stylesheet" th:href="@{/design-system/tokens.css}">
    <style>
        body {
            color: var(--ep-foreground);
            font-family: var(--ep-font-sans);
            line-height: 1.6;
            margin: 0;
            background: var(--ep-background);
        }

        main {
            max-width: 840px;
            margin: 0 auto;
            padding: 56px 24px 72px;
        }

        a {
            color: var(--ep-primary-strong);
        }

        .eyebrow {
            color: var(--ep-muted-foreground);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .card {
            background: var(--ep-card);
            border: 1px solid var(--ep-border-color);
            border-radius: 20px;
            box-shadow: var(--ep-shadow-xl);
            padding: 32px;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            line-height: 1.05;
            margin: 8px 0 16px;
        }

        code {
            background: var(--ep-muted);
            border-radius: 6px;
            color: var(--ep-foreground);
            padding: 2px 6px;
        }

        dl {
            display: grid;
            gap: 16px;
            grid-template-columns: max-content 1fr;
            margin: 28px 0;
        }

        dt {
            color: var(--ep-muted-foreground);
            font-weight: 700;
        }

        dd {
            margin: 0;
        }

        .extensions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0;
        }

        .extensions li {
            background: var(--ep-muted);
            border-radius: 999px;
            list-style: none;
            padding: 4px 10px;
        }

        pre {
            background: var(--ep-stone-900);
            border-radius: 14px;
            color: var(--ep-stone-50);
            overflow-x: auto;
            padding: 18px;
        }
    </style>
</head>
<body>
<main>
    <article class="card">
        <div class="eyebrow">Epistola Problem Type</div>
        <h1 th:text="${problemType.title}">Problem Title</h1>
        <p th:text="${problemType.description}">Problem description.</p>

        <dl>
            <dt>Type URI</dt>
            <dd><code th:text="${problemType.type}">https://epistola.app/errors/example</code></dd>
            <dt>HTTP status</dt>
            <dd><code th:text="${problemType.status.value()}">400</code></dd>
            <dt>Machine code</dt>
            <dd><code th:text="${problemType.code}">EXAMPLE</code></dd>
        </dl>

        <section th:if="${!problemType.extensionFields.isEmpty()}">
            <h2>Extension Members</h2>
            <ul class="extensions">
                <li th:each="field : ${problemType.extensionFields}"><code th:text="${field}">code</code></li>
            </ul>
        </section>

        <section>
            <h2>Example</h2>
            <pre th:text="${exampleJson}">{}</pre>
        </section>

        <p><a href="/api-docs">View the full API reference</a></p>
    </article>
</main>
</body>
</html>
