<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <nav th:fragment="nav" id="app-nav" class="app-nav">
        <!-- Top bar (always visible) -->
        <div class="app-nav-bar">
            <div class="app-nav-left">
                <a th:href="@{/tenants/{id}(id=${tenantId})}" class="app-nav-logo" title="Tenant home" aria-label="Epistola — Tenant home">
                    <img class="ep-icon ep-icon-lg" th:src="@{/design-system/epistola-logo.svg}" alt="Epistola" />
                    <span>Epistola</span>
                </a>

                <!-- Module-contributed dropdowns (see NavMenuAggregator / NavContributor) -->
                <div class="app-nav-links">
                    <div th:each="group : ${navGroups}" class="app-nav-dropdown"
                         th:classappend="${group.active} ? ' active' : ''">
                        <button class="app-nav-dropdown-trigger" type="button"
                                th:attr="data-testid=${group.testId}"
                                aria-expanded="false" aria-haspopup="true">
                            <span th:text="${group.label}">Group</span>
                            <th:block th:replace="~{epistola-web/icon :: icon(name='chevron-down', class='ep-icon ep-icon-sm')}" />
                        </button>
                        <div class="app-nav-dropdown-menu" role="menu">
                            <a th:each="item : ${group.items}"
                               th:href="@{/tenants/{id}/{p}(id=${tenantId}, p=${item.pathSuffix})}"
                               class="app-nav-dropdown-item" role="menuitem"
                               th:attr="data-testid=${'nav-item-' + item.sectionKey}"
                               th:classappend="${item.active} ? ' active' : ''">
                                <span th:text="${item.label}">Item</span>
                                <span th:if="${item.stage.badgeClass != null}"
                                      th:class="${'badge ' + item.stage.badgeClass}"
                                      th:text="${item.stage.label}">Beta</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Mobile hamburger toggle -->
                <button class="app-nav-hamburger" aria-label="Toggle navigation" aria-expanded="false" aria-controls="mobile-nav">
                    <th:block th:replace="~{epistola-web/icon :: icon(name='menu', class='ep-icon')}" />
                </button>
            </div>

            <div class="app-nav-right">
                <a th:href="@{/}" class="app-nav-tenant" title="Switch tenant">
                    <th:block th:replace="~{epistola-web/icon :: icon(name='building-2', class='ep-icon ep-icon-sm')}" />
                    <span th:text="${tenantName} ?: 'Tenant'">Tenant</span>
                </a>

                <div class="app-nav-user" sec:authorize="isAuthenticated()">
                    <a th:href="@{/profile}" class="app-nav-username" sec:authentication="name" title="Your profile">user</a>
                    <span class="app-nav-separator">|</span>
                    <a th:href="@{/api-docs}" class="app-nav-link-sm" hx-boost="false" target="_blank" rel="noopener">API Docs</a>
                    <span class="app-nav-separator">|</span>
                    <form th:action="@{/logout}" method="post" style="display: inline;" hx-boost="false">
                        <button type="submit" class="ep-btn ep-btn-primary ep-btn-sm">Logout</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Mobile menu panel (below header, overlay) -->
        <div id="mobile-nav" class="app-nav-mobile" role="menu">
            <div class="app-nav-mobile-backdrop"></div>
            <div class="app-nav-mobile-panel">
                <div th:each="group : ${navGroups}" class="app-nav-mobile-group">
                    <div class="app-nav-mobile-label" th:text="${group.label}">Group</div>
                    <a th:each="item : ${group.items}"
                       th:href="@{/tenants/{id}/{p}(id=${tenantId}, p=${item.pathSuffix})}"
                       class="app-nav-mobile-item"
                       th:attr="data-testid=${'nav-mobile-item-' + item.sectionKey}"
                       th:classappend="${item.active} ? ' active' : ''"
                       role="menuitem">
                        <span th:text="${item.label}">Item</span>
                        <span th:if="${item.stage.badgeClass != null}"
                              th:class="${'badge ' + item.stage.badgeClass}"
                              th:text="${item.stage.label}">Beta</span>
                    </a>
                </div>
                <div class="app-nav-mobile-footer">
                    <a th:href="@{/profile}" class="app-nav-mobile-item" role="menuitem">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='user', class='ep-icon ep-icon-sm')}" />
                        Profile
                    </a>
                    <a th:href="@{/}" class="app-nav-mobile-item" role="menuitem">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='building-2', class='ep-icon ep-icon-sm')}" />
                        Switch tenant
                    </a>
                    <a th:href="@{/api-docs}" class="app-nav-mobile-item" hx-boost="false" target="_blank" rel="noopener" role="menuitem">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='external-link', class='ep-icon ep-icon-sm')}" />
                        API Docs
                    </a>
                    <form th:action="@{/logout}" method="post" hx-boost="false">
                        <button type="submit" class="app-nav-mobile-item app-nav-mobile-logout" role="menuitem">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='log-out', class='ep-icon ep-icon-sm')}" />
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </nav>
</body>
</html>
