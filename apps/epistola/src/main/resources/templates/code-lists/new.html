<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        New code list create dialog. Dialog-only (no full-page fallback): the
        source-type toggle + inline-entries editor script lives in `fields` so it
        runs whether rendered directly or injected into #dialog-host (htmx executes
        swapped-in <script>). `createForm` re-renders itself on validation error.
    -->
    <th:block th:fragment="createDialog(catalogs)">
        <dialog id="create-code-list-dialog" class="ep-dialog ep-dialog-wide" data-testid="create-code-list-dialog" data-create-dialog
                hx-headers='{"X-Epistola-Error-Region": "dialog-error"}'>
            <div class="ep-dialog-header">
                <h3>New code list</h3>
            </div>
            <th:block th:replace="~{fragments/dialog :: generalError}"></th:block>
            <th:block th:replace="~{code-lists/new :: createForm}"></th:block>
        </dialog>
    </th:block>

    <form th:fragment="createForm" id="code-list-form"
          th:hx-post="@{/tenants/{tenantId}/code-lists(tenantId=${tenantId})}"
          hx-target="this" hx-swap="outerHTML" hx-boost="false">
        <div class="ep-dialog-body">
            <th:block th:replace="~{code-lists/new :: fields}"></th:block>
        </div>
        <th:block th:replace="~{fragments/dialog :: dialogFooter('Create code list', 'create-form-submit')}"></th:block>
    </form>

    <th:block th:fragment="fields">
        <div th:if="${catalogs != null && !catalogs.isEmpty()}" class="form-group">
            <label class="ep-label" for="catalog">Catalog</label>
            <select id="catalog" name="catalog" class="ep-select" required>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${formData?.catalog == cat.id}"></option>
            </select>
        </div>

        <div class="form-group">
            <label class="ep-label" for="displayName">Display Name</label>
            <input type="text" id="displayName" name="displayName" class="ep-input"
                   required placeholder="Languages" data-slug-source="slug"
                   th:value="${formData?.displayName}">
            <span class="form-error" id="code-list-error-displayName" th:attr="data-error=${errors?.containsKey('displayName')}" th:text="${errors?.get('displayName')}"></span>
        </div>

        <div class="form-group">
            <label class="ep-label" for="slug">Slug</label>
            <input type="text" id="slug" name="slug" class="ep-input"
                   required pattern="^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
                   minlength="3" maxlength="64"
                   placeholder="languages"
                   th:value="${formData?.slug}">
            <span class="form-hint">3-64 characters, lowercase letters, numbers, and hyphens.</span>
            <span class="form-error" id="code-list-error-slug" th:attr="data-error=${errors?.containsKey('slug')}" th:text="${errors?.get('slug')}"></span>
        </div>

        <div class="form-group">
            <label class="ep-label" for="description">Description (optional)</label>
            <textarea id="description" name="description" class="ep-textarea" rows="2"
                      th:text="${formData?.description}"></textarea>
        </div>

        <fieldset class="form-group" style="border: 0; padding: 0; margin: 0 0 var(--ep-space-4);">
            <legend class="ep-label">Source</legend>
            <div class="source-radio-group">
                <label>
                    <input type="radio" name="sourceType" value="INLINE"
                           th:checked="${formData?.sourceType == null or formData?.sourceType == 'INLINE'}"
                           data-source-type="INLINE">
                    Inline &mdash; enter entries directly
                </label>
                <label>
                    <input type="radio" name="sourceType" value="URL"
                           th:checked="${formData?.sourceType == 'URL'}"
                           data-source-type="URL">
                    URL &mdash; fetch from https endpoint, refresh on demand
                </label>
            </div>
        </fieldset>
        <style>
            /* base.css gives all inputs `font: inherit`, which makes radio
               glyphs scale with surrounding font-size. Pin them to 1rem. */
            .source-radio-group {
                display: flex;
                flex-direction: column;
                gap: var(--ep-space-2);
                margin-top: var(--ep-space-2);
            }
            .source-radio-group label {
                display: flex;
                align-items: center;
                gap: var(--ep-space-2);
                font-size: var(--ep-text-sm);
                cursor: pointer;
            }
            .source-radio-group input[type="radio"] {
                width: 1rem;
                height: 1rem;
                flex: 0 0 1rem;
                margin: 0;
                font-size: 1rem;
            }
        </style>

        <div class="form-group source-pane" data-source-pane="URL" hidden>
            <label class="ep-label" for="sourceUrl">Source URL</label>
            <input type="url" id="sourceUrl" name="sourceUrl" class="ep-input"
                   placeholder="https://example.com/regions.json"
                   th:value="${formData?.sourceUrl}">
            <span class="form-hint">Expected payload: JSON array of {code, label, sortOrder?, hidden?} objects.</span>
            <span class="form-error" id="code-list-error-sourceUrl" th:attr="data-error=${errors?.containsKey('sourceUrl')}" th:text="${errors?.get('sourceUrl')}"></span>
        </div>

        <fieldset class="form-group source-pane" data-source-pane="INLINE"
                  style="border: 0; padding: 0; margin: 0 0 var(--ep-space-4);">
            <legend class="ep-label">Entries</legend>
            <div th:if="${errors?.containsKey('entries')}" class="alert alert-error" style="margin-bottom: var(--ep-space-3);">
                <span th:text="${errors.entries}"></span>
            </div>
            <table class="ep-table" id="entries-table">
                <thead>
                    <tr><th>Code</th><th>Label</th><th></th></tr>
                </thead>
                <tbody id="entries-tbody">
                    <!-- Rows injected by the inline-editor script below -->
                </tbody>
            </table>
            <button type="button" class="ep-btn ep-btn-sm ep-btn-outline" id="add-entry-btn">
                <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon ep-icon-sm')}" />
                Add entry
            </button>
            <input type="hidden" id="entriesJson" name="entriesJson" th:value="${formData?.entriesJson}">
        </fieldset>

        <script>
        (function () {
            /* ── Source-type radio toggles inline-vs-url panes ─────────────── */
            var radios = document.querySelectorAll('input[name="sourceType"]');
            var panes = document.querySelectorAll('[data-source-pane]');
            function refreshPanes() {
                var selected = document.querySelector('input[name="sourceType"]:checked');
                var kind = selected ? selected.value : 'INLINE';
                panes.forEach(function (p) {
                    p.hidden = (p.getAttribute('data-source-pane') !== kind);
                });
            }
            radios.forEach(function (r) { r.addEventListener('change', refreshPanes); });
            refreshPanes();

            /* ── Inline entries editor ─────────────────────────────────────── */
            var tbody = document.getElementById('entries-tbody');
            var hidden = document.getElementById('entriesJson');
            var rows = [];

            function syncHidden() {
                hidden.value = JSON.stringify(rows.map(function (r) {
                    return { code: r.code, label: r.label, sortOrder: r.sortOrder };
                }));
            }

            function render() {
                tbody.innerHTML = '';
                rows.forEach(function (r, idx) {
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td><input id="entry-code-' + idx + '" type="text" class="ep-input" placeholder="code" aria-label="Entry code" required></td>' +
                        '<td><input id="entry-label-' + idx + '" type="text" class="ep-input" placeholder="Label" aria-label="Entry label" required></td>' +
                        '<td><button type="button" class="ep-btn ep-btn-sm ep-btn-ghost ep-btn-destructive">Remove</button></td>';
                    var inputs = tr.querySelectorAll('input');
                    inputs[0].value = r.code;
                    inputs[1].value = r.label;
                    inputs[0].addEventListener('input', function (e) { rows[idx].code = e.target.value.trim(); syncHidden(); });
                    inputs[1].addEventListener('input', function (e) { rows[idx].label = e.target.value; syncHidden(); });
                    tr.querySelector('button').addEventListener('click', function () {
                        rows.splice(idx, 1);
                        render();
                        syncHidden();
                    });
                    tbody.appendChild(tr);
                });
            }

            document.getElementById('add-entry-btn').addEventListener('click', function () {
                rows.push({ code: '', label: '', sortOrder: rows.length });
                render();
                syncHidden();
            });

            // Hydrate from formData on validation failure
            try {
                var existing = hidden.value ? JSON.parse(hidden.value) : [];
                if (existing.length) { rows = existing; render(); syncHidden(); }
                else { document.getElementById('add-entry-btn').click(); }
            } catch (e) {
                document.getElementById('add-entry-btn').click();
            }
        })();
        </script>
    </th:block>
</body>
</html>
