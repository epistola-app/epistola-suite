<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- Shared list-page chrome (form + header + hx wiring); this page supplies the inner
         swap content (data-table-fragment) and its slots. See ADR 0007. -->
    <th:block th:fragment="content">
        <th:block th:replace="~{epistola-web/list-page :: page(
            basePath=${query.basePath},
            pageTitle='Code lists',
            pageDescription=null,
            searchEnabled=true,
            searchPlaceholder='Search code lists...',
            searchValue=${query.filters['q']},
            actions=~{::code-list-list-actions},
            body=~{::data-table-fragment}
        )}"></th:block>
    </th:block>

    <!-- Inner #data-table-container content: page-specific catalog filter + the data-table. -->
    <th:block th:fragment="data-table-fragment">
        <!-- Page-specific filter bar: a plain form field, submitted by the enclosing form. -->
        <div th:replace="~{epistola-web/catalog-filter :: catalog-filter(catalogs=${catalogs}, selectedCatalog=${selectedCatalog})}"></div>

        <div th:replace="~{epistola-web/data-table :: data-table(
            columns=${columns},
            query=${query},
            paged=${paged},
            rows=~{::rows},
            pageSizeOptions=${pageSizeOptions},
            emptyState=~{::empty-state}
        )}"></div>
    </th:block>

    <!-- Shown by the data-table when there are no rows (passed in as the emptyState slot). -->
    <th:block th:fragment="empty-state">
        <div class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{epistola-web/icon :: icon(name='list', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No code lists yet</div>
            <div class="empty-state-description">
                Code lists are reusable collections of code + label entries that attributes can bind to.
                Use them to constrain variant attribute values to a curated set.
            </div>
            <a th:if="${auth.has('TENANT_SETTINGS')}"
               th:href="@{/tenants/{tenantId}/code-lists/new(tenantId=${tenantId})}" class="btn btn-primary"
               style="margin-top: var(--ep-space-4);">
                <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
                New Code List
            </a>
        </div>
    </th:block>

    <!-- Row markup passed into the data-table via ~{::rows}. Defined OUTSIDE the content
         fragment so it renders only where injected (the table body). -->
    <th:block th:fragment="rows">
        <tr th:each="cl : ${paged.items}" data-testid="code-list-row">
            <td class="ep-truncate" th:title="${cl.slug}">
                <a th:href="@{/tenants/{tenantId}/code-lists/{catalogId}/{slug}(tenantId=${tenantId},catalogId=${cl.catalogKey},slug=${cl.slug})}"
                   th:text="${cl.slug}"></a>
            </td>
            <td class="ep-truncate" th:title="${cl.catalogKey}">
                <span class="badge" th:text="${cl.catalogKey}"
                      th:classappend="${cl.catalogType?.name() == 'SUBSCRIBED'} ? 'badge-muted' : 'badge-default'"></span>
            </td>
            <td class="ep-truncate" style="font-weight: 500;" th:title="${cl.displayName}" th:text="${cl.displayName}"></td>
            <td>
                <span class="badge badge-outline" th:text="${cl.sourceType}"></span>
            </td>
            <td>
                <span th:if="${cl.lastRefreshedAt != null}"
                      th:text="${#temporals.format(cl.lastRefreshedAt, 'yyyy-MM-dd HH:mm')}"></span>
                <span th:if="${cl.lastRefreshedAt == null}" class="text-muted">never</span>
                <span th:if="${cl.lastRefreshError != null}"
                      class="badge badge-error"
                      th:title="${cl.lastRefreshError}"
                      style="margin-left: var(--ep-space-2);">refresh failed</span>
            </td>
            <td class="actions">
                <a th:href="@{/tenants/{tenantId}/code-lists/{catalogId}/{slug}(tenantId=${tenantId},catalogId=${cl.catalogKey},slug=${cl.slug})}"
                   class="ep-btn ep-btn-sm ep-btn-ghost">View</a>
            </td>
        </tr>
    </th:block>

    <th:block th:fragment="code-list-list-actions">
        <a th:if="${auth.has('TENANT_SETTINGS')}"
           th:href="@{/tenants/{tenantId}/code-lists/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary">
            <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
            New Code List
        </a>
    </th:block>

</body>
</html>
