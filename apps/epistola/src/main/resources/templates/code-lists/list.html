<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <section class="page-header">
            <h1>Code lists</h1>
            <div class="page-actions">
                <a th:if="${auth.has('TENANT_SETTINGS')}"
                   th:href="@{/tenants/{tenantId}/code-lists/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary">
                    <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                    New Code List
                </a>
            </div>
        </section>

        <section th:if="${catalogs != null && !catalogs.isEmpty()}" class="catalog-filter-bar">
            <select id="catalog-filter" class="ep-select">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id.toString())}"></option>
            </select>
            <script th:inline="javascript">
                document.getElementById('catalog-filter').addEventListener('change', function() {
                    var tenantId = /*[[${tenantId}]]*/ '';
                    var catalog = this.value;
                    var url = '/tenants/' + tenantId + '/code-lists';
                    if (catalog) url += '?catalog=' + encodeURIComponent(catalog);
                    window.location.href = url;
                });
            </script>
        </section>

        <section th:if="${#lists.isEmpty(codeLists)}" class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{fragments/icon :: icon(name='list', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No code lists yet</div>
            <div class="empty-state-description">
                Code lists are reusable collections of code + label entries that attributes can bind to.
                Use them to constrain variant attribute values to a curated set.
            </div>
            <a th:if="${auth.has('TENANT_SETTINGS')}"
               th:href="@{/tenants/{tenantId}/code-lists/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary empty-state-action">
                <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                New Code List
            </a>
        </section>

        <table th:if="${!#lists.isEmpty(codeLists)}" class="ep-table">
            <thead>
                <tr>
                    <th class="ep-table-truncate">Slug</th>
                    <th>Catalog</th>
                    <th class="ep-table-truncate">Display Name</th>
                    <th>Source</th>
                    <th>Last refreshed</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cl : ${codeLists}">
                    <td>
                        <a th:href="@{/tenants/{tenantId}/code-lists/{catalogId}/{slug}(tenantId=${tenantId},catalogId=${cl.catalogKey},slug=${cl.slug})}"
                           th:text="${cl.slug}" th:title="${cl.slug}" class="ep-table-truncate"></a>
                    </td>
                    <td>
                        <span class="badge badge-muted" th:text="${cl.catalogKey}"></span>
                    </td>
                    <td class="code-list-name ep-table-truncate" th:text="${cl.displayName}" th:title="${cl.displayName}"></td>
                    <td>
                        <span class="badge badge-outline" th:text="${cl.sourceType}"></span>
                    </td>
                    <td>
                        <span th:if="${cl.lastRefreshedAt != null}"
                              th:text="${#temporals.format(cl.lastRefreshedAt, 'yyyy-MM-dd HH:mm')}"></span>
                        <span th:if="${cl.lastRefreshedAt == null}" class="code-list-never">never</span>
                        <span th:if="${cl.lastRefreshError != null}"
                              class="badge badge-destructive refresh-error-badge"
                              th:title="${cl.lastRefreshError}">refresh failed</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/tenants/{tenantId}/code-lists/{catalogId}/{slug}(tenantId=${tenantId},catalogId=${cl.catalogKey},slug=${cl.slug})}"
                           class="ep-btn ep-btn-ghost ep-btn-sm">View</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </th:block>
</body>
</html>
