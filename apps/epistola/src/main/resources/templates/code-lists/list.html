<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle='Code lists',
            actions=~{::code-list-list-actions}
        )}"></div>

        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select id="catalog-filter" class="ep-select" style="max-width: 300px;"
                    th:attr="data-catalog-filter-base=@{/tenants/{tenantId}/code-lists(tenantId=${tenantId})}">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
            </select>
        </div>

        <div th:if="${#lists.isEmpty(codeLists)}" class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{epistola-web/icon :: icon(name='list', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No code lists yet</div>
            <div class="empty-state-description">
                Code lists are reusable collections of code + label entries that attributes can bind to.
                Use them to constrain variant attribute values to a curated set.
            </div>
            <button type="button" class="ep-btn ep-btn-primary" th:if="${auth.has('TENANT_SETTINGS')}"
                    th:hx-get="@{/tenants/{tenantId}/code-lists/new(tenantId=${tenantId})}"
                    hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                    data-testid="code-list-create-open"
                    style="margin-top: var(--ep-space-4);">
                <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
                New Code List
            </button>
        </div>

        <table th:if="${!#lists.isEmpty(codeLists)}" class="ep-table">
            <thead>
                <tr>
                    <th>Slug</th>
                    <th>Catalog</th>
                    <th>Display Name</th>
                    <th>Source</th>
                    <th>Last refreshed</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cl : ${codeLists}">
                    <td>
                        <a th:href="@{/tenants/{tenantId}/code-lists/{catalogId}/{slug}(tenantId=${tenantId},catalogId=${cl.catalogKey},slug=${cl.slug})}"
                           th:text="${cl.slug}"></a>
                    </td>
                    <td>
                        <span class="badge" th:text="${cl.catalogKey}"
                              th:classappend="${cl.catalogType?.name() == 'SUBSCRIBED'} ? 'badge-muted' : 'badge-default'"></span>
                    </td>
                    <td style="font-weight: 500;" th:text="${cl.displayName}"></td>
                    <td>
                        <span class="badge badge-outline" th:text="${cl.sourceType}"></span>
                    </td>
                    <td>
                        <span th:if="${cl.lastRefreshedAt != null}"
                              th:text="${#temporals.format(cl.lastRefreshedAt, 'yyyy-MM-dd HH:mm')}"></span>
                        <span th:if="${cl.lastRefreshedAt == null}" class="text-muted">never</span>
                        <span th:if="${cl.lastRefreshError != null}"
                              class="badge badge-error"
                              th:title="${cl.lastRefreshError}"
                              style="margin-left: var(--ep-space-2);">refresh failed</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/tenants/{tenantId}/code-lists/{catalogId}/{slug}(tenantId=${tenantId},catalogId=${cl.catalogKey},slug=${cl.slug})}"
                           class="ep-btn ep-btn-sm ep-btn-ghost">View</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Dialog mount: the create dialog is swapped in here by the trigger
             (hx-get → #dialog-mount) and opened by static/js/behaviors.js. On
             direct navigation to /new the handler renders THIS page with
             openDialog=true, embedding the dialog as a plain <dialog> that the
             same JS opens on load.
             GOTCHA: the openDialog guard MUST wrap the th:replace on an OUTER
             element — th:replace (precedence 100) runs before th:if (300), so
             the two on the SAME element would include the dialog unconditionally.
             See docs/dialog-forms.md. -->
        <div id="dialog-mount" data-dialog-mount>
            <th:block th:if="${openDialog}">
                <th:block th:replace="~{code-lists/new :: dialog}"></th:block>
            </th:block>
        </div>
    </th:block>
    <th:block th:fragment="code-list-list-actions">
        <button type="button" class="ep-btn ep-btn-primary" th:if="${auth.has('TENANT_SETTINGS')}"
                th:hx-get="@{/tenants/{tenantId}/code-lists/new(tenantId=${tenantId})}"
                hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                data-testid="code-list-create-open-action">
            <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
            New Code List
        </button>
    </th:block>

</body>
</html>
