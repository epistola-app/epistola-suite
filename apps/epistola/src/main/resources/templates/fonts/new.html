<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        Upload Font form (multipart hx-post). Success sends HX-Redirect; a
        validation error swaps the per-field + general error spans via OOB
        (hx-swap-oob) so the chosen face files survive — see the error-* fragments
        below and FontHandler.upload. The dialog reuses the same form + script via
        the shared `fields` fragment; htmx runs the <script> when the dialog is
        injected into #dialog-host.
    -->
    <th:block th:fragment="createDialog(catalogs)">
        <dialog id="create-font-dialog" class="ep-dialog ep-dialog-wide" data-testid="create-font-dialog" data-create-dialog data-dialog-param="upload">
            <div class="ep-dialog-header">
                <h3>Upload Font</h3>
            </div>
            <th:block th:replace="~{fonts/new :: createForm}"></th:block>
        </dialog>
    </th:block>

    <form th:fragment="createForm" id="font-upload-form"
          th:hx-post="@{/tenants/{tenantId}/fonts(tenantId=${tenantId})}"
          hx-encoding="multipart/form-data" hx-boost="false">
        <div class="ep-dialog-body">
            <th:block th:replace="~{fonts/new :: fields}"></th:block>
        </div>
        <th:block th:replace="~{fragments/dialog :: dialogFooter('Upload', 'create-form-submit')}"></th:block>
    </form>

    <th:block th:fragment="fields">
        <div th:if="${catalogs != null && !catalogs.isEmpty()}" class="form-group">
            <label class="ep-label" for="catalog">Catalog</label>
            <select id="catalog" name="catalog" class="ep-select" required>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
            <span class="form-error" id="font-error-catalog" th:attr="data-error=${errors?.containsKey('catalog')}" th:text="${errors?.get('catalog')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="slug">Slug</label>
            <input type="text" id="slug" name="slug" class="ep-input"
                   placeholder="acme-sans" pattern="[a-z][a-z0-9]*(-[a-z0-9]+)*"
                   minlength="2" maxlength="64" required />
            <span class="form-hint">Lowercase letters, digits, hyphens. 2&ndash;64 chars.</span>
            <span class="form-error" id="font-error-slug" th:attr="data-error=${errors?.containsKey('slug')}" th:text="${errors?.get('slug')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="name">Display name</label>
            <input type="text" id="name" name="name" class="ep-input"
                   placeholder="Acme Sans" maxlength="100" required />
            <span class="form-error" id="font-error-name" th:attr="data-error=${errors?.containsKey('name')}" th:text="${errors?.get('name')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="kind">Kind</label>
            <select id="kind" name="kind" class="ep-select" required>
                <option value="sans">Sans</option>
                <option value="serif">Serif</option>
                <option value="mono">Mono</option>
                <option value="condensed">Condensed</option>
                <option value="display">Display</option>
            </select>
            <span class="form-error" id="font-error-kind" th:attr="data-error=${errors?.containsKey('kind')}" th:text="${errors?.get('kind')}"></span>
        </div>

        <div class="form-group">
            <label class="ep-label">Faces <span class="form-hint">(TTF or OTF) &mdash; one row per weight/italic face</span></label>
            <div id="font-faces">
                <div class="font-face-row form-group" style="display:flex; gap: var(--ep-space-2); align-items:flex-end;">
                    <div style="flex:2;">
                        <label class="ep-label">File</label>
                        <input type="file" name="file"
                               accept="font/ttf,font/otf,.ttf,.otf" />
                    </div>
                    <div style="flex:1;" >
                        <label class="ep-label">Weight</label>
                        <input type="number" name="weight" class="ep-input"
                               min="1" max="1000" step="1" value="400" />
                    </div>
                    <div style="flex:1;">
                        <label class="ep-label">Italic</label>
                        <select name="italic" class="ep-select">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="button" id="add-face-btn" class="ep-btn ep-btn-outline ep-btn-sm" style="margin-top: var(--ep-space-2)">+ Add face</button>
            <span class="form-error" id="font-error-general" th:attr="data-error=${generalError != null}" th:text="${generalError}"></span>
        </div>

        <script>
            (function () {
                var fontFaces = document.getElementById('font-faces');
                var addFaceBtn = document.getElementById('add-face-btn');
                addFaceBtn.addEventListener('click', function() {
                    var rows = fontFaces.querySelectorAll('.font-face-row');
                    var clone = rows[0].cloneNode(true);
                    clone.querySelectorAll('input, select').forEach(function(el) {
                        if (el.type === 'file') {
                            el.value = '';
                        } else if (el.name === 'weight') {
                            el.value = '400';
                        } else if (el.name === 'italic') {
                            el.selectedIndex = 0;
                        }
                    });
                    fontFaces.appendChild(clone);
                });
            })();
        </script>
    </th:block>

    <!--
        OOB error fragments. On a validation error the handler swaps these (by id,
        via hx-swap-oob) into the live per-field spans + the general region, leaving
        the form and its selected face files untouched (see FontHandler.upload).
    -->
    <span th:fragment="error-catalog" class="form-error" id="font-error-catalog" hx-swap-oob="true"
          th:attr="data-error=${errors?.containsKey('catalog')}" th:text="${errors?.get('catalog')}"></span>
    <span th:fragment="error-slug" class="form-error" id="font-error-slug" hx-swap-oob="true"
          th:attr="data-error=${errors?.containsKey('slug')}" th:text="${errors?.get('slug')}"></span>
    <span th:fragment="error-name" class="form-error" id="font-error-name" hx-swap-oob="true"
          th:attr="data-error=${errors?.containsKey('name')}" th:text="${errors?.get('name')}"></span>
    <span th:fragment="error-kind" class="form-error" id="font-error-kind" hx-swap-oob="true"
          th:attr="data-error=${errors?.containsKey('kind')}" th:text="${errors?.get('kind')}"></span>
    <span th:fragment="error-general" class="form-error" id="font-error-general" hx-swap-oob="true"
          th:attr="data-error=${generalError != null}" th:text="${generalError}"></span>
</body>
</html>
