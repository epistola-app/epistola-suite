<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        Upload Font form. Already HTMX-driven (multipart hx-post; success sends
        HX-Redirect, errors return JSON handled by the inline script). The dialog
        reuses the same form + script via the shared `fields` fragment; htmx runs
        the <script> when the dialog is injected into #dialog-host.
    -->
    <th:block th:fragment="createDialog(catalogs)">
        <dialog id="create-font-dialog" class="ep-dialog ep-dialog-wide" data-testid="create-font-dialog" data-create-dialog data-dialog-param="upload">
            <div class="ep-dialog-header">
                <h3>Upload Font</h3>
            </div>
            <th:block th:replace="~{fonts/new :: createForm}"></th:block>
        </dialog>
    </th:block>

    <form th:fragment="createForm" id="font-upload-form"
          th:hx-post="@{/tenants/{tenantId}/fonts(tenantId=${tenantId})}"
          hx-encoding="multipart/form-data" hx-boost="false">
        <div class="ep-dialog-body">
            <th:block th:replace="~{fonts/new :: fields}"></th:block>
        </div>
        <div class="ep-dialog-footer">
            <button type="button" class="ep-btn ep-btn-ghost" data-dialog-close>Cancel</button>
            <button type="submit" class="ep-btn ep-btn-primary" data-testid="create-form-submit">Upload</button>
        </div>
    </form>

    <th:block th:fragment="fields">
        <div th:if="${catalogs != null && !catalogs.isEmpty()}" class="form-group">
            <label class="ep-label" for="catalog">Catalog</label>
            <select id="catalog" name="catalog" class="ep-select" required>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"></option>
            </select>
        </div>
        <div class="form-group">
            <label class="ep-label" for="slug">Slug</label>
            <input type="text" id="slug" name="slug" class="ep-input"
                   placeholder="acme-sans" pattern="[a-z][a-z0-9]*(-[a-z0-9]+)*"
                   minlength="2" maxlength="64" required />
            <span class="form-hint">Lowercase letters, digits, hyphens. 2&ndash;64 chars.</span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="name">Display name</label>
            <input type="text" id="name" name="name" class="ep-input"
                   placeholder="Acme Sans" maxlength="100" required />
        </div>
        <div class="form-group">
            <label class="ep-label" for="kind">Kind</label>
            <select id="kind" name="kind" class="ep-select" required>
                <option value="sans">Sans</option>
                <option value="serif">Serif</option>
                <option value="mono">Mono</option>
                <option value="condensed">Condensed</option>
                <option value="display">Display</option>
            </select>
        </div>

        <div class="form-group">
            <label class="ep-label">Faces <span class="form-hint">(TTF or OTF) &mdash; one row per weight/italic face</span></label>
            <div id="font-faces">
                <div class="font-face-row form-group" style="display:flex; gap: var(--ep-space-2); align-items:flex-end;">
                    <div style="flex:2;">
                        <label class="ep-label">File</label>
                        <input type="file" name="file"
                               accept="font/ttf,font/otf,.ttf,.otf" />
                    </div>
                    <div style="flex:1;" >
                        <label class="ep-label">Weight</label>
                        <input type="number" name="weight" class="ep-input"
                               min="1" max="1000" step="1" value="400" />
                    </div>
                    <div style="flex:1;">
                        <label class="ep-label">Italic</label>
                        <select name="italic" class="ep-select">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="button" id="add-face-btn" class="ep-btn ep-btn-outline ep-btn-sm" style="margin-top: var(--ep-space-2)">+ Add face</button>
            <span id="font-upload-error" class="form-error" th:text="${error}"></span>
        </div>

        <script>
            (function () {
                var fontFaces = document.getElementById('font-faces');
                var addFaceBtn = document.getElementById('add-face-btn');
                addFaceBtn.addEventListener('click', function() {
                    var rows = fontFaces.querySelectorAll('.font-face-row');
                    var clone = rows[0].cloneNode(true);
                    clone.querySelectorAll('input, select').forEach(function(el) {
                        if (el.type === 'file') {
                            el.value = '';
                        } else if (el.name === 'weight') {
                            el.value = '400';
                        } else if (el.name === 'italic') {
                            el.selectedIndex = 0;
                        }
                    });
                    fontFaces.appendChild(clone);
                });

                var fontUploadForm = document.getElementById('font-upload-form');
                var fontUploadError = document.getElementById('font-upload-error');

                fontUploadForm.addEventListener('htmx:responseError', function(event) {
                    var xhr = event.detail && event.detail.xhr;
                    if (!xhr || xhr.status < 400) {
                        return;
                    }
                    try {
                        var body = JSON.parse(xhr.responseText || '{}');
                        fontUploadError.textContent = body.detail || body.error || 'Failed to upload font. Please try again.';
                    } catch (e) {
                        fontUploadError.textContent = 'Failed to upload font. Please try again.';
                    }
                });

                fontUploadForm.addEventListener('htmx:beforeRequest', function() {
                    fontUploadError.textContent = '';
                });
            })();
        </script>
    </th:block>
</body>
</html>
