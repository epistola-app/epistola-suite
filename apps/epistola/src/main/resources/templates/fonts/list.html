<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle='Fonts',
            actions=~{::font-list-actions}
        )}"></div>

        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select id="catalog-filter" class="ep-select" style="max-width: 300px;"
                    th:attr="data-catalog-filter-base=@{/tenants/{tenantId}/fonts(tenantId=${tenantId})}">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
            </select>
        </div>

        <!-- Whole grid body (empty-state + grid) in one OOB-swappable region,
             mirroring environments/list :: environment-list. A successful
             upload OOB-refreshes it via dialogSuccess (id + hx-swap-oob); the
             delete confirm swaps it directly (outerHTML). -->
        <div id="font-grid-items" th:fragment="font-grid-items"
             th:attr="hx-swap-oob=${oob} ? 'outerHTML' : null">
                <div th:if="${#lists.isEmpty(fonts)}" class="empty-state">
                    <div class="empty-state-icon">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='file-text', class='ep-icon ep-icon-xl')}" />
                    </div>
                    <div class="empty-state-title">No fonts yet</div>
                    <div class="empty-state-description">Upload font families to use in your themes and templates.</div>
                    <button type="button" class="ep-btn ep-btn-primary" style="margin-top: var(--ep-space-4);"
                            th:hx-get="@{/tenants/{tenantId}/fonts/new(tenantId=${tenantId})}"
                            hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                            data-testid="font-create-open">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='upload', class='ep-icon')}" />
                        Upload Font
                    </button>
                </div>

                <div th:if="${!#lists.isEmpty(fonts)}" class="ep-auto-grid asset-grid">
                    <div th:each="font : ${fonts}" class="ep-panel asset-card">
                        <div class="asset-card-info">
                            <div class="asset-card-name" th:text="${font.name}" th:title="${font.name}"></div>
                            <div class="asset-card-meta">
                                <span th:text="${font.slug}"></span>
                                <span th:text="${font.kind}"></span>
                                <span th:text="${font.catalogKey}"></span>
                            </div>
                            <div class="asset-card-meta" style="margin-top: var(--ep-space-2);">
                                <span th:if="${#lists.isEmpty(font.variants)}" class="badge badge-muted">No faces</span>
                                <span th:each="v : ${font.variants}"
                                      class="badge badge-success"
                                      th:text="${v.label}"
                                      th:title="'weight ' + ${v.weight} + (${v.italic} ? ', italic' : '')"></span>
                            </div>
                        </div>
                        <div class="asset-card-actions">
                            <span th:if="${font.catalogType == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                            <th:block th:if="${font.catalogType == 'AUTHORED'}">
                                <button type="button"
                                        class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon"
                                        title="Delete font"
                                        data-confirm-title="Delete Font"
                                        th:attr="data-confirm-message='Delete font &quot;' + ${font.name} + '&quot;? This removes the family and its uploaded faces. This action cannot be undone.',data-confirm-url=@{/tenants/{tenantId}/fonts/{catalogId}/{slug}/delete(tenantId=${tenantId},catalogId=${font.catalogKey},slug=${font.slug})}"
                                        data-confirm-target="#font-grid-items" data-confirm-swap="outerHTML">
                                    <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </th:block>
                        </div>
                    </div>
                </div>
        </div>

        <!-- Dialog mount: the upload dialog is swapped in here by the trigger
             (hx-get → #dialog-mount) and opened by static/js/behaviors.js. On
             direct navigation to /new the handler renders THIS page with
             openDialog=true, embedding the dialog for the same JS to open on
             load. The openDialog guard MUST wrap the th:replace on an OUTER
             element (th:replace precedence 100 runs before th:if 300). -->
        <div id="dialog-mount" data-dialog-mount>
            <th:block th:if="${openDialog}">
                <th:block th:replace="~{fonts/new :: dialog}"></th:block>
            </th:block>
        </div>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />

    </th:block>
    <th:block th:fragment="font-list-actions">
        <button type="button" class="ep-btn ep-btn-primary"
                th:hx-get="@{/tenants/{tenantId}/fonts/new(tenantId=${tenantId})}"
                hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                data-testid="font-create-open-action">
            <th:block th:replace="~{epistola-web/icon :: icon(name='upload', class='ep-icon ep-icon-sm')}" />
            Upload Font
        </button>
    </th:block>

</body>
</html>
