<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        Fonts stay a card grid (not a data-table), but reuse the shared list-page chrome for
        the form + header so the search box and catalog filter submit together via htmx and
        the active state lives in the URL. The grid (and its empty state) is the [body] slot;
        the handler re-renders `fonts-fragment` by name on an htmx search/filter request, and
        the smaller `font-grid-items` region on a row delete. See ADR 0007.
    -->
    <th:block th:fragment="content">
        <th:block th:replace="~{epistola-web/list-page :: page(
            basePath=${basePath},
            pageTitle='Fonts',
            pageDescription=null,
            searchEnabled=true,
            searchPlaceholder='Search fonts...',
            searchValue=${searchValue},
            actions=~{::font-list-actions},
            body=~{::fonts-fragment}
        )}"></th:block>

        <!-- Confirm dialog lives outside the swap region so a search/filter never re-renders
             it; the delete buttons inside the grid reference it by id. -->
        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
    </th:block>

    <!-- Inner #data-table-container content: catalog filter (a plain form field submitted by
         the enclosing list form) + the font grid. -->
    <th:block th:fragment="fonts-fragment">
        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select name="catalog" class="ep-select" data-testid="catalog-filter"
                    aria-label="Filter by catalog" style="max-width: 300px;">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
            </select>
        </div>

        <div id="font-grid-items">
            <th:block th:fragment="font-grid-items">
                <div th:if="${#lists.isEmpty(fonts) and searchValue == null}" class="empty-state">
                    <div class="empty-state-icon">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='file-text', class='ep-icon ep-icon-xl')}" />
                    </div>
                    <div class="empty-state-title">No fonts yet</div>
                    <div class="empty-state-description">Upload font families to use in your themes and templates.</div>
                </div>
                <div th:if="${#lists.isEmpty(fonts) and searchValue != null}" class="empty-state">
                    <div class="empty-state-icon">
                        <th:block th:replace="~{epistola-web/icon :: icon(name='file-text', class='ep-icon ep-icon-xl')}" />
                    </div>
                    <div class="empty-state-title">No fonts match your search</div>
                    <div class="empty-state-description">No font name or slug contains “<span th:text="${searchValue}"></span>”.</div>
                </div>

                <div th:if="${!#lists.isEmpty(fonts)}" class="asset-grid">
                    <div th:each="font : ${fonts}" class="asset-card">
                        <div class="asset-card-info">
                            <div class="asset-card-name" th:text="${font.name}" th:title="${font.name}"></div>
                            <div class="asset-card-meta">
                                <span th:text="${font.slug}"></span>
                                <span th:text="${font.kind}"></span>
                                <span th:text="${font.catalogKey}"></span>
                            </div>
                            <div class="asset-card-meta" style="margin-top: var(--ep-space-2);">
                                <span th:if="${#lists.isEmpty(font.variants)}" class="badge badge-muted">No faces</span>
                                <span th:each="v : ${font.variants}"
                                      class="badge badge-success"
                                      th:text="${v.label}"
                                      th:title="'weight ' + ${v.weight} + (${v.italic} ? ', italic' : '')"></span>
                            </div>
                        </div>
                        <div class="asset-card-actions">
                            <span th:if="${font.catalogType == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                            <th:block th:if="${font.catalogType == 'AUTHORED'}">
                                <button type="button"
                                        class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon"
                                        title="Delete font"
                                        data-confirm-title="Delete Font"
                                        th:attr="data-confirm-message='Delete font &quot;' + ${font.name} + '&quot;? This removes the family and its uploaded faces. This action cannot be undone.',data-confirm-url=@{/tenants/{tenantId}/fonts/{catalogId}/{slug}/delete(tenantId=${tenantId},catalogId=${font.catalogKey},slug=${font.slug})}"
                                        data-confirm-target="#font-grid-items"
                                        onclick="openConfirmDialog(this)">
                                    <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </th:block>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>
    </th:block>

    <th:block th:fragment="font-list-actions">
        <a th:href="@{/tenants/{tenantId}/fonts/new(tenantId=${tenantId})}" class="ep-btn ep-btn-primary">
            <th:block th:replace="~{epistola-web/icon :: icon(name='upload', class='ep-icon ep-icon-sm')}" />
            Upload Font
        </a>
    </th:block>

</body>
</html>
