<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="tab-content">
        <!-- Details -->
        <div class="ep-panel detail-section">
            <div class="detail-section-header"><h3>Details</h3></div>
            <div class="detail-section-body">
                <dl class="description-list">
                    <dt>Name</dt>
                    <dd>
                        <input type="text" id="template-name-input" class="ep-input" maxlength="100"
                               th:value="${template.name}" th:disabled="${!editable}"
                               data-template-name-input
                               th:attr="data-original-name=${template.name},data-patch-url=@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
                               style="max-width: 300px;">
                    </dd>
                    <dt>ID</dt>
                    <dd><code th:text="${template.id}"></code></dd>
                    <dt>Created</dt>
                    <dd th:text="${#temporals.format(template.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
                    <dt>Modified</dt>
                    <dd th:text="${#temporals.format(template.updatedAt, 'yyyy-MM-dd HH:mm')}"></dd>
                </dl>
            </div>
        </div>

        <!-- Default Theme -->
        <div class="ep-panel detail-section" id="theme-section" th:fragment="theme-section">
            <div class="detail-section-header"><h3>Default Theme</h3></div>
            <div class="detail-section-body">
                <p class="text-muted" style="margin-bottom: var(--ep-space-4); font-size: var(--ep-text-sm);">
                    Set the default theme for all variants. Individual variants can override this in the editor.
                </p>
                <div class="form-row">
                    <div class="form-group" style="margin-bottom: 0;">
                        <select id="theme-select" name="themeId" class="ep-select"
                                th:disabled="${!editable}" data-theme-select
                                th:attr="data-patch-url=@{/tenants/{tenantId}/templates/{catalogId}/{id}/theme(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}">
                            <option value="">No theme (use variant defaults)</option>
                            <th:block th:each="catalog : ${themeCatalogs}">
                                <optgroup th:label="${catalog.key}">
                                    <option th:each="theme : ${catalog.value}"
                                            th:value="${theme.catalogKey + '/' + theme.id}"
                                            th:text="${theme.name}"
                                            th:selected="${template.themeKey != null and template.themeKey == theme.id and (template.themeCatalogKey == null or template.themeCatalogKey == theme.catalogKey)}"></option>
                                </optgroup>
                            </th:block>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Output Settings -->
        <div class="ep-panel detail-section" id="output-settings-section">
            <div class="detail-section-header"><h3>Output Settings</h3></div>
            <div class="detail-section-body">
                <label style="display: flex; align-items: flex-start; gap: var(--ep-space-3); cursor: pointer;">
                    <input type="checkbox" class="ep-checkbox" id="pdfa-toggle"
                           style="margin-top: 3px; width: auto; height: auto; flex-shrink: 0;"
                           th:checked="${template.pdfaEnabled}" th:disabled="${!editable}"
                           data-pdfa-toggle
                           th:attr="data-patch-url=@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}">
                    <span>
                        <strong style="font-size: var(--ep-text-sm);">PDF/A-2b compliance</strong>
                        <span class="text-muted" style="display: block; font-size: var(--ep-text-sm); margin-top: 2px;">
                            Enable for long-term archival. Embeds fonts and ICC color profile, resulting in larger files.
                        </span>
                    </span>
                </label>
            </div>
        </div>

        <!-- Danger Zone -->
        <div th:if="${auth.has('TEMPLATE_EDIT') and editable}" class="ep-panel detail-section danger-zone">
            <div class="detail-section-header"><h3>Danger Zone</h3></div>
            <div class="detail-section-body">
                <p class="text-muted" style="margin-bottom: var(--ep-space-4); font-size: var(--ep-text-sm);">
                    Permanently delete this template and all its variants, versions, and data.
                </p>
                <form th:action="@{/tenants/{tenantId}/templates/{catalogId}/{id}/delete(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
                      method="post" id="delete-template-form" hx-boost="false">
                    <button type="button" class="ep-btn ep-btn-destructive ep-btn-sm" data-testid="delete-action"
                            data-confirm-submit
                            data-confirm-submit-title="Delete Template"
                            data-confirm-submit-message="Are you sure you want to delete this template? This action cannot be undone."
                            data-confirm-submit-label="Delete">Delete Template</button>
                </form>
            </div>
        </div>

        <!-- Behaviors (name edit, theme select, PDF/A toggle, delete confirm)
             live in /js/pages/template-detail.js (ADR 0010: no inline scripts). -->
        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
    </th:block>
</body>
</html>
