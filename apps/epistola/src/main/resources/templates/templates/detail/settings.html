<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="tab-content">
        <!-- Details -->
        <div class="card page-section">
            <div class="card-header-row"><h3>Details</h3></div>
            <div class="card-content">
                <dl class="description-list">
                    <dt>Name</dt>
                    <dd>
                        <input type="text" id="template-name-input" class="ep-input template-name-input"
                               th:value="${template.name}" th:disabled="${!editable}"
                               th:attr="data-original-name=${template.name}"
                               onblur="updateTemplateName(this)"
                               onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value=this.dataset.originalName;this.blur();}">
                    </dd>
                    <dt>ID</dt>
                    <dd><code th:text="${template.id}"></code></dd>
                    <dt>Created</dt>
                    <dd th:text="${#temporals.format(template.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
                    <dt>Modified</dt>
                    <dd th:text="${#temporals.format(template.updatedAt, 'yyyy-MM-dd HH:mm')}"></dd>
                </dl>
            </div>
        </div>

        <!-- Default Theme -->
        <div class="card page-section" id="theme-section" th:fragment="theme-section">
            <div class="card-header-row"><h3>Default Theme</h3></div>
            <div class="card-content">
                <p class="settings-description">
                    Set the default theme for all variants. Individual variants can override this in the editor.
                </p>
                <div class="form-row">
                    <div class="form-group form-group-inline form-group-fill">
                        <select id="theme-select" name="themeId" class="ep-select"
                                th:disabled="${!editable}" onchange="updateTheme(this)">
                            <option value="">No theme (use variant defaults)</option>
                            <th:block th:each="catalog : ${themeCatalogs}">
                                <optgroup th:label="${catalog.key}">
                                    <option th:each="theme : ${catalog.value}"
                                            th:value="${theme.catalogKey + '/' + theme.id}"
                                            th:text="${theme.name}"
                                            th:selected="${template.themeKey != null and template.themeKey.equals(theme.id) and (template.themeCatalogKey == null or template.themeCatalogKey.equals(theme.catalogKey))}"></option>
                                </optgroup>
                            </th:block>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Output Settings -->
        <div class="card page-section" id="output-settings-section">
            <div class="card-header-row"><h3>Output Settings</h3></div>
            <div class="card-content">
                <label class="pdfa-toggle-label">
                    <input type="checkbox" class="ep-checkbox pdfa-toggle-checkbox" id="pdfa-toggle"
                           th:checked="${template.pdfaEnabled}" th:disabled="${!editable}"
                           onchange="updatePdfaSetting(this.checked)">
                    <span>
                        <strong>PDF/A-2b compliance</strong>
                        <span class="pdfa-toggle-description">
                            Enable for long-term archival. Embeds fonts and ICC color profile, resulting in larger files.
                        </span>
                    </span>
                </label>
            </div>
        </div>

        <!-- Danger Zone -->
        <div th:if="${auth.has('TEMPLATE_EDIT') and editable}" class="card page-section card-danger">
            <div class="card-header-row"><h3>Danger Zone</h3></div>
            <div class="card-content">
                <p class="settings-description">
                    Permanently delete this template and all its variants, versions, and data.
                </p>
                <form th:action="@{/tenants/{tenantId}/templates/{catalogId}/{id}/delete(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
                      method="post" id="delete-template-form" hx-boost="false">
                    <button type="button" class="ep-btn ep-btn-destructive ep-btn-sm" data-testid="delete-action"
                            onclick="epistolaConfirm('Are you sure you want to delete this template? This action cannot be undone.', { title: 'Delete Template', confirmLabel: 'Delete', confirmClass: 'ep-btn-destructive' }).then(function(ok) { if (ok) document.getElementById('delete-template-form').submit(); })">Delete Template</button>
                </form>
            </div>
        </div>

        <script th:inline="javascript">
            const TENANT_ID = [[${tenantId}]];
            const CATALOG_ID = [[${catalogId}]];
            const TEMPLATE_ID = [[${template.id}]];

            function updatePdfaSetting(enabled) {
                const url = `/tenants/${TENANT_ID}/templates/${CATALOG_ID}/${TEMPLATE_ID}`;
                const csrfToken = typeof window.getCsrfToken === 'function' ? window.getCsrfToken() : '';
                fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': csrfToken },
                    body: JSON.stringify({ pdfaEnabled: enabled })
                }).then(r => { if (!r.ok) document.getElementById('pdfa-toggle').checked = !enabled; });
            }

            function updateTemplateName(input) {
                const newName = input.value.trim();
                if (!newName || newName === input.dataset.originalName) {
                    input.value = input.dataset.originalName;
                    return;
                }
                const url = `/tenants/${TENANT_ID}/templates/${CATALOG_ID}/${TEMPLATE_ID}`;
                const csrfToken = typeof window.getCsrfToken === 'function' ? window.getCsrfToken() : '';
                fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': csrfToken },
                    body: JSON.stringify({ name: newName })
                }).then(r => {
                    if (r.ok) {
                        input.dataset.originalName = newName;
                        const h1 = document.querySelector('.page-header h1');
                        if (h1) h1.textContent = newName;
                    } else {
                        input.value = input.dataset.originalName;
                    }
                });
            }

            function updateTheme(select) {
                const raw = select.value;
                const clearThemeId = !raw;
                let themeId = null;
                let themeCatalogKey = null;
                if (raw) {
                    const slash = raw.indexOf('/');
                    themeCatalogKey = raw.substring(0, slash);
                    themeId = raw.substring(slash + 1);
                }
                const url = [[${'/tenants/' + tenantId + '/templates/' + catalogId + '/' + template.id + '/theme'}]];
                const csrfToken = typeof window.getCsrfToken === 'function' ? window.getCsrfToken() : '';
                fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': csrfToken, 'HX-Request': 'true' },
                    body: JSON.stringify({ themeId: themeId, themeCatalogKey: themeCatalogKey, clearThemeId: clearThemeId })
                }).then(r => r.text()).then(html => {
                    document.getElementById('theme-section').outerHTML = html;
                });
            }
        </script>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
    </th:block>
</body>
</html>
