<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="tab-content">
        <!-- Button to open create variant dialog -->
        <div th:if="${auth.has('TEMPLATE_EDIT') and editable}" style="margin-bottom: var(--ep-space-4);">
            <button type="button" class="ep-btn ep-btn-primary ep-btn-sm" data-open-dialog="create-variant-dialog" data-testid="variant-create-open">+ New Variant</button>
        </div>

        <!-- Create variant dialog -->
        <dialog th:if="${auth.has('TEMPLATE_EDIT') and editable}" id="create-variant-dialog" class="ep-dialog">
            <div class="ep-dialog-header">
                <h3>Create Variant</h3>
            </div>
            <form th:hx-post="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
                  hx-target="#variants-section"
                  hx-swap="outerHTML"
                  id="create-variant-form">
                <div class="ep-dialog-body">
                    <div class="form-group">
                        <label class="ep-label" for="slug">Slug (ID)</label>
                        <input type="text" id="slug" name="slug" class="ep-input" required
                               pattern="[a-z][a-z0-9]*(-[a-z0-9]+)*" minlength="3" maxlength="50" placeholder="english-newsletter">
                        <span class="form-hint">URL-safe identifier (lowercase, hyphens allowed)</span>
                    </div>
                    <div class="form-group">
                        <label class="ep-label" for="title">Title (optional)</label>
                        <input type="text" id="title" name="title" class="ep-input" maxlength="100" placeholder="English Newsletter">
                    </div>
                    <div th:if="${attributeDescriptors != null and !#lists.isEmpty(attributeDescriptors)}"
                         id="create-attr-rows" data-attr-rows>
                        <!-- All rows start hidden; the user picks attributes
                             via the "Add attribute" select below. Empty
                             rows are never submitted (empty values are
                             excluded server-side), so leaving hidden rows
                             in the DOM is safe and lets the picker simply
                             toggle visibility. -->
                        <div class="form-group" th:each="d : ${attributeDescriptors}"
                             th:data-attr-row="${d.qualifiedKey}" style="display: none;">
                            <label class="ep-label" th:for="'create-attr_' + ${d.qualifiedKey}">
                                <span th:text="${d.displayName}"></span>
                                <code class="text-muted" style="font-size: var(--ep-text-xs); margin-left: var(--ep-space-2);"
                                      th:text="${d.qualifiedKey}"></code>
                            </label>
                            <select th:id="'create-attr_' + ${d.qualifiedKey}"
                                    th:name="'attr_' + ${d.qualifiedKey}" class="ep-select">
                                <option value="">- Not set -</option>
                                <option th:each="opt : ${d.options}"
                                        th:value="${opt.code}"
                                        th:text="${opt.code == opt.label ? opt.code : (opt.code + ' — ' + opt.label)}"></option>
                            </select>
                        </div>
                        <!-- Add-attribute picker. -->
                        <div class="form-group" data-add-attr-picker>
                            <label class="ep-label" for="create-add-attr">Add attribute</label>
                            <div class="ep-row">
                                <select id="create-add-attr" class="ep-select" data-add-attr-select>
                                    <option value="">— Choose an attribute to add —</option>
                                    <option th:each="d : ${attributeDescriptors}"
                                            th:value="${d.qualifiedKey}"
                                            th:text="${d.displayName + '  (' + d.qualifiedKey + ')'}"></option>
                                </select>
                                <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm" data-add-attr-button>Add</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="ep-dialog-footer">
                    <button type="button" class="ep-btn ep-btn-ghost" data-close-dialog="create-variant-dialog">Cancel</button>
                    <button type="submit" class="ep-btn ep-btn-primary" data-testid="variant-create-submit">Create Variant</button>
                </div>
            </form>
        </dialog>

        <!-- Variant card grid -->
        <div id="variants-section" th:fragment="variants-section">
            <div id="variant-filter-bar" class="variant-filter-bar"
                 th:if="${usedAttributeDescriptors != null and !#lists.isEmpty(usedAttributeDescriptors)}">
                <div class="form-group" th:each="d : ${usedAttributeDescriptors}">
                    <label th:for="'attr-filter-' + ${d.qualifiedKey}">
                        <span th:text="${d.displayName}"></span>
                        <code class="text-muted" style="font-size: var(--ep-text-xs); margin-left: var(--ep-space-1);"
                              th:text="${d.qualifiedKey}"></code>
                    </label>
                    <select class="ep-select" th:id="'attr-filter-' + ${d.qualifiedKey}"
                            th:data-filter-key="${d.qualifiedKey}">
                        <option value="">All</option>
                        <option th:each="opt : ${d.options}"
                                th:value="${opt.code}"
                                th:text="${opt.code == opt.label ? opt.code : (opt.code + ' — ' + opt.label)}"></option>
                    </select>
                </div>
            </div>
            <div th:if="${error != null}" class="alert alert-error" style="margin-bottom: var(--ep-space-4);">
                <span th:text="${error}"></span>
            </div>
            <div th:if="${!#lists.isEmpty(variants)}" class="ep-auto-grid variant-grid">
                <div th:each="variant : ${variants}"
                     class="ep-panel variant-card" th:classappend="${variant.isDefault} ? 'variant-card-default'"
                     th:data-variant-id="${variant.id}">
                    <div class="variant-card-header">
                        <div>
                            <span class="variant-card-title" th:text="${variant.title != null ? variant.title : variant.id}"></span>
                            <code th:if="${variant.title != null}" class="variant-card-slug" th:text="${variant.id}"></code>
                        </div>
                        <span th:if="${variant.isDefault}" class="badge badge-primary">Default</span>
                    </div>
                    <div class="variant-card-body">
                        <!-- variant.entries carries the resolved
                             {descriptor, value} per attribute. The descriptor
                             contributes the catalog prefix (visible in the
                             badge so the user can tell `system.locale=en-US`
                             apart from a hypothetical `default.locale`). -->
                        <div class="badge-list" th:if="${!#lists.isEmpty(variant.entries)}">
                            <span th:each="entry : ${variant.entries}" class="badge badge-outline"
                                  th:data-attr-key="${entry.key}" th:data-attr-value="${entry.value}"
                                  th:title="${entry.descriptor != null ? entry.descriptor.qualifiedKey + ' = ' + entry.value : entry.key + ' = ' + entry.value}">
                                <span class="text-muted" style="font-size: var(--ep-text-xs);"
                                      th:if="${entry.catalogLabel != ''}"
                                      th:text="${entry.catalogLabel + '.'}"></span><span
                                      th:text="${entry.slug + ' = ' + entry.value}"></span>
                            </span>
                        </div>
                        <div class="badge-list">
                            <span th:if="${variant.hasDraft}" class="badge badge-draft">Draft</span>
                            <span th:if="${!variant.publishedVersions.isEmpty()}" class="badge badge-published"
                                  th:text="${#lists.size(variant.publishedVersions) + ' published'}"></span>
                            <span th:if="${!variant.hasDraft and variant.publishedVersions.isEmpty()}"
                                  class="text-muted" style="font-size: var(--ep-text-xs);">No versions</span>
                        </div>
                    </div>
                    <div class="variant-card-footer">
                        <a th:if="${auth.has('TEMPLATE_EDIT') and editable}"
                           th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/editor(tenantId=${tenantId},catalogId=${catalogId},id=${template.id},variantId=${variant.id})}"
                           class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" hx-boost="false" title="Open editor">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='pencil', class='ep-icon ep-icon-sm')}" />
                        </a>
                        <form th:if="${auth.has('TEMPLATE_PUBLISH') and editable and variant.hasDraft}"
                              th:hx-post="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/draft/publish(tenantId=${tenantId},catalogId=${catalogId},id=${template.id},variantId=${variant.id})}"
                              hx-target="#variants-section"
                              hx-swap="outerHTML"
                              style="display: inline;">
                            <button type="submit" class="ep-btn ep-btn-primary ep-btn-sm ep-btn-icon" title="Publish draft">
                                <th:block th:replace="~{epistola-web/icon :: icon(name='upload', class='ep-icon ep-icon-sm')}" />
                            </button>
                        </form>
                        <form th:if="${auth.has('TEMPLATE_EDIT') and editable and variant.hasDraft and !variant.publishedVersions.isEmpty()}"
                              th:hx-post="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/draft/discard(tenantId=${tenantId},catalogId=${catalogId},id=${template.id},variantId=${variant.id})}"
                              hx-target="#variants-section"
                              hx-swap="outerHTML"
                              hx-confirm="Discard draft changes? The variant will revert to the last published version."
                              style="display: inline;">
                            <button type="submit" class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon" title="Discard draft">
                                <th:block th:replace="~{epistola-web/icon :: icon(name='undo-2', class='ep-icon ep-icon-sm')}" />
                            </button>
                        </form>
                        <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon"
                                th:data-tenant-id="${tenantId}" th:data-catalog-id="${catalogId}"
                                th:data-template-id="${template.id}" th:data-variant-id="${variant.id}"
                                th:data-test-data="${contractDataExamples != null and !#lists.isEmpty(contractDataExamples) ? contractDataExamples[0].data : '{}'}"
                                data-pdf-preview title="Preview latest version">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='eye', class='ep-icon ep-icon-sm')}" />
                        </button>
                        <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon"
                                th:hx-get="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/versions(tenantId=${tenantId},catalogId=${catalogId},id=${template.id},variantId=${variant.id})}"
                                hx-target="#version-history-dialog-body" hx-swap="innerHTML"
                                data-open-dialog="version-history-dialog" title="Version history">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='clock', class='ep-icon ep-icon-sm')}" />
                        </button>
                        <button th:if="${auth.has('TEMPLATE_EDIT') and editable}" type="button" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon"
                                th:hx-get="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/edit(tenantId=${tenantId},catalogId=${catalogId},id=${template.id},variantId=${variant.id})}"
                                hx-target="#edit-variant-dialog-body" hx-swap="innerHTML"
                                data-open-dialog="edit-variant-dialog" title="Edit variant">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='settings', class='ep-icon ep-icon-sm')}" />
                        </button>
                        <form th:if="${auth.has('TEMPLATE_EDIT') and editable}" th:unless="${variant.isDefault}"
                              th:hx-post="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/set-default(tenantId=${tenantId},catalogId=${catalogId},id=${template.id},variantId=${variant.id})}"
                              hx-target="#variants-section" hx-swap="outerHTML" hx-confirm="Make this the default variant?">
                            <button type="submit" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="Set as default">
                                <th:block th:replace="~{epistola-web/icon :: icon(name='star', class='ep-icon ep-icon-sm')}" />
                            </button>
                        </form>
                        <button th:if="${auth.has('TEMPLATE_EDIT') and editable}" th:unless="${variant.isDefault}" type="button"
                                class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon" title="Delete variant"
                                data-confirm-title="Delete Variant"
                                th:attr="data-confirm-message='Delete variant &quot;' + ${variant.title != null ? variant.title : variant.id} + '&quot;? This action cannot be undone.',data-confirm-url=@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/delete(tenantId=${tenantId},catalogId=${catalogId},id=${template.id},variantId=${variant.id})}"
                                data-confirm-target="#variants-section" data-confirm-swap="outerHTML">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                        </button>
                        <button th:if="${auth.has('TEMPLATE_EDIT') and variant.isDefault}" type="button"
                                class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" disabled title="Cannot delete the default variant">
                            <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                        </button>
                    </div>
                </div>
                <div class="variant-no-matches" id="variant-no-matches">No variants match the selected filters.</div>
            </div>
            <div th:if="${#lists.isEmpty(variants)}" class="ep-panel detail-section">
                <div class="detail-section-body">
                    <div class="empty-state" style="padding: var(--ep-space-8);">
                        <div class="empty-state-title">No variants yet</div>
                        <div class="empty-state-description">Create a variant to start designing your template.</div>
                    </div>
                </div>
            </div>
        </div>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />
        <dialog id="edit-variant-dialog" class="ep-dialog"><div id="edit-variant-dialog-body"></div></dialog>
        <dialog id="version-history-dialog" class="ep-dialog ep-dialog-wide"><div id="version-history-dialog-body"></div></dialog>

        <!-- The "Add attribute" picker ([data-add-attr-button], works for both
             the create dialog and the HTMX-loaded edit dialog) and the variant
             attribute filter (select[data-filter-key]) are delegated behaviors
             in /js/pages/template-detail.js (ADR 0010: no inline scripts). -->
    </th:block>
</body>
</html>
