<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div id="contract-breaking-content">
            <p class="ep-mb-3">
                This change is not backwards compatible. Publishing may affect existing template versions.
            </p>
            <div th:if="${!#lists.isEmpty(breakingChanges)}" class="ep-mb-3">
                <strong>Breaking changes:</strong>
                <ul class="ep-mt-1">
                    <li th:each="c : ${breakingChanges}">
                        <code th:text="${c.path}"></code> — <span th:text="${c.description}"></span>
                    </li>
                </ul>
            </div>
            <div th:if="${!#lists.isEmpty(incompatibleVersions)}">
                <strong>Affected template versions:</strong>
                <ul class="ep-mt-1">
                    <li th:each="v : ${incompatibleVersions}">
                        <span th:text="${v.variantKey}"></span> v<span th:text="${v.versionId}"></span>
                        <span th:if="${!#lists.isEmpty(v.activeEnvironments)}"
                              th:text="' (active in: ' + ${#strings.listJoin(v.activeEnvironments, ', ')} + ')'"></span>
                    </li>
                </ul>
            </div>
            <div class="ep-flex ep-gap-2 ep-justify-end ep-mt-4">
                <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm"
                        onclick="document.getElementById('contract-breaking-dialog').close()">Cancel</button>
                <button type="button" class="ep-btn ep-btn-destructive ep-btn-sm"
                        th:attr="hx-post=${publishUrl} + '?confirmed=true'"
                        hx-swap="none">
                    Publish Anyway
                </button>
            </div>
        </div>
    </th:block>
</body>
</html>
