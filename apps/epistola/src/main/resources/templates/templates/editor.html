<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${templateName + ' - Edit - Epistola'}">Edit Template - Epistola</title>
    <th:block th:replace="~{fragments/styles :: styles}" />
    <th:block th:replace="~{fragments/htmx :: htmx}" />
    <link rel="stylesheet" th:href="@{/css/shell.css}">
    <link rel="stylesheet" th:href="@{/editor/template-editor.css}">
    <!-- AI plugin CSS — loaded conditionally when AI plugin is enabled -->
    <link rel="stylesheet" th:href="@{/editor/ai-plugin.css}" th:if="${enabledPlugins != null and enabledPlugins.contains('ai')}">
    <!-- TODO: Remove static fallback once backend provides enabledPlugins -->
    <link rel="stylesheet" th:href="@{/editor/ai-plugin.css}" th:if="${enabledPlugins == null}">
    <style>
        .editor-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .editor-container {
            flex: 1;
            overflow: hidden;
            width: 100%;
        }
        .editor-nav {
            height: 48px;
            border-bottom: 1px solid var(--ep-border-color);
            display: flex;
            align-items: center;
            padding: 0 var(--ep-space-6);
            background: var(--ep-white);
            flex-shrink: 0;
            gap: var(--ep-space-3);
            /* Establish a stacking context above the bubble menu (--ep-z-dropdown)
               so the nav occludes it when a selection scrolls up under the bar. */
            position: relative;
            z-index: var(--ep-z-sticky);
        }
        .editor-nav-back {
            display: flex;
            align-items: center;
            gap: var(--ep-space-2);
            text-decoration: none;
            color: var(--ep-foreground);
            font-weight: 600;
            font-size: var(--ep-text-sm);
        }
        .editor-nav-back:hover {
            color: var(--ep-primary);
            text-decoration: none;
        }
        .editor-nav-back .ep-icon {
            color: var(--ep-muted-foreground);
        }
        .editor-nav-back:hover .ep-icon {
            color: var(--ep-primary);
        }
        .editor-nav-variant {
            font-size: var(--ep-text-xs);
            color: var(--ep-muted-foreground);
        }
    </style>
</head>
<body class="editor-page">
    <nav class="editor-nav">
        <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${catalogId},id=${templateId})}" class="editor-nav-back">
            <th:block th:replace="~{epistola-web/icon :: icon(name='arrow-left', class='ep-icon ep-icon-sm')}" />
            <span th:text="${templateName}">Template Name</span>
        </a>
        <span class="editor-nav-variant" th:text="'/ ' + ${variantId}"></span>
    </nav>
    <!-- data-leader-timing is a test-only seam (issue #418): present only when
         the ?leaderTiming= query param is supplied; omitted in production. -->
    <div id="editor-container" data-testid="editor-container" class="editor-container"
         th:attr="data-leader-timing=${leaderTiming}"></div>

    <!-- Module-contributed footer chrome (see FooterContributor / FooterFragmentResolver) -->
    <th:block th:each="frag : ${footerFragments}">
        <th:block th:replace="~{__${frag.ref}__}" />
    </th:block>

    <script type="application/json" id="editor-config" th:inline="javascript">
    {
        "editorModuleUrl": [[@{/editor/template-editor.js}]],
        "aiPluginUrl": [[@{/editor/ai-plugin.js}]],
        "templateModel": [[${templateModel}]],
        "templateId": [[${templateId}]],
        "tenantId": [[${tenantId}]],
        "catalogId": [[${catalogId}]],
        "variantId": [[${variantId}]],
        "dataExamples": [[${dataExamples}]],
        "dataModel": [[${dataModel}]],
        "locale": [[${resolvedLocale}]],
        "quality": {
            "enabled": [[${qualityEnabled}]],
            "findingsUrl": [[@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/quality(tenantId=${tenantId},catalogId=${catalogId},id=${templateId},variantId=${variantId})}]],
            "checkUrl": [[@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/quality/check(tenantId=${tenantId},catalogId=${catalogId},id=${templateId},variantId=${variantId})}]]
        }
    }
    </script>
    <script type="module" th:src="@{/js/editor-boot.js}"></script>
</body>
</html>
