<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${templateName + ' - Edit - Epistola'}">Edit Template - Epistola</title>
    <th:block th:replace="~{fragments/styles :: styles}" />
    <link rel="stylesheet" th:href="@{/css/shell.css}">
    <link rel="stylesheet" th:href="@{/editor/template-editor.css}">
    <link rel="stylesheet" th:href="@{/editor/data-contract-editor.css}">
    <!-- AI plugin CSS — loaded conditionally when AI plugin is enabled -->
    <link rel="stylesheet" th:href="@{/editor/ai-plugin.css}" th:if="${enabledPlugins != null and enabledPlugins.contains('ai')}">
    <!-- TODO: Remove static fallback once backend provides enabledPlugins -->
    <link rel="stylesheet" th:href="@{/editor/ai-plugin.css}" th:if="${enabledPlugins == null}">
    <style>
        .editor-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .editor-container {
            flex: 1;
            overflow: hidden;
            width: 100%;
        }
        .editor-nav {
            height: 48px;
            border-bottom: 1px solid var(--ep-border-color);
            display: flex;
            align-items: center;
            padding: 0 var(--ep-space-6);
            background: var(--ep-white);
            flex-shrink: 0;
            gap: var(--ep-space-3);
        }
        .editor-nav-back {
            display: flex;
            align-items: center;
            gap: var(--ep-space-2);
            text-decoration: none;
            color: var(--ep-foreground);
            font-weight: 600;
            font-size: var(--ep-text-sm);
        }
        .editor-nav-back:hover {
            color: var(--ep-primary);
            text-decoration: none;
        }
        .editor-nav-back .ep-icon {
            color: var(--ep-muted-foreground);
        }
        .editor-nav-back:hover .ep-icon {
            color: var(--ep-primary);
        }
        .editor-nav-variant {
            font-size: var(--ep-text-xs);
            color: var(--ep-muted-foreground);
        }
    </style>
</head>
<body class="editor-page">
    <nav class="editor-nav">
        <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${catalogId},id=${templateId})}" class="editor-nav-back">
            <th:block th:replace="~{fragments/icon :: icon(name='arrow-left', class='ep-icon ep-icon-sm')}" />
            <span th:text="${templateName}">Template Name</span>
        </a>
        <span class="editor-nav-variant" th:text="'/ ' + ${variantId}"></span>
    </nav>
    <div id="editor-container" data-testid="editor-container" class="editor-container"></div>

    <script th:src="@{/feedback/feedback-capture.js}"></script>
    <script type="module" th:inline="javascript">
        const { initFeedbackFab } = await import(/*[[@{/feedback/feedback-fab.js}]]*/ '/feedback/feedback-fab.js');
        initFeedbackFab(/*[[${tenantId}]]*/ 'tenant');
    </script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        window.TEMPLATE_MODEL = /*[[${templateModel}]]*/ {};
        window.TEMPLATE_ID = /*[[${templateId}]]*/ '';
        window.TENANT_ID = /*[[${tenantId}]]*/ '';
        window.CATALOG_ID = /*[[${catalogId}]]*/ '';
        window.VARIANT_ID = /*[[${variantId}]]*/ '';
        window.DATA_EXAMPLES = /*[[${dataExamples}]]*/ [];
        window.DATA_MODEL = /*[[${dataModel}]]*/ null;
        window.APP_VERSION = /*[[${appVersion}]]*/ 'dev';
        window.APP_NAME = /*[[${appName}]]*/ 'Epistola';

        // CSRF token from cookie (set by Spring Security CookieCsrfTokenRepository)
        window.getCsrfToken = function() {
            const match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
            return match ? decodeURIComponent(match[1]) : '';
        };
        /*]]>*/
    </script>
    <script type="module" th:inline="javascript">
        const { mountEditor } = await import(/*[[@{/editor/template-editor.js}]]*/ '/editor/template-editor.js');

        const container = document.getElementById('editor-container');
        const tenantId = window.TENANT_ID;
        const catalogId = window.CATALOG_ID;
        const templateId = window.TEMPLATE_ID;
        const variantId = window.VARIANT_ID;

        // Load plugins dynamically
        const plugins = [];

        // AI chat plugin — uses mock transport until backend is wired up.
        // When enabledPlugins is provided by the backend, the Thymeleaf
        // conditional (th:if) will control whether this block is rendered.
        try {
            const { createAiPlugin, createMockTransport } = await import(/*[[@{/editor/ai-plugin.js}]]*/ '/editor/ai-plugin.js');
            plugins.push(createAiPlugin({ sendMessage: createMockTransport() }));
        } catch (e) {
            console.warn('AI plugin failed to load:', e);
        }

        mountEditor({
            container: container,
            template: window.TEMPLATE_MODEL,
            dataExamples: window.DATA_EXAMPLES,
            dataModel: window.DATA_MODEL,
            plugins: plugins,
            dataContractOptions: {
                initialSchema: window.DATA_MODEL,
                initialExamples: window.DATA_EXAMPLES,
                callbacks: {
                    onSaveSchema: async (schema, forceUpdate, dataExamples) => {
                        try {
                            const body = { dataModel: schema, forceUpdate };
                            if (dataExamples) body.dataExamples = dataExamples;
                            const response = await fetch('/tenants/' + tenantId + '/templates/' + catalogId + '/' + templateId + '/contract/draft', {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                                body: JSON.stringify(body),
                            });
                            if (!response.ok) {
                                const err = await response.json().catch(() => ({}));
                                return { success: false, error: err.message, warnings: err.warnings };
                            }
                            const result = await response.json();
                            return { success: true, warnings: result.warnings };
                        } catch (e) {
                            return { success: false, error: e.message };
                        }
                    },
                    onSaveDataExamples: async (examples) => {
                        try {
                            const response = await fetch('/tenants/' + tenantId + '/templates/' + catalogId + '/' + templateId + '/contract/draft', {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                                body: JSON.stringify({ dataExamples: examples }),
                            });
                            if (!response.ok) {
                                const err = await response.json().catch(() => ({}));
                                return { success: false, error: err.message, warnings: err.warnings };
                            }
                            const result = await response.json();
                            return { success: true, warnings: result.warnings };
                        } catch (e) {
                            return { success: false, error: e.message };
                        }
                    },
                    onUpdateDataExample: async (exampleId, updates, forceUpdate) => {
                        try {
                            const response = await fetch('/tenants/' + tenantId + '/templates/' + catalogId + '/' + templateId + '/data-examples/' + exampleId, {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                                body: JSON.stringify({ ...updates, forceUpdate }),
                            });
                            if (!response.ok) {
                                const err = await response.json().catch(() => ({}));
                                return { success: false, errors: err.errors, warnings: err.warnings };
                            }
                            const result = await response.json();
                            return { success: true, example: result, warnings: result.warnings };
                        } catch (e) {
                            return { success: false, error: e.message };
                        }
                    },
                    onDeleteDataExample: async (exampleId) => {
                        try {
                            const response = await fetch('/tenants/' + tenantId + '/templates/' + catalogId + '/' + templateId + '/data-examples/' + exampleId, {
                                method: 'DELETE',
                                headers: { 'X-XSRF-TOKEN': window.getCsrfToken() },
                            });
                            return { success: response.ok };
                        } catch (e) {
                            return { success: false, error: e.message };
                        }
                    },
                },
            },
            imageOptions: {
                contentUrlPattern: '/tenants/' + tenantId + '/assets/' + catalogId + '/{assetId}/content',
                listAssets: async () => {
                    const resp = await fetch('/tenants/' + tenantId + '/assets/search?catalog=' + catalogId, {
                        headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                    });
                    if (!resp.ok) throw new Error('Failed to list assets');
                    return await resp.json();
                },
                uploadAsset: async (file) => {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('catalog', catalogId);
                    const resp = await fetch('/tenants/' + tenantId + '/assets', {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                        body: formData,
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error || 'Failed to upload asset');
                    }
                    return await resp.json();
                },
            },
            stencilOptions: {
                checkUpgrades: async (refs) => {
                    const uniqueKeys = [...new Set(refs.map(r => r.catalogKey + '/' + r.stencilId))];
                    const results = [];
                    for (const key of uniqueKeys) {
                        const [cat, sid] = key.split('/');
                        const resp = await fetch('/tenants/' + tenantId + '/stencils/' + cat + '/' + sid + '/versions', {
                            headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                        });
                        if (!resp.ok) continue;
                        const data = await resp.json();
                        const versions = data.items ?? data;
                        const latestPublished = versions.filter(v => v.status === 'published')
                            .sort((a, b) => b.version - a.version)[0];
                        if (latestPublished) {
                            const currentVersions = refs.filter(r => r.stencilId === sid && r.catalogKey === cat);
                            for (const ref of currentVersions) {
                                if (latestPublished.version > ref.version) {
                                    results.push({ stencilId: sid, currentVersion: ref.version, latestVersion: latestPublished.version });
                                }
                            }
                        }
                    }
                    return results;
                },
                searchStencils: async (query) => {
                    const params = new URLSearchParams();
                    if (query) params.set('q', query);
                    const resp = await fetch('/tenants/' + tenantId + '/stencils/search?' + params, {
                        headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                    });
                    if (!resp.ok) return [];
                    const data = await resp.json();
                    return data.items ?? data;
                },
                listVersions: async (ref) => {
                    const resp = await fetch('/tenants/' + tenantId + '/stencils/' + ref.catalogKey + '/' + ref.stencilId + '/versions', {
                        headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                    });
                    if (!resp.ok) return [];
                    const data = await resp.json();
                    return data.items ?? data;
                },
                getStencilVersion: async (ref, version) => {
                    const resp = await fetch('/tenants/' + tenantId + '/stencils/' + ref.catalogKey + '/' + ref.stencilId + '/versions/' + version, {
                        headers: { 'Accept': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                    });
                    if (!resp.ok) return null;
                    const v = await resp.json();
                    return { ref, stencilName: ref.stencilId, version: v.id ?? version, content: v.content };
                },
                createStencil: async (slug, name) => {
                    const resp = await fetch('/tenants/' + tenantId + '/stencils', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                        body: JSON.stringify({ id: slug, name, catalogKey: catalogId }),
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.message || err.error || 'Stencil ID already exists or invalid');
                    }
                    const data = await resp.json();
                    return { ref: { stencilId: data.stencilId, catalogKey: data.catalogKey }, version: data.version };
                },
                startEditing: async (ref) => {
                    const resp = await fetch('/tenants/' + tenantId + '/stencils/' + ref.catalogKey + '/' + ref.stencilId + '/versions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                        body: '{}',
                    });
                    if (!resp.ok) throw new Error('Failed to start editing');
                    const data = await resp.json();
                    return { draftVersion: data.version };
                },
                publishDraft: async (ref, version) => {
                    const resp = await fetch('/tenants/' + tenantId + '/stencils/' + ref.catalogKey + '/' + ref.stencilId + '/versions/' + version + '/publish', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                    });
                    if (!resp.ok) throw new Error('Failed to publish draft');
                    return await resp.json();
                },
                updateStencil: async (ref, content) => {
                    const resp = await fetch('/tenants/' + tenantId + '/stencils/' + ref.catalogKey + '/' + ref.stencilId + '/draft', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': window.getCsrfToken() },
                        body: JSON.stringify({ content }),
                    });
                    if (!resp.ok) throw new Error('Failed to update stencil');
                    return await resp.json();
                },
            },
            onSave: async (template) => {
                const response = await fetch('/tenants/' + tenantId + '/templates/' + catalogId + '/' + templateId + '/variants/' + variantId + '/draft', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRF-TOKEN': window.getCsrfToken(),
                    },
                    body: JSON.stringify({ templateModel: template })
                });

                if (!response.ok) {
                    throw new Error('Failed to save draft: ' + response.statusText);
                }
            },
            onFetchPreview: async (doc, data, signal) => {
                const response = await fetch(
                    '/tenants/' + tenantId + '/templates/' + catalogId + '/' + templateId + '/variants/' + variantId + '/preview',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/pdf',
                            'X-XSRF-TOKEN': window.getCsrfToken(),
                        },
                        body: JSON.stringify({ templateModel: doc, data: data?.data ?? data }),
                        signal: signal,
                    }
                );

                if (!response.ok) {
                    const text = await response.text().catch(() => response.statusText);
                    throw new Error('Preview failed: ' + text);
                }

                return await response.blob();
            },
        });
    </script>
</body>
</html>
