<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <link rel="stylesheet" th:href="@{/editor/data-contract-editor.css}">
        <script th:src="@{/js/pdf-preview.js}"></script>

        <div class="page-header">
            <div>
                <a th:href="@{/tenants/{tenantId}/templates(tenantId=${tenantId})}" class="back-link">&larr; Templates</a>
                <h1 th:text="${template.name}">Template Name</h1>
                <p th:if="${!editable}" class="text-muted" style="margin-top: var(--ep-space-1); font-size: var(--ep-text-sm);">
                    <span class="badge badge-muted">Read-only</span> This template belongs to a subscribed catalog.
                </p>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'variants'} ? ' active'">Variants</a>
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}/deployments(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'deployments'} ? ' active'">Deployments</a>
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}/data-contract(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'data-contract'} ? ' active'">Data Contract</a>
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}/settings(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'settings'} ? ' active'">Settings</a>
        </div>

        <!-- Active tab content (each tab is a separate template file) -->
        <div th:replace="~{'templates/detail/' + ${activeTab} :: tab-content}"></div>

        <!-- Version comparison (reusable component, available on all tabs) -->
        <th:block th:replace="~{fragments/version-comparison :: version-comparison}" />
    </th:block>

    <!-- Fragment: edit variant form (loaded into dialog via HTMX) -->
    <th:block th:fragment="edit-variant-form">
        <div class="ep-dialog-header">
            <h3>Edit Variant: <code th:text="${variant.id}"></code></h3>
        </div>
        <form th:hx-patch="@{/tenants/{tenantId}/templates/{catalogId}/{templateId}/variants/{variantId}(tenantId=${tenantId},templateId=${templateId ?: template.id},variantId=${variant.id})}"
              hx-target="#variants-section"
              hx-swap="outerHTML"
              hx-on::after-request="if(event.detail.successful) document.getElementById('edit-variant-dialog').close()">
            <div class="ep-dialog-body">
                <div class="form-group">
                    <label class="ep-label" for="edit-variant-title">Title</label>
                    <input type="text" id="edit-variant-title" name="title" class="ep-input"
                           th:value="${variant.title}" placeholder="e.g. English Newsletter">
                </div>
                <div th:if="${attributeDefinitions != null and !#lists.isEmpty(attributeDefinitions)}">
                    <div class="form-group" th:each="attrDef : ${attributeDefinitions}">
                        <label class="ep-label" th:for="'edit-attr_' + ${attrDef.id}" th:text="${attrDef.displayName}"></label>
                        <select th:id="'edit-attr_' + ${attrDef.id}" th:name="'attr_' + ${attrDef.id}" class="ep-select">
                            <option value="">- Not set -</option>
                            <option th:if="${!attrDef.allowedValues.isEmpty()}"
                                    th:each="val : ${attrDef.allowedValues}"
                                    th:value="${val}"
                                    th:text="${val}"
                                    th:selected="${variant.attributes != null and variant.attributes.containsKey(attrDef.id.toString()) and variant.attributes.get(attrDef.id.toString()) == val}"></option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="ep-dialog-footer">
                <button type="button" class="btn btn-ghost"
                        onclick="document.getElementById('edit-variant-dialog').close()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </th:block>
</body>
</html>
