<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <link rel="stylesheet" th:href="@{/editor/data-contract-editor.css}">
        <script th:src="@{/js/pdf-preview.js}"></script>

        <div class="page-header">
            <div>
                <a th:href="@{/tenants/{tenantId}/templates(tenantId=${tenantId})}" class="back-link">&larr; Templates</a>
                <h1 data-testid="page-title" th:text="${template.name}">Template Name</h1>
                <p th:if="${!editable}" class="text-muted ep-mt-1 ep-text-sm" >
                    <span class="badge badge-muted">Read-only</span> This template belongs to a subscribed catalog.
                </p>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'variants'} ? ' active'"
               data-testid="template-tab" data-tab-name="variants">Variants</a>
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}/deployments(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'deployments'} ? ' active'"
               data-testid="template-tab" data-tab-name="deployments">Deployments</a>
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}/data-contract(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'data-contract'} ? ' active'"
               data-testid="template-tab" data-tab-name="data-contract">Data Contract</a>
            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}/settings(tenantId=${tenantId},catalogId=${catalogId},id=${template.id})}"
               class="tab-nav-item" th:classappend="${activeTab == 'settings'} ? ' active'"
               data-testid="template-tab" data-tab-name="settings">Settings</a>
        </div>

        <!-- Active tab content (each tab is a separate template file) -->
        <div th:replace="~{'templates/detail/' + ${activeTab} :: tab-content}"></div>

        <!-- Version comparison (reusable component, available on all tabs) -->
        <th:block th:replace="~{fragments/version-comparison :: version-comparison}" />
    </th:block>

    <!-- Fragment: edit variant form (loaded into dialog via HTMX) -->
    <th:block th:fragment="edit-variant-form">
        <div class="ep-dialog-header">
            <h3>Edit Variant: <code th:text="${variant.id}"></code></h3>
        </div>
        <form th:hx-patch="@{/tenants/{tenantId}/templates/{catalogId}/{templateId}/variants/{variantId}(tenantId=${tenantId},catalogId=${catalogId},templateId=${templateId ?: template.id},variantId=${variant.id})}"
              hx-target="#variants-section"
              hx-swap="outerHTML">
            <div class="ep-dialog-body">
                <div class="form-group">
                    <label class="ep-label" for="edit-variant-title">Title</label>
                    <input type="text" id="edit-variant-title" name="title" class="ep-input"
                           th:value="${variant.title}" placeholder="e.g. English Newsletter">
                </div>
                <!-- Show only the attributes this variant already has, plus
                     an add-attribute picker for the rest. The handler
                     computes the present-key sets (qualified + raw) so the
                     template stays Thymeleaf-simple. -->
                <div th:if="${attributeDescriptors != null and !#lists.isEmpty(attributeDescriptors)}"
                     id="edit-attr-rows" data-attr-rows>
                    <div class="form-group" th:each="d : ${attributeDescriptors}"
                         th:data-attr-row="${d.qualifiedKey}"
                         th:with="hasValue=${(presentQualifiedKeys != null and presentQualifiedKeys.contains(d.qualifiedKey)) or (presentRawKeys != null and presentRawKeys.contains(d.bareSlug))}"
                          th:classappend="${hasValue} ? '' : 'ep-hidden'">
                        <label class="ep-label" th:for="'edit-attr_' + ${d.qualifiedKey}">
                            <span th:text="${d.displayName}"></span>
                            <code class="text-muted ep-text-xs ep-ml-2" 
                                  th:text="${d.qualifiedKey}"></code>
                        </label>
                        <select th:id="'edit-attr_' + ${d.qualifiedKey}"
                                th:name="'attr_' + ${d.qualifiedKey}" class="ep-select">
                            <option value="">- Not set -</option>
                            <option th:each="opt : ${d.options}"
                                    th:value="${opt.code}"
                                    th:text="${opt.code == opt.label ? opt.code : (opt.code + ' — ' + opt.label)}"
                                    th:selected="${(variant.attributes != null and (variant.attributes.get(d.qualifiedKey) == opt.code or variant.attributes.get(d.bareSlug) == opt.code))}"></option>
                        </select>
                    </div>
                    <!-- Add-attribute picker. -->
                    <div class="form-group" data-add-attr-picker>
                        <label class="ep-label" for="edit-add-attr">Add attribute</label>
                        <div class="ep-flex-center ep-gap-2">
                            <select id="edit-add-attr" class="ep-select" data-add-attr-select>
                                <option value="">— Choose an attribute to add —</option>
                                <option th:each="d : ${attributeDescriptors}"
                                        th:if="${(presentQualifiedKeys == null or !presentQualifiedKeys.contains(d.qualifiedKey)) and (presentRawKeys == null or !presentRawKeys.contains(d.bareSlug))}"
                                        th:value="${d.qualifiedKey}"
                                        th:text="${d.displayName + '  (' + d.qualifiedKey + ')'}"></option>
                            </select>
                            <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm" data-add-attr-button>Add</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ep-dialog-footer">
                <button type="button" class="ep-btn ep-btn-ghost"
                        onclick="document.getElementById('edit-variant-dialog').close()">Cancel</button>
                <button type="submit" class="ep-btn ep-btn-primary">Save</button>
            </div>
        </form>
    </th:block>
</body>
</html>
