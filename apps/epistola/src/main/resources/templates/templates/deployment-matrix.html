<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="deployment-matrix">
        <div id="deployment-matrix">

            <!-- Error banner (e.g., contract compatibility issues) -->
            <div th:if="${error != null}" class="alert alert-error ep-mb-4">
                <span th:text="${error}"></span>
            </div>

            <!-- No environments -->
            <th:block th:if="${#lists.isEmpty(environments)}">
                <div class="detail-section">
                    <div class="detail-section-body">
                        <div class="empty-state ep-p-8">
                            <div class="empty-state-title">No environments configured</div>
                            <div class="empty-state-description">
                                <a th:href="@{/tenants/{tenantId}/environments(tenantId=${tenantId},catalogId=${catalogId})}">Create an environment</a>
                                to start deploying template versions.
                            </div>
                        </div>
                    </div>
                </div>
            </th:block>

            <!-- No variants -->
            <th:block th:if="${!#lists.isEmpty(environments) and #lists.isEmpty(variants)}">
                <div class="detail-section">
                    <div class="detail-section-body">
                        <div class="empty-state ep-p-8">
                            <div class="empty-state-title">No variants yet</div>
                            <div class="empty-state-description">
                                Create a variant in the Variants tab to start deploying.
                            </div>
                        </div>
                    </div>
                </div>
            </th:block>

            <!-- Deployment matrix table -->
            <th:block th:if="${!#lists.isEmpty(environments) and !#lists.isEmpty(variants)}">
                <div class="detail-section">
                    <div class="detail-section-body no-padding">
                        <div class="ep-overflow-x-auto">
                            <table class="ep-table deployment-matrix-table">
                                <thead>
                                    <tr>
                                        <th class="ep-text-left">Variant</th>
                                        <th th:each="env : ${environments}" th:text="${env.name}" class="text-center"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="variant : ${variants}">
                                        <td class="deployment-matrix-variant">
                                            <div class="ep-flex-center ep-gap-2">
                                                <div>
                                                    <code th:text="${variant.id}" class="ep-text-xs"></code>
                                                    <span th:if="${variant.title != null}" class="text-muted ep-text-xs ep-ml-1" 
                                                          th:text="${variant.title}"></span>
                                                </div>
                                                <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon"
                                                        th:data-compare-url="@{/tenants/{tenantId}/templates/{catalogId}/{id}/variants/{variantId}/compare(tenantId=${tenantId},catalogId=${catalogId},id=${templateId},variantId=${variant.id})}"
                                                        onclick="openVersionComparison(this)"
                                                        title="Compare versions">
                                                    <th:block th:replace="~{fragments/icon :: icon(name='columns-2', class='ep-icon ep-icon-sm')}" />
                                                </button>
                                            </div>
                                        </td>
                                        <td th:each="env : ${environments}" class="deployment-matrix-cell">
                                            <th:block th:with="
                                                cell=${matrix.containsKey(variant.id) ? matrix.get(variant.id).getOrDefault(env.id, null) : null},
                                                versions=${versionsByVariant.getOrDefault(variant.id, {})}"
                                            >
                                                <th:block th:if="${!#lists.isEmpty(versions)}">
                                                    <form class="ep-inline ep-m-0">
                                                        <input type="hidden" name="variantId" th:value="${variant.id}" />
                                                        <input type="hidden" name="environmentId" th:value="${env.id}" />
                                                        <select name="versionId" class="ep-select ep-text-xs" 
                                                                th:hx-post="@{/tenants/{tenantId}/templates/{catalogId}/{id}/deployments(tenantId=${tenantId},catalogId=${catalogId},id=${templateId})}"
                                                                hx-target="#deployment-matrix" hx-swap="outerHTML"
                                                                hx-trigger="change" hx-include="closest form">
                                                            <option value="">Not deployed</option>
                                                            <th:block th:each="ver : ${versions}">
                                                                <option th:value="${ver.versionKey}"
                                                                        th:selected="${cell != null and cell.versionKey == ver.versionKey}"
                                                                        th:text="${'v' + ver.versionKey + (ver.status.name() == 'DRAFT' ? ' (draft)' : '')}"></option>
                                                            </th:block>
                                                        </select>
                                                    </form>
                                                </th:block>
                                                <th:block th:if="${#lists.isEmpty(versions)}">
                                                    <span class="text-muted">&mdash;</span>
                                                </th:block>
                                            </th:block>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </th:block>

        </div>
    </th:block>
</body>
</html>
