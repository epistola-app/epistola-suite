<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div class="page-header">
            <h1>Templates</h1>
            <div class="page-actions">
                <div th:replace="~{fragments/search :: search-box(
                    placeholder='Search templates...',
                    searchUrl=@{/tenants/{tenantId}/templates/search(tenantId=${tenantId})},
                    targetId='template-rows'
                )}"></div>
                <a th:if="${auth.has('TEMPLATE_EDIT')}"
                   th:href="@{/tenants/{tenantId}/templates/new(tenantId=${tenantId})}"
                   th:hx-get="@{/tenants/{tenantId}/templates/new(tenantId=${tenantId})}"
                   hx-target="#dialog-host" hx-swap="innerHTML" hx-boost="false"
                   class="ep-btn ep-btn-primary" data-testid="template-create-open">
                    <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                    New Template
                </a>
            </div>
        </div>

        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select id="catalog-filter" class="ep-select" style="max-width: 300px;">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
            </select>
            <script th:inline="javascript">
                document.getElementById('catalog-filter').addEventListener('change', function() {
                    var tenantId = /*[[${tenantId}]]*/ '';
                    var catalog = this.value;
                    var url = '/tenants/' + tenantId + '/templates';
                    if (catalog) url += '?catalog=' + encodeURIComponent(catalog);
                    window.location.href = url;
                });
            </script>
        </div>

        <div th:if="${#lists.isEmpty(templates)}" class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{fragments/icon :: icon(name='file-text', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No templates yet</div>
            <div class="empty-state-description">Create your first document template to get started.</div>
            <a th:if="${auth.has('TEMPLATE_EDIT')}"
               th:href="@{/tenants/{tenantId}/templates/new(tenantId=${tenantId})}"
               th:hx-get="@{/tenants/{tenantId}/templates/new(tenantId=${tenantId})}"
               hx-target="#dialog-host" hx-swap="innerHTML" hx-boost="false"
               class="ep-btn ep-btn-primary" style="margin-top: var(--ep-space-4);"
               data-testid="template-create-open-empty">
                <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                New Template
            </a>
        </div>

        <table th:if="${!#lists.isEmpty(templates)}" class="ep-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Catalog</th>
                    <th>ID</th>
                    <th>Variants</th>
                    <th>Last Modified</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="template-rows">
                <th:block th:fragment="rows">
                    <tr th:each="template : ${templates}" data-testid="template-row" th:data-template-slug="${template.id}">
                        <td>
                            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${template.catalogKey},id=${template.id})}"
                               th:text="${template.name}" style="font-weight: 500;"></a>
                        </td>
                        <td><span class="badge badge-default" th:text="${template.catalogKey}"></span></td>
                        <td><code th:text="${template.id}" style="font-size: var(--ep-text-xs); color: var(--ep-muted-foreground);"></code></td>
                        <td th:text="${template.variantCount}"></td>
                        <td th:text="${#temporals.format(template.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="actions">
                            <span th:if="${template.catalogType.name() == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                            <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${template.catalogKey},id=${template.id})}"
                               class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="View template">
                                <th:block th:replace="~{fragments/icon :: icon(name='eye', class='ep-icon ep-icon-sm')}" />
                            </a>
                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>

        <!--
            Deep-link / refresh / back-restore render site for the create dialog.
            When the URL carries `?create`, the list page ships the dialog markup
            (closed) and the reconcile script in fragments/htmx opens it. The click
            path injects the same fragment into #dialog-host instead; the two never
            coexist (the reconcile close handler removes this one when it closes).
        -->
        <!--
            Outer th:if, inner th:replace: th:replace has higher precedence than
            th:if, so on a single element the fragment would render unconditionally.
        -->
        <th:block th:if="${createOpen}">
            <th:block th:replace="~{templates/new :: createDialog(catalogs=${authoredCatalogs})}"></th:block>
        </th:block>
    </th:block>
</body>
</html>
