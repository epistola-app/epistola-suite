<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <!--
            One filter form drives the whole list. Every stateful control inside it — the
            search box, the catalog filter, the page-size select, plus hidden sort/dir — is
            a plain field; htmx submits the form (hx-get) on any change and swaps
            #data-table-container, and the handler pushes the canonical URL. Adding a new
            filter is just another <select name="…">, with no per-control htmx wiring. Sort
            headers and pagination stay server-built <a hx-get> links. See ADR 0007.
        -->
        <form th:action="${query.basePath}" method="get"
              th:hx-get="${query.basePath}"
              hx-target="#data-table-container"
              hx-swap="innerHTML"
              hx-trigger="submit, change, input changed delay:300ms">
            <div th:replace="~{epistola-web/page-header :: page-header(
                pageTitle='Templates',
                pageDescription='All of your templates are here.',
                searchPlaceholder='Search templates...',
                searchFormDriven=true,
                searchValue=${query.q},
                actions=~{::template-list-actions}
            )}"></div>

            <!-- Single HTMX swap target: every filter/sort/page request replaces this. -->
            <div id="data-table-container">
                <th:block th:fragment="data-table-fragment">
                    <!-- Page-specific filter bar: a plain form field, submitted by the form. -->
                    <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
                        <select name="catalog" class="ep-select" data-testid="catalog-filter"
                                aria-label="Filter by catalog" style="max-width: 300px;">
                            <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                            <option th:each="cat : ${catalogs}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
                        </select>
                    </div>

                    <div th:replace="~{epistola-web/data-table :: data-table(
                        columns=${columns},
                        query=${query},
                        paged=${paged},
                        rows=~{::rows},
                        pageSizeOptions=${pageSizeOptions},
                        emptyState=~{::empty-state}
                    )}"></div>
                </th:block>
            </div>
        </form>
    </th:block>

    <!-- Shown by the data-table when there are no rows (passed in as the emptyState slot). -->
    <th:block th:fragment="empty-state">
        <div class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{epistola-web/icon :: icon(name='file-text', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No templates yet</div>
            <div class="empty-state-description">Create your first document template to get started.</div>
            <a th:if="${auth.has('TEMPLATE_EDIT')}"
               th:href="@{/tenants/{tenantId}/templates/new(tenantId=${tenantId})}"
               class="ep-btn ep-btn-primary" style="margin-top: var(--ep-space-4);">
                <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
                New Template
            </a>
        </div>
    </th:block>

    <!--
        The row markup, passed into the data-table via ~{::rows}. Defined OUTSIDE the
        `content` fragment so it renders only where injected (the table body) and not
        a second time inline — a stray <tr> outside a <table> is otherwise flattened
        by the browser into loose cells below the table.
    -->
    <th:block th:fragment="rows">
        <tr th:each="template : ${paged.items}" data-testid="template-row" th:data-template-slug="${template.id}">
            <td class="ep-truncate" th:title="${template.name}">
                <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${template.catalogKey},id=${template.id})}"
                   th:text="${template.name}" style="font-weight: 500;"></a>
            </td>
            <td class="ep-truncate" th:title="${template.catalogKey}" th:text="${template.catalogKey}"
                style="color: var(--ep-muted-foreground);"></td>
            <td class="ep-truncate" th:title="${template.id}"><code th:text="${template.id}" style="font-size: var(--ep-text-xs); color: var(--ep-muted-foreground);"></code></td>
            <td th:text="${template.variantCount}"></td>
            <td th:text="${#temporals.format(template.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td class="actions">
                <span th:if="${template.catalogType.name() == 'SUBSCRIBED'}"
                      role="img" title="Read-only — subscribed catalogs can't be edited"
                      aria-label="Read-only — subscribed catalogs can't be edited"
                      style="display: inline-flex; align-items: center; color: var(--ep-muted-foreground);">
                    <th:block th:replace="~{epistola-web/icon :: icon(name='lock', class='ep-icon ep-icon-sm')}" />
                </span>
                <a th:href="@{/tenants/{tenantId}/templates/{catalogId}/{id}(tenantId=${tenantId},catalogId=${template.catalogKey},id=${template.id})}"
                   class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon" title="View template">
                    <th:block th:replace="~{epistola-web/icon :: icon(name='eye', class='ep-icon ep-icon-sm')}" />
                </a>
            </td>
        </tr>
    </th:block>

    <th:block th:fragment="template-list-actions">
        <a th:if="${auth.has('TEMPLATE_EDIT')}"
           th:href="@{/tenants/{tenantId}/templates/new(tenantId=${tenantId})}"
           class="ep-btn ep-btn-primary">
            <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
            New Template
        </a>
    </th:block>
</body>
</html>
