<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Epistola</title>
    <th:block th:replace="~{fragments/styles :: styles}" />
</head>
<body class="error-page-body">
    <div class="error-page-card">
        <h1 class="error-page-title">
            Error <span th:text="${status}">500</span>
        </h1>
        <p class="error-page-message">
            Something went wrong. Please try again later.
        </p>
        <a href="/" class="ep-btn ep-btn-primary">Back to Home</a>
    </div>
</body>
</html>
