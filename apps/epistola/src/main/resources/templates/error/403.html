<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Epistola</title>
    <th:block th:replace="~{fragments/styles :: styles}" />
</head>
<body class="error-page-body">
    <div class="error-page-card">
        <h1 class="ep-text-2xl ep-mb-4">Access Denied</h1>
        <p class="error-page-message"
           th:text="${message} ?: 'You don\'t have permission to access this page.'">
            You don't have permission to access this page.
        </p>
        <a href="/" class="ep-btn ep-btn-primary">Back to Home</a>
    </div>
</body>
</html>
