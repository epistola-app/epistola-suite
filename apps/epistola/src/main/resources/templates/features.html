<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle='Feature Toggles',
            pageDescription='Enable or disable tenant features.'
        )}"></div>

        <div class="alert alert-success" th:if="${param.saved}" data-testid="alert-success">
            Feature toggle settings saved successfully.
        </div>

        <div class="card">
            <div class="card-content">
                <form th:action="@{/tenants/{tenantId}/features(tenantId=${tenantId})}" method="post">
                    <div th:replace="~{epistola-web/form-error :: form-error(id='feature-toggles-error')}"></div>

                    <div class="feature-toggle-item" th:each="feature : ${features}" data-testid="feature-toggle" th:data-feature-key="${feature['key']}">
                        <div class="feature-toggle-info">
                            <div class="feature-toggle-name">
                                <span th:text="${feature['title']}">Feature</span>
                                <span th:if="${feature['stage'].badgeClass != null}"
                                      th:class="${'badge ' + feature['stage'].badgeClass}"
                                      th:text="${feature['stage'].label}">Beta</span>
                            </div>
                            <div class="feature-toggle-description" th:if="${feature['description'] != ''}" th:text="${feature['description']}"></div>
                        </div>
                        <label class="ep-toggle">
                            <input type="checkbox"
                                   th:name="${feature['key']}"
                                   th:checked="${feature['enabled']}">
                            <span class="ep-toggle-slider" data-testid="feature-toggle-switch"></span>
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="ep-btn ep-btn-primary">Save Settings</button>
                        <a th:href="@{/tenants/{tenantId}(tenantId=${tenantId})}" class="ep-btn ep-btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block>
</body>
</html>
