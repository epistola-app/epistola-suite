<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle='API Keys',
            pageDescription='API keys authenticate external systems calling the REST API. Keys cannot be modified after creation, and the secret value is shown only once.',
            actions=~{::api-key-list-actions}
        )}"></div>

        <!-- Whole list body (empty-state + table) in one OOB-swappable region,
             mirroring environments/list :: environment-list. On a successful
             create the one-time-key reveal stays open (dialogReveal) and the
             handler OOB-refreshes THIS region so the list behind the reveal shows
             the new key regardless of how the reveal is dismissed — ESC, backdrop,
             or Done (CR8). It also flips empty → populated when the first key is
             created.
             NOTE: this fragment uses `auth`, and the OOB render path passes only
             the fragment model (no global attributes) — so the handler must supply
             the model this needs; `auth` is re-injected by HtmxFragmentModelContributor. -->
        <div id="api-key-list" th:fragment="api-key-list"
             th:attr="hx-swap-oob=${oob} ? 'outerHTML' : null">
        <div th:if="${#lists.isEmpty(apiKeys)}" class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{epistola-web/icon :: icon(name='key', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No API keys</div>
            <div class="empty-state-description">Create an API key to let an external system authenticate against this tenant.</div>
            <button type="button" class="ep-btn ep-btn-primary" th:if="${auth.has('TENANT_USERS')}"
                    th:hx-get="@{/tenants/{tenantId}/api-keys/new(tenantId=${tenantId})}"
                    hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                    data-testid="api-key-create-open"
                    style="margin-top: var(--ep-space-4);">
                <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
                New API key
            </button>
        </div>

        <table th:if="${!#lists.isEmpty(apiKeys)}" class="ep-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Prefix</th>
                    <th>Scope</th>
                    <th>Created by</th>
                    <th>Created</th>
                    <th>Last used</th>
                    <th>Expires</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="api-key-rows">
                <th:block th:fragment="rows">
                    <tr th:each="apiKey : ${apiKeys}" data-testid="api-key-row" th:data-api-key-name="${apiKey.name}">
                        <td th:text="${apiKey.name}" style="font-weight: 500;"></td>
                        <td>
                            <code th:text="${apiKey.keyPrefix} + '…'"></code>
                        </td>
                        <td>
                            <span class="api-key-scope">
                                <span class="badge badge-outline"
                                      th:each="role : ${apiKey.roles}"
                                      th:text="${roleLabels.containsKey(role.name()) ? roleLabels.get(role.name()) : role.name()}">Viewer</span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${apiKey.createdByDisplayName != null}" th:text="${apiKey.createdByDisplayName}"></span>
                            <span th:if="${apiKey.createdByDisplayName == null}" class="text-muted">—</span>
                        </td>
                        <td th:text="${#temporals.format(apiKey.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <span th:if="${apiKey.lastUsedAt != null}"
                                  th:text="${#temporals.format(apiKey.lastUsedAt, 'yyyy-MM-dd HH:mm')}"></span>
                            <span th:if="${apiKey.lastUsedAt == null}" class="text-muted">Never</span>
                        </td>
                        <td>
                            <span th:if="${apiKey.expiresAt != null}"
                                  th:text="${#temporals.format(apiKey.expiresAt, 'yyyy-MM-dd')}"></span>
                            <span th:if="${apiKey.expiresAt == null}" class="text-muted">Never</span>
                        </td>
                        <td class="actions">
                            <button th:if="${auth.has('TENANT_USERS')}"
                                    type="button"
                                    class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon"
                                    title="Delete API key"
                                    data-testid="api-key-delete"
                                    data-confirm-title="Delete API key"
                                    th:attr="data-confirm-message='Delete API key &quot;' + ${apiKey.name} + '&quot;? Any system using it will stop working immediately.',data-confirm-url=@{/tenants/{tenantId}/api-keys/{apiKeyId}/delete(tenantId=${tenantId},apiKeyId=${apiKey.id})}"
                                    data-confirm-target="#api-key-rows">
                                <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                            </button>
                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>
        </div>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />

        <!-- Dialog mount: the create dialog is swapped in here by the trigger
             (hx-get → #dialog-mount) and opened by static/js/behaviors.js. On
             direct navigation to /new the handler renders THIS page with
             openDialog=true, embedding the dialog as a plain <dialog> that the
             same JS opens on load.
             GOTCHA: the openDialog guard MUST wrap the th:replace on an OUTER
             element — th:replace (precedence 100) runs before th:if (300), so
             the two on the SAME element would include the dialog unconditionally.
             See docs/dialog-forms.md. -->
        <div id="dialog-mount" data-dialog-mount>
            <th:block th:if="${openDialog}">
                <th:block th:replace="~{api-keys/new :: dialog}"></th:block>
            </th:block>
        </div>

        <style>
            .api-key-scope {
                display: flex;
                flex-wrap: wrap;
                gap: var(--ep-space-1);
            }
        </style>
    </th:block>
    <th:block th:fragment="api-key-list-actions">
        <button type="button" class="ep-btn ep-btn-primary" th:if="${auth.has('TENANT_USERS')}"
                th:hx-get="@{/tenants/{tenantId}/api-keys/new(tenantId=${tenantId})}"
                hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                data-testid="api-key-create-open-action">
            <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
            New API key
        </button>
    </th:block>

</body>
</html>
