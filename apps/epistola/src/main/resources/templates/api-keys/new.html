<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        New API key create form. Like templates/themes, but success reveals the
        secret once: on an HTMX submit the handler swaps `createdReveal` into the
        dialog (replacing the form), showing the key with a Done link back to the
        list. Non-HTMX falls back to the api-keys/created page.
    -->
    <th:block th:fragment="createDialog">
        <dialog id="create-api-key-dialog" class="ep-dialog ep-dialog-wide" data-create-dialog data-testid="create-api-key-dialog">
            <div class="ep-dialog-header">
                <h3>New API key</h3>
            </div>
            <th:block th:replace="~{api-keys/new :: createForm}"></th:block>
        </dialog>
    </th:block>

    <form th:fragment="createForm" id="create-api-key-form"
          th:hx-post="@{/tenants/{tenantId}/api-keys(tenantId=${tenantId})}"
          hx-target="this" hx-swap="outerHTML" hx-boost="false">
        <div class="ep-dialog-body">
            <th:block th:replace="~{api-keys/new :: fields}"></th:block>
        </div>
        <th:block th:replace="~{fragments/dialog :: dialogFooter('Create API key', 'create-form-submit')}"></th:block>
    </form>

    <th:block th:fragment="fields">
        <div class="form-group" th:classappend="${errors?.containsKey('name')} ? 'error' : ''">
            <label class="ep-label" for="name">Name</label>
            <input type="text" id="name" name="name" class="ep-input"
                   required maxlength="100"
                   placeholder="e.g. CI integration"
                   th:value="${formData?.name}"
                   autofocus>
            <span class="form-hint">A short label so you can recognise this key later. Max 100 characters.</span>
            <span class="form-error" th:if="${errors?.containsKey('name')}" th:text="${errors.name}"></span>
        </div>
        <div class="form-group" th:classappend="${errors?.containsKey('expiresAt')} ? 'error' : ''">
            <label class="ep-label" for="expiresAt">Expires (optional)</label>
            <input type="date" id="expiresAt" name="expiresAt" class="ep-input"
                   th:value="${formData?.expiresAt}">
            <span class="form-hint">Leave blank for a key that never expires.</span>
            <span class="form-error" th:if="${errors?.containsKey('expiresAt')}" th:text="${errors.expiresAt}"></span>
        </div>
    </th:block>

    <!-- Swapped in over the form on a successful HTMX submit: the secret, shown once. -->
    <div th:fragment="createdReveal" data-testid="api-key-created">
        <div class="ep-dialog-body">
            <div class="alert alert-warning" style="margin-bottom: var(--ep-space-4);">
                <strong>Copy this key now.</strong>
                It will not be shown again, and there is no way to recover it later.
            </div>
            <div class="form-group">
                <label class="ep-label" for="api-key-secret">Key</label>
                <div class="ep-row">
                    <input type="text" id="api-key-secret" class="ep-input"
                           th:value="${plaintextKey}"
                           readonly
                           style="font-family: var(--ep-font-mono, monospace); flex: 1;">
                    <button type="button" id="api-key-copy-btn" class="ep-btn ep-btn-outline">
                        <th:block th:replace="~{fragments/icon :: icon(name='copy', class='ep-icon ep-icon-sm')}" />
                        Copy
                    </button>
                </div>
                <span id="api-key-copy-status" class="form-hint" aria-live="polite"></span>
            </div>
            <dl class="ep-dl" style="margin-top: var(--ep-space-4);">
                <dt>Name</dt>
                <dd th:text="${apiKey.name}" data-testid="api-key-name"></dd>
                <dt>Created</dt>
                <dd th:text="${#temporals.format(apiKey.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
                <dt th:if="${apiKey.expiresAt != null}">Expires</dt>
                <dd th:if="${apiKey.expiresAt != null}"
                    th:text="${#temporals.format(apiKey.expiresAt, 'yyyy-MM-dd')}"></dd>
            </dl>
        </div>
        <div class="ep-dialog-footer">
            <a th:href="@{/tenants/{tenantId}/api-keys(tenantId=${tenantId})}" class="ep-btn ep-btn-primary" data-testid="api-key-created-done">Done</a>
        </div>
        <script th:inline="none">
        (function() {
            var input = document.getElementById('api-key-secret');
            var button = document.getElementById('api-key-copy-btn');
            var status = document.getElementById('api-key-copy-status');
            if (!input || !button) return;
            button.addEventListener('click', function() {
                var value = input.value;
                var done = function(ok) {
                    status.textContent = ok ? 'Copied to clipboard.' : 'Copy failed — select the key and copy it manually.';
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(value).then(function() { done(true); }, function() { done(false); });
                } else {
                    input.removeAttribute('readonly');
                    input.select();
                    var ok = false;
                    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
                    input.setAttribute('readonly', 'readonly');
                    done(ok);
                }
            });
        })();
        </script>
    </div>
</body>
</html>
