<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div th:replace="~{epistola-web/page-header :: page-header(
            pageTitle='Attributes',
            actions=~{::attribute-list-actions}
        )}"></div>

        <div th:if="${catalogs != null && !catalogs.isEmpty()}" style="margin-bottom: var(--ep-space-4);">
            <select id="catalog-filter" class="ep-select" style="max-width: 300px;"
                    th:attr="data-catalog-filter-base=@{/tenants/{tenantId}/attributes(tenantId=${tenantId})}">
                <option value="" th:selected="${selectedCatalog == ''}">All catalogs</option>
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${#strings.equals(selectedCatalog, cat.id)}"></option>
            </select>
        </div>

        <!-- Whole list body (empty-state + table) in one OOB-swappable region,
             mirroring environments/list :: environment-list. Creating the first
             attribute (empty → populated) refreshes it via a single outerHTML OOB
             swap (dialogSuccess). The #attribute-rows tbody + `rows` fragment stay
             INSIDE it so the inline edit keeps swapping just the rows, and delete
             refreshes the whole region so the last delete flips to the empty state.
             NOTE: this fragment uses `auth`; the OOB render path passes only the
             fragment model, so the handler relies on HtmxFragmentModelContributor
             to inject `auth`. -->
        <div id="attribute-list" th:fragment="attribute-list"
             th:attr="hx-swap-oob=${oob} ? 'outerHTML' : null">
        <div th:if="${#lists.isEmpty(attributes)}" class="empty-state">
            <div class="empty-state-icon">
                <th:block th:replace="~{epistola-web/icon :: icon(name='tag', class='ep-icon ep-icon-xl')}" />
            </div>
            <div class="empty-state-title">No attributes yet</div>
            <div class="empty-state-description">Define attributes to classify template variants (e.g., language, brand, audience).</div>
            <button th:if="${auth.has('TENANT_SETTINGS')}" type="button"
                    class="ep-btn ep-btn-primary" style="margin-top: var(--ep-space-4);"
                    th:hx-get="@{/tenants/{tenantId}/attributes/new(tenantId=${tenantId})}"
                    hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                    data-testid="attribute-create-open">
                <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
                New Attribute
            </button>
        </div>

        <table th:if="${!#lists.isEmpty(attributes)}" class="ep-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Catalog</th>
                    <th>Display Name</th>
                    <th>Allowed Values</th>
                    <th>Created</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="attribute-rows">
                <th:block th:fragment="rows">
                    <tr th:each="attr : ${attributes}">
                        <td><code th:text="${attr.id}" style="font-size: var(--ep-text-xs); color: var(--ep-muted-foreground);"></code></td>
                        <td><span class="badge badge-default" th:text="${attr.catalogKey}"></span></td>
                        <td style="font-weight: 500;" th:text="${attr.displayName}"></td>
                        <td>
                            <div th:if="${attr.codeListSlug != null}" class="badge-list">
                                <a th:href="@{/tenants/{tenantId}/code-lists/{catalogId}/{slug}(tenantId=${tenantId},catalogId=${attr.codeListCatalogKey},slug=${attr.codeListSlug})}"
                                   class="badge badge-default"
                                   th:title="'Bound to code list ' + ${attr.codeListCatalogKey} + '/' + ${attr.codeListSlug}"
                                   th:text="'→ ' + ${attr.codeListCatalogKey} + '/' + ${attr.codeListSlug}"></a>
                            </div>
                            <div th:if="${attr.codeListSlug == null and !attr.allowedValues.isEmpty()}" class="badge-list">
                                <span th:each="val : ${attr.allowedValues}"
                                      class="badge badge-outline"
                                      th:text="${val}"></span>
                            </div>
                            <span th:if="${attr.codeListSlug == null and attr.allowedValues.isEmpty()}" class="text-muted">Any value</span>
                        </td>
                        <td th:text="${#temporals.format(attr.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="actions" th:if="${auth.has('TENANT_SETTINGS')}">
                            <span th:if="${attr.catalogType.name() == 'SUBSCRIBED'}" class="badge badge-muted" title="Subscribed catalogs are read-only">Read-only</span>
                            <th:block th:if="${attr.catalogType.name() == 'AUTHORED'}">
                                <button type="button" class="ep-btn ep-btn-ghost ep-btn-sm ep-btn-icon"
                                        th:hx-get="@{/tenants/{tenantId}/attributes/{catalogId}/{attributeId}/edit(tenantId=${tenantId},catalogId=${attr.catalogKey},attributeId=${attr.id})}"
                                        hx-target="#edit-attribute-dialog-body"
                                        hx-swap="innerHTML"
                                        data-open-dialog="edit-attribute-dialog"
                                        title="Edit attribute">
                                    <th:block th:replace="~{epistola-web/icon :: icon(name='pencil', class='ep-icon ep-icon-sm')}" />
                                </button>
                                <button type="button"
                                        class="ep-btn ep-btn-ghost ep-btn-destructive ep-btn-sm ep-btn-icon"
                                        title="Delete attribute"
                                        data-confirm-title="Delete Attribute"
                                        th:attr="data-confirm-message='Delete attribute &quot;' + ${attr.displayName} + '&quot;? Existing variant attributes using this key will not be affected.',data-confirm-url=@{/tenants/{tenantId}/attributes/{catalogId}/{attributeId}/delete(tenantId=${tenantId},catalogId=${attr.catalogKey},attributeId=${attr.id})}"
                                        data-confirm-target="#attribute-list" data-confirm-swap="outerHTML">
                                    <th:block th:replace="~{epistola-web/icon :: icon(name='trash-2', class='ep-icon ep-icon-sm')}" />
                                </button>
                            </th:block>
                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>
        </div>

        <!-- Dialog mount: the create dialog is swapped in here by the trigger
             (hx-get → #dialog-mount) and opened by static/js/behaviors.js. On
             direct navigation to /new the handler renders THIS page with
             openDialog=true, embedding the dialog as a plain <dialog> that the
             same JS opens on load.
             GOTCHA: the openDialog guard MUST wrap the th:replace on an OUTER
             element — th:replace (precedence 100) runs before th:if (300), so the
             two on the SAME element would include the dialog unconditionally.
             See docs/dialog-forms.md. -->
        <div id="dialog-mount" data-dialog-mount>
            <th:block th:if="${openDialog}">
                <th:block th:replace="~{attributes/new :: dialog}"></th:block>
            </th:block>
        </div>

        <th:block th:replace="~{fragments/confirm-dialog :: confirm-dialog}" />

        <!-- Edit attribute dialog -->
        <dialog id="edit-attribute-dialog" class="ep-dialog">
            <div id="edit-attribute-dialog-body">
                <!-- Content loaded via HTMX -->
            </div>
        </dialog>
    </th:block>

    <!-- Fragment: edit attribute form (loaded into dialog via HTMX) -->
    <th:block th:fragment="edit-attribute-form">
        <div class="ep-dialog-header">
            <h3>Edit Attribute: <code th:text="${attribute.id}"></code></h3>
        </div>
        <!-- data-radio-panes: the constraintKind radios toggle the matching
             [data-constraint-pane] visibility; initial state is applied on the
             htmx:load of this fragment (pages/asset-forms.js). -->
        <form th:hx-patch="@{/tenants/{tenantId}/attributes/{catalogId}/{attributeId}(tenantId=${tenantId},catalogId=${attribute.catalogKey},attributeId=${attribute.id})}"
              hx-target="#attribute-rows"
              hx-swap="innerHTML"
              data-radio-panes="constraintKind" data-pane-attr="data-constraint-pane"
>
            <div th:replace="~{epistola-web/form-error :: form-error(id='edit-attribute-error')}"></div>
            <div class="ep-dialog-body">
                <div class="form-group">
                    <label class="ep-label" for="edit-attr-displayName">Display Name</label>
                    <input type="text" id="edit-attr-displayName" name="displayName" class="ep-input" maxlength="100"
                           required th:value="${attribute.displayName}" placeholder="e.g. Language">
                </div>
                <div class="form-group">
                    <label class="ep-label">Value constraint</label>
                    <div role="radiogroup" class="constraint-radio-group">
                        <label>
                            <input type="radio" name="constraintKind" value="free"
                                   th:checked="${attribute.codeListSlug == null and #lists.isEmpty(attribute.allowedValues)}">
                            Free format
                        </label>
                        <label>
                            <input type="radio" name="constraintKind" value="inline"
                                   th:checked="${attribute.codeListSlug == null and !#lists.isEmpty(attribute.allowedValues)}">
                            Inline values
                        </label>
                        <label>
                            <input type="radio" name="constraintKind" value="code-list"
                                   th:checked="${attribute.codeListSlug != null}">
                            Bound to code list
                        </label>
                    </div>
                </div>
                <style>
                    /* See attributes/new.html for why we pin radio size locally. */
                    .constraint-radio-group {
                        display: flex;
                        flex-direction: column;
                        gap: var(--ep-space-2);
                        margin-top: var(--ep-space-2);
                    }
                    .constraint-radio-group label {
                        display: flex;
                        align-items: center;
                        gap: var(--ep-space-2);
                        font-size: var(--ep-text-sm);
                        cursor: pointer;
                    }
                    .constraint-radio-group input[type="radio"] {
                        width: 1rem;
                        height: 1rem;
                        flex: 0 0 1rem;
                        margin: 0;
                        font-size: 1rem;
                    }
                </style>
                <div class="form-group constraint-pane" data-constraint-pane="inline">
                    <label class="ep-label" for="edit-attr-allowedValues">Allowed values (one per line)</label>
                    <textarea id="edit-attr-allowedValues" name="allowedValues" class="ep-textarea" rows="4"
                              placeholder="dutch&#10;english&#10;german"
                              th:text="${attribute.allowedValues != null ? #strings.listJoin(attribute.allowedValues, '&#10;') : ''}"></textarea>
                </div>
                <div class="form-group constraint-pane" data-constraint-pane="code-list">
                    <label class="ep-label" for="edit-attr-codeList">Code list</label>
                    <select id="edit-attr-codeList" name="codeList" class="ep-select">
                        <option value="">&mdash; Select a code list &mdash;</option>
                        <th:block th:each="cl : ${codeLists}">
                            <option th:value="${cl.catalogKey + '/' + cl.slug}"
                                    th:text="${cl.catalogKey + ' / ' + cl.displayName}"
                                    th:selected="${attribute.codeListCatalogKey != null and cl.catalogKey == attribute.codeListCatalogKey and cl.slug == attribute.codeListSlug}"></option>
                        </th:block>
                    </select>
                </div>
            </div>
            <div class="ep-dialog-footer">
                <button type="button" class="ep-btn ep-btn-ghost"
                        data-close-dialog="edit-attribute-dialog">Cancel</button>
                <button type="submit" class="ep-btn ep-btn-primary">Save</button>
            </div>
        </form>
    </th:block>
    <th:block th:fragment="attribute-list-actions">
        <button th:if="${auth.has('TENANT_SETTINGS')}" type="button" class="ep-btn ep-btn-primary"
                th:hx-get="@{/tenants/{tenantId}/attributes/new(tenantId=${tenantId})}"
                hx-target="#dialog-mount" hx-swap="innerHTML" hx-push-url="true"
                data-testid="attribute-create-open-action">
            <th:block th:replace="~{epistola-web/icon :: icon(name='plus', class='ep-icon')}" />
            New Attribute
        </button>
    </th:block>

</body>
</html>
