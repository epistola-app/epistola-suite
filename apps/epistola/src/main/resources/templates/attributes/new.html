<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        New Attribute create form. Same four-fragment dialog pattern as
        templates/themes; the constraint-kind radio script and pane styles live
        in `fields` so they run whether the form is rendered as a page or
        injected into the dialog (htmx executes <script> in swapped content).
    -->
    <th:block th:fragment="createDialog(catalogs)">
        <dialog id="create-attribute-dialog" class="ep-dialog ep-dialog-wide" data-create-dialog data-testid="create-attribute-dialog"
                hx-headers='{"X-Epistola-Error-Region": "dialog-error"}'>
            <div class="ep-dialog-header">
                <h3>New Attribute</h3>
            </div>
            <th:block th:replace="~{fragments/dialog :: generalError}"></th:block>
            <th:block th:replace="~{attributes/new :: createForm}"></th:block>
        </dialog>
    </th:block>

    <form th:fragment="createForm" id="create-attribute-form"
          th:hx-post="@{/tenants/{tenantId}/attributes(tenantId=${tenantId})}"
          hx-target="this" hx-swap="outerHTML" hx-boost="false">
        <div class="ep-dialog-body">
            <th:block th:replace="~{attributes/new :: fields}"></th:block>
        </div>
        <th:block th:replace="~{fragments/dialog :: dialogFooter('Create Attribute', 'create-form-submit')}"></th:block>
    </form>

    <th:block th:fragment="fields">
        <div th:if="${catalogs != null && !catalogs.isEmpty()}" class="form-group">
            <label class="ep-label" for="catalog">Catalog</label>
            <select id="catalog" name="catalog" class="ep-select">
                <option th:each="cat : ${catalogs}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${formData?.catalog == cat.id}"></option>
            </select>
        </div>
        <div class="form-group">
            <label class="ep-label" for="displayName">Display Name</label>
            <input type="text" id="displayName" name="displayName" class="ep-input"
                   required placeholder="Language" data-slug-source="slug"
                   th:value="${formData?.displayName}">
            <span class="form-error" id="attribute-error-displayName" th:attr="data-error=${errors?.containsKey('displayName')}" th:text="${errors?.get('displayName')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label" for="slug">Attribute ID (Slug)</label>
            <input type="text" id="slug" name="slug" class="ep-input"
                   required pattern="^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
                   minlength="3" maxlength="50"
                   placeholder="language"
                   th:value="${formData?.slug}">
            <span class="form-hint">3-50 characters, lowercase letters, numbers, and hyphens only</span>
            <span class="form-error" id="attribute-error-slug" th:attr="data-error=${errors?.containsKey('slug')}" th:text="${errors?.get('slug')}"></span>
        </div>
        <div class="form-group">
            <label class="ep-label">Value constraint</label>
            <div role="radiogroup" class="constraint-radio-group">
                <label>
                    <input type="radio" name="constraintKind" value="free"
                           th:checked="${formData?.constraintKind == null or formData?.constraintKind == 'free'}"
                           data-constraint-kind="free">
                    Free format &mdash; any value allowed
                </label>
                <label>
                    <input type="radio" name="constraintKind" value="inline"
                           th:checked="${formData?.constraintKind == 'inline'}"
                           data-constraint-kind="inline">
                    Inline values &mdash; listed below
                </label>
                <label>
                    <input type="radio" name="constraintKind" value="code-list"
                           th:checked="${formData?.constraintKind == 'code-list'}"
                           data-constraint-kind="code-list">
                    Bound to code list
                </label>
            </div>
        </div>
        <style>
            /* Local radio sizing: base.css applies `font: inherit` to all inputs,
               which makes browsers scale radio glyphs with the surrounding font-size.
               Pin radios to a 1rem square so they look right anywhere in this form. */
            .constraint-radio-group {
                display: flex;
                flex-direction: column;
                gap: var(--ep-space-2);
                margin-top: var(--ep-space-2);
            }
            .constraint-radio-group label {
                display: flex;
                align-items: center;
                gap: var(--ep-space-2);
                font-size: var(--ep-text-sm);
                cursor: pointer;
            }
            .constraint-radio-group input[type="radio"] {
                width: 1rem;
                height: 1rem;
                flex: 0 0 1rem;
                margin: 0;
                font-size: 1rem;
            }
        </style>

        <div class="form-group constraint-pane constraint-pane-inline"
             data-constraint-pane="inline" hidden>
            <label class="ep-label" for="allowedValues">Allowed values (one per line)</label>
            <textarea id="allowedValues" name="allowedValues" class="ep-textarea" rows="4"
                      placeholder="dutch&#10;english&#10;german"
                      th:text="${formData?.allowedValues}"></textarea>
            <span class="form-hint">Each line becomes one allowed value. Order does not matter.</span>
            <span class="form-error" id="attribute-error-allowedValues" th:attr="data-error=${errors?.containsKey('allowedValues')}" th:text="${errors?.get('allowedValues')}"></span>
        </div>

        <div class="form-group constraint-pane constraint-pane-code-list"
             data-constraint-pane="code-list" hidden>
            <label class="ep-label" for="codeList">Code list</label>
            <select id="codeList" name="codeList" class="ep-select">
                <option value="">&mdash; Select a code list &mdash;</option>
                <th:block th:each="cl : ${codeLists}">
                    <option th:value="${cl.catalogKey + '/' + cl.slug}"
                            th:text="${cl.catalogKey + ' / ' + cl.displayName}"
                            th:selected="${formData?.codeList == cl.catalogKey + '/' + cl.slug}"></option>
                </th:block>
            </select>
            <span class="form-hint">Variant values must match an entry of this code list. Hidden entries are still accepted.</span>
        </div>
        <script>
        (function () {
            var radios = document.querySelectorAll('input[name="constraintKind"]');
            var panes = document.querySelectorAll('[data-constraint-pane]');
            function refresh() {
                var selected = document.querySelector('input[name="constraintKind"]:checked');
                var kind = selected ? selected.value : 'free';
                panes.forEach(function (p) {
                    p.hidden = (p.getAttribute('data-constraint-pane') !== kind);
                });
            }
            radios.forEach(function (r) { r.addEventListener('change', refresh); });
            refresh();
        })();
        </script>
    </th:block>
</body>
</html>
