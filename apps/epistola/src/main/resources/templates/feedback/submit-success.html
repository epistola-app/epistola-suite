<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div class="ep-dialog-header">
            <h2>Feedback Submitted</h2>
            <button type="button" class="ep-btn ep-btn-ghost ep-btn-icon" onclick="this.closest('dialog').close()">
                <th:block th:replace="~{fragments/icon :: icon(name='x', class='ep-icon')}" />
            </button>
        </div>
        <div class="ep-dialog-body ep-text-center feedback-success-body">
            <div class="feedback-success-icon">
                <th:block th:replace="~{fragments/icon :: icon(name='check-circle', class='ep-icon ep-icon-xl')}" />
            </div>
            <p class="ep-font-medium ep-mb-2">Thank you for your feedback!</p>
            <p class="feedback-success-message">Your submission has been recorded and will be reviewed.</p>
        </div>
        <div class="ep-dialog-footer">
            <button type="button" class="ep-btn ep-btn-primary"
                    onclick="this.closest('dialog').close(); window.location.reload();">Done</button>
        </div>
    </th:block>
</body>
</html>
