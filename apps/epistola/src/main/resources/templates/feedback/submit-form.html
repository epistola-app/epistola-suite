<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div class="ep-dialog-header">
            <h2>Submit Feedback</h2>
            <button type="button" class="btn btn-ghost btn-icon" onclick="this.closest('dialog').close()">
                <th:block th:replace="~{fragments/icon :: icon(name='x', class='ep-icon')}" />
            </button>
        </div>

        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback(tenantId=${tenantId})}"
              hx-target="closest .feedback-dialog-content"
              hx-swap="innerHTML">

            <div class="ep-dialog-body" style="display: flex; flex-direction: column; gap: var(--ep-space-4);">
                <div class="form-group" th:classappend="${errors?.containsKey('title')} ? 'error' : ''">
                    <label class="ep-label" for="fb-title">Title</label>
                    <input type="text" id="fb-title" name="title" class="ep-input"
                           required placeholder="Brief summary of the issue"
                           th:value="${formData?.title}">
                    <span class="form-error" th:if="${errors?.containsKey('title')}" th:text="${errors.title}"></span>
                </div>

                <div style="display: flex; gap: var(--ep-space-3);">
                    <div class="form-group" style="flex: 1;" th:classappend="${errors?.containsKey('category')} ? 'error' : ''">
                        <label class="ep-label" for="fb-category">Category</label>
                        <select id="fb-category" name="category" class="ep-input" required>
                            <option value="" disabled selected>Select...</option>
                            <option th:each="c : ${categories}" th:value="${c.name()}"
                                    th:text="${c.name()}"
                                    th:selected="${formData?.category == c.name()}">CATEGORY</option>
                        </select>
                        <span class="form-error" th:if="${errors?.containsKey('category')}" th:text="${errors.category}"></span>
                    </div>

                    <div class="form-group" style="flex: 1;" th:classappend="${errors?.containsKey('priority')} ? 'error' : ''">
                        <label class="ep-label" for="fb-priority">Priority</label>
                        <select id="fb-priority" name="priority" class="ep-input" required>
                            <option th:each="p : ${priorities}" th:value="${p.name()}"
                                    th:text="${p.name()}"
                                    th:selected="${formData?.priority == p.name() || (formData == null && p.name() == 'MEDIUM')}">PRIORITY</option>
                        </select>
                        <span class="form-error" th:if="${errors?.containsKey('priority')}" th:text="${errors.priority}"></span>
                    </div>
                </div>

                <div class="form-group" th:classappend="${errors?.containsKey('description')} ? 'error' : ''">
                    <label class="ep-label" for="fb-description">Description</label>
                    <textarea id="fb-description" name="description" class="ep-input"
                              required rows="5"
                              placeholder="Describe the issue in detail..."
                              th:text="${formData?.description}"></textarea>
                    <span class="form-error" th:if="${errors?.containsKey('description')}" th:text="${errors.description}"></span>
                </div>

                <!-- Screenshot capture -->
                <div class="form-group">
                    <label class="ep-label">Screenshot (optional)</label>
                    <div id="fb-screenshot-zone"
                         style="border: 2px dashed var(--ep-border); border-radius: var(--ep-radius); padding: var(--ep-space-4); text-align: center; cursor: pointer; min-height: 80px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: var(--ep-space-2);"
                         onclick="document.getElementById('fb-screenshot-file').click()">
                        <div id="fb-screenshot-preview" style="display: none; width: 100%; max-height: 200px;">
                            <img id="fb-screenshot-img" style="max-width: 100%; max-height: 180px; border-radius: var(--ep-radius);" alt="Screenshot preview">
                            <button type="button" class="btn btn-ghost btn-sm" id="fb-screenshot-remove"
                                    style="margin-top: var(--ep-space-1);">Remove</button>
                        </div>
                        <div id="fb-screenshot-placeholder">
                            <th:block th:replace="~{fragments/icon :: icon(name='camera', class='ep-icon')}" />
                            <div style="color: var(--ep-muted-foreground); font-size: var(--ep-text-sm);">
                                Click to upload or paste (Ctrl+V) a screenshot
                            </div>
                        </div>
                    </div>
                    <input type="file" id="fb-screenshot-file" accept="image/png,image/jpeg,image/webp" style="display: none;">
                </div>

                <!-- Auto-captured fields (hidden) -->
                <input type="hidden" name="sourceUrl" id="fb-sourceUrl">
                <input type="hidden" name="consoleLogs" id="fb-consoleLogs">
                <input type="hidden" name="metadata" id="fb-metadata">
                <input type="hidden" name="screenshotData" id="fb-screenshotData">
            </div>

            <div class="ep-dialog-footer">
                <button type="button" class="btn btn-outline" onclick="this.closest('dialog').close()">Cancel</button>
                <button type="submit" class="btn btn-primary">Submit Feedback</button>
            </div>
        </form>

        <script th:inline="javascript">
            (function() {
                const appVersion = /*[[${appVersion}]]*/ 'dev';

                // Auto-capture URL
                const sourceUrlField = document.getElementById('fb-sourceUrl');
                if (sourceUrlField) {
                    sourceUrlField.value = window.location.href;
                }

                // Auto-capture console logs
                const consoleLogsField = document.getElementById('fb-consoleLogs');
                if (consoleLogsField && window.__epistola_console_buffer) {
                    consoleLogsField.value = JSON.stringify(window.__epistola_console_buffer.slice(-100));
                }

                // Auto-capture metadata
                const metadataField = document.getElementById('fb-metadata');
                if (metadataField) {
                    metadataField.value = JSON.stringify({
                        appVersion: appVersion,
                        userAgent: navigator.userAgent,
                        language: navigator.language,
                        platform: navigator.platform,
                        viewport: {
                            width: window.innerWidth,
                            height: window.innerHeight,
                        },
                        screen: {
                            width: screen.width,
                            height: screen.height,
                            pixelRatio: window.devicePixelRatio,
                        },
                        url: window.location.href,
                        timestamp: new Date().toISOString(),
                    });
                }

                // Screenshot handling
                const screenshotZone = document.getElementById('fb-screenshot-zone');
                const screenshotFile = document.getElementById('fb-screenshot-file');
                const screenshotData = document.getElementById('fb-screenshotData');
                const screenshotPreview = document.getElementById('fb-screenshot-preview');
                const screenshotImg = document.getElementById('fb-screenshot-img');
                const screenshotPlaceholder = document.getElementById('fb-screenshot-placeholder');
                const screenshotRemove = document.getElementById('fb-screenshot-remove');

                function setScreenshot(dataUrl) {
                    screenshotData.value = dataUrl;
                    screenshotImg.src = dataUrl;
                    screenshotPreview.style.display = 'block';
                    screenshotPlaceholder.style.display = 'none';
                }

                function clearScreenshot(e) {
                    if (e) { e.stopPropagation(); e.preventDefault(); }
                    screenshotData.value = '';
                    screenshotImg.src = '';
                    screenshotPreview.style.display = 'none';
                    screenshotPlaceholder.style.display = 'block';
                }

                function readFileAsDataUrl(file) {
                    if (!file || !file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = () => setScreenshot(reader.result);
                    reader.readAsDataURL(file);
                }

                // File input
                screenshotFile.addEventListener('change', () => {
                    readFileAsDataUrl(screenshotFile.files?.[0]);
                    screenshotFile.value = '';
                });

                // Remove button
                screenshotRemove.addEventListener('click', clearScreenshot);

                // Paste handler (Ctrl+V)
                document.addEventListener('paste', (e) => {
                    const items = e.clipboardData?.items;
                    if (!items) return;
                    for (const item of items) {
                        if (item.type.startsWith('image/')) {
                            e.preventDefault();
                            readFileAsDataUrl(item.getAsFile());
                            return;
                        }
                    }
                });

                // Drag and drop
                screenshotZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    screenshotZone.style.borderColor = 'var(--ep-primary)';
                });
                screenshotZone.addEventListener('dragleave', () => {
                    screenshotZone.style.borderColor = 'var(--ep-border)';
                });
                screenshotZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    screenshotZone.style.borderColor = 'var(--ep-border)';
                    readFileAsDataUrl(e.dataTransfer?.files?.[0]);
                });
            })();
        </script>
    </th:block>
</body>
</html>
