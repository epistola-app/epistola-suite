<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <nav class="breadcrumb">
            <a th:href="@{/tenants/{tenantId}/feedback(tenantId=${tenantId})}">Feedback</a>
            &raquo;
            <span th:text="${feedback.title}">Feedback Title</span>
        </nav>

        <div id="feedback-content">
            <th:block th:fragment="feedback-content">
                <div class="page-header">
                    <h1 th:text="${feedback.title}">Feedback Title</h1>
                    <div class="page-actions" th:if="${isAdmin}">
                        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback/{id}/status(tenantId=${tenantId},id=${feedback.id})}"
                              hx-target="#feedback-content"
                              hx-swap="innerHTML"
                              style="display: flex; gap: var(--ep-space-2); align-items: center;">
                            <select name="status" class="ep-input ep-input-sm" style="width: auto;">
                                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"
                                        th:selected="${feedback.status.name() == s.name()}">STATUS</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline">Update Status</button>
                        </form>
                    </div>
                </div>

                <div style="display: flex; gap: var(--ep-space-3); margin-bottom: var(--ep-space-6); flex-wrap: wrap;">
                    <span class="ep-badge"
                          th:classappend="${feedback.status.name() == 'OPEN'} ? 'ep-badge-info' : (${feedback.status.name() == 'IN_PROGRESS'} ? 'ep-badge-warning' : (${feedback.status.name() == 'RESOLVED'} ? 'ep-badge-success' : 'ep-badge-muted'))"
                          th:text="${feedback.status.name()}">OPEN</span>
                    <span class="ep-badge ep-badge-outline" th:text="${feedback.category.name()}">BUG</span>
                    <span class="ep-badge"
                          th:classappend="${feedback.priority.name() == 'CRITICAL'} ? 'ep-badge-destructive' : (${feedback.priority.name() == 'HIGH'} ? 'ep-badge-warning' : 'ep-badge-outline')"
                          th:text="${feedback.priority.name()}">MEDIUM</span>
                    <span style="color: var(--ep-muted-foreground); font-size: var(--ep-text-sm);"
                          th:text="'Submitted ' + ${#temporals.format(feedback.createdAt, 'yyyy-MM-dd HH:mm')}">Submitted 2026-01-01</span>
                </div>

                <!-- Description -->
                <div class="card" style="margin-bottom: var(--ep-space-6);">
                    <div class="card-content">
                        <h3 style="margin-bottom: var(--ep-space-3);">Description</h3>
                        <div style="white-space: pre-wrap;" th:text="${feedback.description}">Description text</div>
                    </div>
                </div>

                <!-- Source URL -->
                <div th:if="${feedback.sourceUrl != null}" class="card" style="margin-bottom: var(--ep-space-6);">
                    <div class="card-content">
                        <h3 style="margin-bottom: var(--ep-space-3);">Source URL</h3>
                        <code style="font-size: var(--ep-text-sm); word-break: break-all;" th:text="${feedback.sourceUrl}">https://example.com</code>
                    </div>
                </div>

                <!-- Screenshots -->
                <div th:if="${!#lists.isEmpty(assets)}" class="card" style="margin-bottom: var(--ep-space-6);">
                    <div class="card-content">
                        <h3 style="margin-bottom: var(--ep-space-3);" th:text="${#lists.size(assets) == 1} ? 'Screenshot' : 'Screenshots'">Screenshot</h3>
                        <div th:each="asset : ${assets}" style="margin-bottom: var(--ep-space-3);">
                            <img th:src="@{/tenants/{tenantId}/feedback/{feedbackId}/assets/{assetId}/content(tenantId=${tenantId},feedbackId=${feedback.id},assetId=${asset.id})}"
                                 alt="Feedback screenshot"
                                 style="max-width: 100%; border-radius: var(--ep-radius); border: 1px solid var(--ep-border);">
                        </div>
                    </div>
                </div>

                <!-- Client Metadata -->
                <div th:if="${feedback.metadata != null}" class="card" style="margin-bottom: var(--ep-space-6);">
                    <div class="card-content">
                        <h3 style="margin-bottom: var(--ep-space-3);">Client Information</h3>
                        <pre style="font-size: var(--ep-text-xs); max-height: 200px; overflow-y: auto; background: var(--ep-muted); padding: var(--ep-space-3); border-radius: var(--ep-radius);"
                             th:text="${feedback.metadata}">Metadata</pre>
                    </div>
                </div>

                <!-- Console Logs -->
                <div th:if="${feedback.consoleLogs != null}" class="card" style="margin-bottom: var(--ep-space-6);">
                    <div class="card-content">
                        <h3 style="margin-bottom: var(--ep-space-3);">Console Logs</h3>
                        <pre style="font-size: var(--ep-text-xs); max-height: 300px; overflow-y: auto; background: var(--ep-muted); padding: var(--ep-space-3); border-radius: var(--ep-radius);"
                             th:text="${feedback.consoleLogs}">Console output</pre>
                    </div>
                </div>

                <!-- Comments section -->
                <div id="comments-section">
                    <th:block th:fragment="comments-section">
                        <h3 style="margin-bottom: var(--ep-space-4);">
                            Comments
                            <span style="color: var(--ep-muted-foreground); font-weight: normal;"
                                  th:text="'(' + ${#lists.size(comments)} + ')'"></span>
                        </h3>

                        <div th:if="${#lists.isEmpty(comments)}" style="color: var(--ep-muted-foreground); margin-bottom: var(--ep-space-4);">
                            No comments yet.
                        </div>

                        <div th:each="comment : ${comments}" class="card" style="margin-bottom: var(--ep-space-3);">
                            <div class="card-content">
                                <div style="display: flex; justify-content: space-between; margin-bottom: var(--ep-space-2);">
                                    <span style="font-weight: 500;">
                                        <span th:text="${comment.authorName}">Author</span>
                                        <span th:if="${comment.source.name() == 'GITHUB'}" class="ep-badge ep-badge-outline" style="margin-left: var(--ep-space-2);">GitHub</span>
                                    </span>
                                    <span style="color: var(--ep-muted-foreground); font-size: var(--ep-text-sm);"
                                          th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
                                </div>
                                <div style="white-space: pre-wrap;" th:text="${comment.body}">Comment text</div>
                            </div>
                        </div>

                        <!-- Add comment form -->
                        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback/{id}/comments(tenantId=${tenantId},id=${feedback.id})}"
                              hx-target="#comments-section"
                              hx-swap="innerHTML"
                              style="margin-top: var(--ep-space-4);">
                            <div class="form-group">
                                <textarea name="body" class="ep-input" rows="3"
                                          required placeholder="Add a comment..."></textarea>
                            </div>
                            <div class="form-actions" style="margin-top: var(--ep-space-2);">
                                <button type="submit" class="btn btn-primary btn-sm">Add Comment</button>
                            </div>
                        </form>
                    </th:block>
                </div>
            </th:block>
        </div>
    </th:block>
</body>
</html>
