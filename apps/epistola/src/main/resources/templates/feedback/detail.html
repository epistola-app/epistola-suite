<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <nav class="breadcrumb">
            <a th:href="@{/tenants/{tenantId}/feedback(tenantId=${tenantId})}">Feedback</a>
            &raquo;
            <span th:text="${feedback.title}">Feedback Title</span>
        </nav>

        <div id="feedback-content">
            <th:block th:fragment="feedback-content">
                <div class="page-header">
                    <h1 th:text="${feedback.title}">Feedback Title</h1>
                    <div class="page-actions" th:if="${isManager}">
                        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback/{id}/status(tenantId=${tenantId},id=${feedback.id})}"
                              hx-target="#feedback-content"
                              hx-swap="innerHTML"
                              class="ep-flex-center ep-gap-2">
                            <select name="status" class="ep-input ep-input-sm ep-w-auto">
                                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"
                                        th:selected="${feedback.status.name() == s.name()}">STATUS</option>
                            </select>
                            <button type="submit" class="ep-btn ep-btn-outline ep-btn-sm">Update Status</button>
                        </form>
                    </div>
                </div>

                <div class="ep-flex ep-flex-wrap ep-gap-3 ep-mb-6">
                    <th:block th:insert="~{feedback/fragments/badges :: status-badge(${feedback.status})}" />
                    <th:block th:insert="~{feedback/fragments/badges :: category-badge(${feedback.category})}" />
                    <th:block th:insert="~{feedback/fragments/badges :: priority-badge(${feedback.priority})}" />
                    <span class="text-muted ep-text-sm"
                          th:text="'Submitted ' + ${#temporals.format(feedback.createdAt, 'yyyy-MM-dd HH:mm')}">Submitted 2026-01-01</span>
                </div>

                <!-- Description -->
                <div class="card ep-mb-6">
                    <div class="card-content">
                        <h3 class="ep-mb-3">Description</h3>
                        <div class="ep-whitespace-pre-wrap" th:text="${feedback.description}">Description text</div>
                    </div>
                </div>

                <!-- Source URL -->
                <div th:if="${feedback.sourceUrl != null}" class="card ep-mb-6">
                    <div class="card-content">
                        <h3 class="ep-mb-3">Source URL</h3>
                        <code class="ep-text-sm ep-word-break-all" th:text="${feedback.sourceUrl}">https://example.com</code>
                    </div>
                </div>

                <!-- Screenshots -->
                <div th:if="${!#lists.isEmpty(assets)}" class="card ep-mb-6">
                    <div class="card-content">
                        <h3 class="ep-mb-3" th:text="${#lists.size(assets) == 1} ? 'Screenshot' : 'Screenshots'">Screenshot</h3>
                        <div th:each="asset : ${assets}" class="ep-mb-3">
                            <img th:src="@{/tenants/{tenantId}/feedback/{feedbackId}/assets/{assetId}/content(tenantId=${tenantId},feedbackId=${feedback.id},assetId=${asset.id})}"
                                 alt="Feedback screenshot"
                                 class="feedback-screenshot-img">
                        </div>
                    </div>
                </div>

                <!-- Client Metadata -->
                <div th:if="${feedback.metadata != null}" class="card ep-mb-6">
                    <div class="card-content">
                        <h3 class="ep-mb-3">Client Information</h3>
                        <pre class="feedback-code-block feedback-code-block--short"
                             th:text="${feedback.metadata}">Metadata</pre>
                    </div>
                </div>

                <!-- Console Logs -->
                <div th:if="${feedback.consoleLogs != null}" class="card ep-mb-6">
                    <div class="card-content">
                        <h3 class="ep-mb-3">Console Logs</h3>
                        <pre class="feedback-code-block feedback-code-block--tall"
                             th:text="${feedback.consoleLogs}">Console output</pre>
                    </div>
                </div>

                <!-- Comments section -->
                <div id="comments-section">
                    <th:block th:fragment="comments-section">
                        <h3 class="ep-mb-4">
                            Comments
                            <span class="text-muted"
                                  th:text="'(' + ${#lists.size(comments)} + ')'"></span>
                        </h3>

                        <div th:if="${#lists.isEmpty(comments)}" class="text-muted ep-mb-4">
                            No comments yet.
                        </div>

                        <div th:each="comment : ${comments}" class="card ep-mb-3">
                            <div class="card-content">
                                <div class="ep-flex-between ep-mb-2">
                                    <span class="ep-font-medium">
                                        <span th:text="${comment.authorName}">Author</span>
                                        <span th:if="${comment.source.name() == 'GITHUB'}" class="ep-badge ep-badge-outline ep-ml-2">GitHub</span>
                                    </span>
                                    <span class="text-muted ep-text-sm"
                                          th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
                                </div>
                                <div class="ep-whitespace-pre-wrap" th:text="${comment.body}">Comment text</div>
                            </div>
                        </div>

                        <!-- Add comment form -->
                        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback/{id}/comments(tenantId=${tenantId},id=${feedback.id})}"
                              hx-target="#comments-section"
                              hx-swap="innerHTML"
                              class="ep-mt-4">
                            <div class="form-group">
                                <textarea name="body" class="ep-input" rows="3"
                                          required placeholder="Add a comment..."></textarea>
                            </div>
                            <div class="form-actions ep-mt-2">
                                <button type="submit" class="ep-btn ep-btn-primary ep-btn-sm">Add Comment</button>
                            </div>
                        </form>
                    </th:block>
                </div>
            </th:block>
        </div>
    </th:block>
</body>
</html>
