<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <nav class="breadcrumb">
            <a th:href="@{/tenants/{tenantId}/feedback(tenantId=${tenantId})}">Feedback</a>
            &raquo;
            <span th:text="${feedback.title}">Feedback Title</span>
        </nav>

        <div id="feedback-content">
            <th:block th:fragment="feedback-content">
                <section class="page-header">
                    <h1 th:text="${feedback.title}">Feedback Title</h1>
                    <div class="page-actions" th:if="${isManager}">
                        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback/{id}/status(tenantId=${tenantId},id=${feedback.id})}"
                              hx-target="#feedback-content"
                              hx-swap="innerHTML"
                              class="form-row form-row-center">
                            <select name="status" class="ep-select form-control-auto">
                                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"
                                        th:selected="${feedback.status.name() == s.name()}">STATUS</option>
                            </select>
                            <button type="submit" class="ep-btn ep-btn-outline">Update Status</button>
                        </form>
                    </div>
                </section>

                <section class="feedback-meta">
                    <th:block th:insert="~{feedback/fragments/badges :: status-badge(${feedback.status})}" />
                    <th:block th:insert="~{feedback/fragments/badges :: category-badge(${feedback.category})}" />
                    <th:block th:insert="~{feedback/fragments/badges :: priority-badge(${feedback.priority})}" />
                    <span class="feedback-date"
                          th:text="'Submitted ' + ${#temporals.format(feedback.createdAt, 'yyyy-MM-dd HH:mm')}">Submitted 2026-01-01</span>
                </section>

                <!-- Description -->
                <section class="card">
                    <div class="card-content">
                        <h3>Description</h3>
                        <div class="feedback-description" th:text="${feedback.description}">Description text</div>
                    </div>
                </section>

                <!-- Source URL -->
                <section th:if="${feedback.sourceUrl != null}" class="card">
                    <div class="card-content">
                        <h3>Source URL</h3>
                        <code class="ep-code feedback-url" th:text="${feedback.sourceUrl}">https://example.com</code>
                    </div>
                </section>

                <!-- Screenshots -->
                <section th:if="${!#lists.isEmpty(assets)}" class="card">
                    <div class="card-content">
                        <h3 th:text="${#lists.size(assets) == 1} ? 'Screenshot' : 'Screenshots'">Screenshot</h3>
                        <div th:each="asset : ${assets}" class="feedback-screenshot">
                            <img th:src="@{/tenants/{tenantId}/feedback/{feedbackId}/assets/{assetId}/content(tenantId=${tenantId},feedbackId=${feedback.id},assetId=${asset.id})}"
                                 alt="Feedback screenshot"
                                 class="feedback-screenshot-img">
                        </div>
                    </div>
                </section>

                <!-- Client Metadata -->
                <section th:if="${feedback.metadata != null}" class="card">
                    <div class="card-content">
                        <h3>Client Information</h3>
                        <pre class="feedback-code-block feedback-code-block--short"
                             th:text="${feedback.metadata}">Metadata</pre>
                    </div>
                </section>

                <!-- Console Logs -->
                <section th:if="${feedback.consoleLogs != null}" class="card">
                    <div class="card-content">
                        <h3>Console Logs</h3>
                        <pre class="feedback-code-block feedback-code-block--tall"
                             th:text="${feedback.consoleLogs}">Console output</pre>
                    </div>
                </section>

                <!-- Comments section -->
                <section id="comments-section">
                    <th:block th:fragment="comments-section">
                        <h3 class="comments-heading">
                            Comments
                            <span class="comment-count"
                                  th:text="'(' + ${#lists.size(comments)} + ')'"></span>
                        </h3>

                        <div th:if="${#lists.isEmpty(comments)}" class="feedback-no-comments">
                            No comments yet.
                        </div>

                        <div th:each="comment : ${comments}" class="card feedback-comment">
                            <div class="card-content">
                                <div class="comment-header">
                                    <span class="comment-author">
                                        <span th:text="${comment.authorName}">Author</span>
                                        <span th:if="${comment.source.name() == 'GITHUB'}" class="badge badge-outline">GitHub</span>
                                    </span>
                    <span class="comment-date"
                                          th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span>
                                </div>
                                <div class="comment-body" th:text="${comment.body}">Comment text</div>
                            </div>
                        </div>

                        <!-- Add comment form -->
                        <form hx-post th:hx-post="@{/tenants/{tenantId}/feedback/{id}/comments(tenantId=${tenantId},id=${feedback.id})}"
                              hx-target="#comments-section"
                              hx-swap="innerHTML"
                               class="comment-form">
                            <div class="form-group">
                                <textarea name="body" class="ep-textarea" rows="3"
                                          required placeholder="Add a comment..."></textarea>
                            </div>
                            <div class="comment-form-actions">
                                <button type="submit" class="ep-btn ep-btn-primary">Add Comment</button>
                            </div>
                        </form>
                    </th:block>
                </section>
            </th:block>
        </div>
    </th:block>
</body>
</html>
