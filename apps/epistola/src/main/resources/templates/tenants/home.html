<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="content">
        <div class="page-header">
            <div>
                <h1 th:text="${tenant.name}">Tenant Name</h1>
                <p class="subtitle" th:text="'ID: ' + ${tenant.id}">ID: tenant-id</p>
            </div>
        </div>

        <!-- What's New card (shown when there are unacknowledged changelog entries) -->
        <div th:if="${changelogEntries != null and !changelogEntries.isEmpty()}"
             id="whats-new-banner"
             class="whats-new-card">
            <div class="whats-new-header">
                <h2>
                    <th:block th:replace="~{fragments/icon :: icon(name='star', class='ep-icon')}" />
                    What's New
                </h2>
                <button type="button"
                        class="btn btn-ghost btn-sm"
                        th:hx-post="@{/changelog/acknowledge}"
                        hx-target="#whats-new-banner"
                        hx-swap="delete">
                    <th:block th:replace="~{fragments/icon :: icon(name='x', class='ep-icon')}" />
                    Dismiss
                </button>
            </div>
            <div class="whats-new-content changelog-content">
                <th:block th:each="entry : ${changelogEntries}">
                    <h3 th:text="'v' + ${entry.version} + ' — ' + ${entry.date}">v0.12.0 — 2026-04-04</h3>
                    <div th:utext="${entry.html}">Changelog content</div>
                </th:block>
            </div>
            <div class="whats-new-footer">
                <button type="button"
                        class="link-button"
                        onclick="document.getElementById('changelog-dialog').showModal()"
                        th:hx-get="@{/changelog}"
                        hx-target="#changelog-dialog-content"
                        hx-swap="innerHTML"
                        hx-trigger="click once">
                    View full changelog
                </button>
            </div>
        </div>

        <div class="dashboard-stats">
            <a th:href="@{/tenants/{id}/templates(id=${tenant.id})}" class="stat-card">
                <div class="stat-card-value" th:text="${templateCount}">0</div>
                <div class="stat-card-label">Templates</div>
            </a>
            <a th:href="@{/tenants/{id}/themes(id=${tenant.id})}" class="stat-card">
                <div class="stat-card-value" th:text="${themeCount}">0</div>
                <div class="stat-card-label">Themes</div>
            </a>
            <a th:href="@{/tenants/{id}/environments(id=${tenant.id})}" class="stat-card">
                <div class="stat-card-value" th:text="${environmentCount}">0</div>
                <div class="stat-card-label">Environments</div>
            </a>
            <a th:href="@{/tenants/{id}/load-tests(id=${tenant.id})}" class="stat-card">
                <div class="stat-card-value" th:text="${loadTestCount}">0</div>
                <div class="stat-card-label">Load Tests</div>
            </a>
        </div>

        <h2>Quick Actions</h2>
        <div class="quick-links">
            <a th:href="@{/tenants/{id}/templates/new(id=${tenant.id})}" class="btn btn-outline">
                <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                New Template
            </a>
            <a th:href="@{/tenants/{id}/themes/new(id=${tenant.id})}" class="btn btn-outline">
                <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                New Theme
            </a>
            <a th:href="@{/tenants/{id}/environments/new(id=${tenant.id})}" class="btn btn-outline">
                <th:block th:replace="~{fragments/icon :: icon(name='plus', class='ep-icon')}" />
                New Environment
            </a>
            <a th:href="@{/tenants/{id}/generate(id=${tenant.id})}" class="btn btn-outline">
                <th:block th:replace="~{fragments/icon :: icon(name='zap', class='ep-icon')}" />
                Generate Document
            </a>
        </div>
    </th:block>
</body>
</html>
