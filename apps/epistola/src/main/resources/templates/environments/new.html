<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
    The create-environment dialog. Rendered two ways off EnvironmentHandler:
      - `dialog` — swapped into #dialog-mount by the in-app trigger (hx-get), and
        embedded in the list page's #dialog-mount for direct navigation
        (openDialog=true); behaviors.js opens it (Chunk-1 mechanism).
      - `environment-form` — re-rendered on field errors (dialogFieldErrors
        retargets #create-environment-form), so the form swaps in place with
        inline errors and preserved values, leaving the <dialog> untouched.

    Model it needs: `tenantId` (URLs), and on error re-render `formData`/`errors`.
    -->
    <th:block th:fragment="dialog">
        <div th:replace="~{epistola-web/dialog :: dialog-shell(
            dialogId='create-environment-dialog',
            title='New Environment',
            closeUrl=@{/tenants/{tenantId}/environments(tenantId=${tenantId})},
            content=~{::environment-form})}"></div>
    </th:block>

    <form th:fragment="environment-form" id="create-environment-form"
          method="post" th:action="@{/tenants/{tenantId}/environments(tenantId=${tenantId})}"
          th:hx-post="@{/tenants/{tenantId}/environments(tenantId=${tenantId})}"
          hx-target="#environment-list" hx-swap="outerHTML">
        <div th:replace="~{epistola-web/form-error :: form-error(id='create-environment-error')}"></div>
        <div class="ep-dialog-body">
            <div class="form-group" th:classappend="${errors?.containsKey('name')} ? 'error' : ''">
                <label class="ep-label" for="name">Name</label>
                <input type="text" id="name" name="name" class="ep-input"
                       required maxlength="100" placeholder="Production" data-slug-source="slug"
                       th:value="${formData?.name}">
                <span class="form-error" th:if="${errors?.containsKey('name')}" th:text="${errors.name}"></span>
            </div>
            <div class="form-group" th:classappend="${errors?.containsKey('slug')} ? 'error' : ''">
                <label class="ep-label" for="slug">Environment ID (Slug)</label>
                <input type="text" id="slug" name="slug" class="ep-input"
                       required pattern="^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
                       minlength="3" maxlength="30"
                       placeholder="production"
                       th:value="${formData?.slug}">
                <span class="form-hint">3-30 characters, lowercase letters, numbers, and hyphens only</span>
                <span class="form-error" th:if="${errors?.containsKey('slug')}" th:text="${errors.slug}"></span>
            </div>
        </div>
        <div class="ep-dialog-footer">
            <button type="button" class="ep-btn ep-btn-ghost"
                    data-close-dialog="create-environment-dialog">Cancel</button>
            <button type="submit" class="ep-btn ep-btn-primary" data-testid="create-form-submit">Create Environment</button>
        </div>
    </form>
</body>
</html>
