<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!--
        New Environment create form. Mirrors templates/new and themes/new: a
        shared `fields` set feeds the full-page fallback (`content`), the dialog
        shell (`createDialog`), and the self-swapping `createForm` re-rendered on
        validation error.
    -->
    <th:block th:fragment="createDialog">
        <dialog id="create-environment-dialog" class="ep-dialog ep-dialog-wide" data-testid="create-environment-dialog">
            <div class="ep-dialog-header">
                <h3>New Environment</h3>
            </div>
            <th:block th:replace="~{environments/new :: createForm}"></th:block>
        </dialog>
    </th:block>

    <form th:fragment="createForm" id="create-environment-form"
          th:hx-post="@{/tenants/{tenantId}/environments(tenantId=${tenantId})}"
          hx-target="this" hx-swap="outerHTML" hx-boost="false">
        <div class="ep-dialog-body">
            <th:block th:replace="~{environments/new :: fields}"></th:block>
        </div>
        <div class="ep-dialog-footer">
            <button type="button" class="ep-btn ep-btn-ghost" data-dialog-close>Cancel</button>
            <button type="submit" class="ep-btn ep-btn-primary" data-testid="create-form-submit">Create Environment</button>
        </div>
    </form>

    <th:block th:fragment="fields">
        <div class="form-group" th:classappend="${errors?.containsKey('name')} ? 'error' : ''">
            <label class="ep-label" for="name">Name</label>
            <input type="text" id="name" name="name" class="ep-input"
                   required placeholder="Production" data-slug-source="slug"
                   th:value="${formData?.name}">
            <span class="form-error" th:if="${errors?.containsKey('name')}" th:text="${errors.name}"></span>
        </div>
        <div class="form-group" th:classappend="${errors?.containsKey('slug')} ? 'error' : ''">
            <label class="ep-label" for="slug">Environment ID (Slug)</label>
            <input type="text" id="slug" name="slug" class="ep-input"
                   required pattern="^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
                   minlength="3" maxlength="30"
                   placeholder="production"
                   th:value="${formData?.slug}">
            <span class="form-hint">3-30 characters, lowercase letters, numbers, and hyphens only</span>
            <span class="form-error" th:if="${errors?.containsKey('slug')}" th:text="${errors.slug}"></span>
        </div>
    </th:block>
</body>
</html>
