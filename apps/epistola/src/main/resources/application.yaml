server:
  port: 4000
  error:
    include-stacktrace: never
    include-message: never
    whitelabel:
      enabled: false
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024

spring:
  ai:
    mcp:
      server:
        # Bound to epistola.mcp.enabled so the whole MCP endpoint can be
        # toggled with one Epistola-flavoured property (matches our other
        # feature flags). Default-on; set epistola.mcp.enabled=false to
        # disable the /api/mcp endpoint and the Spring AI MCP server entirely.
        enabled: ${epistola.mcp.enabled:true}
        protocol: STREAMABLE
        type: SYNC
        name: epistola
        version: 1.0.0
        streamable-http:
          mcp-endpoint: /api/mcp
  application:
    name: epistola-suite
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    clean-disabled: false # Allow Flyway to clean (required for Flyway 10+)
    locations:
      - classpath:db/migration
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths: /css/**, /design-system/**, /js/**, /editor/**
      cache:
        cachecontrol:
          max-age: 365d
          cache-public: true
  threads:
    virtual:
      enabled: true
  session:
    timeout: 4h # Session timeout (frontend warns 5 min before expiry)
    jdbc:
      initialize-schema: never # Managed by Flyway

# Note: OAuth2 configuration is in application-prod.yaml
# Local development uses form login (see application-local.yaml)
# Tests use permit-all (see application-test.yaml)

epistola:
  migration:
    # Single migration knob (env: EPISTOLA_MIGRATION_MODE). One name, three
    # meanings — no overloaded tokens:
    #   embedded — app runs Flyway at boot (local/dev default, single-process).
    #   migrate  — the dedicated migration step: main() detects this env value
    #              pre-Spring and runs the isolated MigrationLauncher (set by
    #              the Helm Job / init container). Never an application.yaml
    #              default, so embedded can't accidentally trigger it.
    #   validate — never migrate/clean; only verify the schema is at head and
    #              fail fast if behind. Set on separated app pods (Helm
    #              job/initContainer modes, and the 'prod' profile).
    mode: embedded
  storage:
    backend: postgres
  auth:
    auto-provision: false
  demo:
    enabled: false # Opt-in: activate via 'demo' or 'local' profile
  mcp:
    # Server-wide toggle for the Model Context Protocol endpoint at /api/mcp.
    # When false, the whole Spring AI MCP server is disabled (see
    # spring.ai.mcp.server.enabled above) and the endpoint returns 404.
    enabled: true
  generation:
    polling:
      enabled: true # Enable polling-based job execution
      interval-ms: 5000 # Fallback poll interval (drain loop handles active work)
      max-concurrent-jobs: 20 # Max jobs per instance (10x parallelism)
      stale-timeout-minutes: 10 # Reclaim jobs after 10 min of no progress
      adaptive-batch:
        min-batch-size: 1 # Never go below 1 (backward compatible)
        max-batch-size: 50 # Claim more per poll for efficient draining
        fast-threshold-ms: 2000 # < 2s avg = increase batch size
        slow-threshold-ms: 5000 # > 5s avg = decrease batch size
    async:
      concurrency: 10 # Items processed concurrently per job
    jobs:
      retention-days: 7 # Auto-delete completed jobs after 7 days
      cleanup-cron: "0 0 2 * * ?" # Run cleanup at 2 AM daily
    documents:
      retention-days: 30 # Auto-delete documents after 30 days
      max-size-mb: 50 # Max document size

  # v0.3 generation result collection — see modules/epistola-core/.../generation/collect/
  collect:
    idle-timeout-ms: 60000 # Consumer node considered dead after this many ms of no polling
    # apiVersion (spec version echoed by /ping) is derived from the contract JAR's
    # Implementation-Version manifest entry — see GetServerInfoHandler. Don't add
    # it here as a property; the contract is the source of truth.

  # Phase 1 horizontal-scaling runtime. The node registry is intentionally small:
  # each replica heartbeats its identity and capabilities into Postgres so later
  # clustered timer events, durable processes, cache fanout, and renderer-node
  # capability routing have one source of cluster truth. A single deployment is
  # treated as a one-node cluster.
  cluster:
    heartbeat-interval-ms: 2000
    idle-timeout-ms: 10000
    capabilities:
      - suite

  # Postgres declarative-partitioning maintenance.
  # `retention-months` applies to documents + document_generation_requests.
  # `generation-results-retention-months` applies to generation_results — kept
  # separate because consumer-driven result rows have a much shorter useful
  # lifetime than the underlying request/document records.
  partitions:
    enabled: true
    retention-months: 3
    generation-results-retention-months: 1
    maintenance-cron: "0 0 2 * * ?" # daily at 02:00

  # Observability — installation-wide stat gauges (epistola.installation.*).
  # Every replica runs the schedule, but only the holder of a Postgres advisory
  # lock publishes the counts each round (the rest report NaN, which is omitted),
  # so there is exactly one live series across the fleet.
  metrics:
    installation-stats:
      enabled: true
      interval-ms: 60000

  # Feature toggles — global defaults (tenant-level overrides stored in DB)
  features:
    support-feedback: true
    stencil-parameters: true

  # Application-wide default locale used for date/number formatting.
  # Tenants may override this per tenant on /tenants/{tenantId}/settings;
  # valid values are entries of the bundled `system.bcp-47` code list.
  i18n:
    default-locale: "en-US"

  # Feedback sync scheduling. Feedback syncs to epistola-hub when the support
  # tier is enabled (epistola.support.enabled=true); otherwise these schedulers
  # run but do nothing (no-op sync target). Sync is installation-wide.
  feedback:
    sync:
      enabled: true # Enable the outbound retry scheduler
      retry-interval-ms: 60000 # Retry interval for failed pushes
      polling:
        enabled: false # Enable inbound polling (status/comment changes from the hub)
        interval-ms: 300000 # Poll interval (default 5 min)

  # Optional commercial support tier (epistola-hub integration).
  # OSS default: disabled. Enable to register the installation with the hub
  # for feedback sync, monitoring, quality checks, and version-compatibility
  # services. See modules/epistola-support.
  support:
    enabled: false
    hub:
      # Override the hub discovery URL for self-hosted deployments.
      # Blank → use the SaaS default baked into the hub client.
      discovery-url: ""
      # Override the per-pod node id. Blank → auto-detect from
      # EPISTOLA_NODE_ID / HOSTNAME / POD_NAME / local hostname.
      node-id: ""
    # Catalog backups — the daily retained-snapshot run. Per tenant, gated by the
    # `support-backups` feature toggle; snapshots reach the hub only when enabled above.
    backups:
      scheduled:
        enabled: false # Run the daily backup sweep
      cron: "0 0 2 * * *" # Daily at 02:00
    # Compatibility ("Upgrading") — keep a recent snapshot for the company-side check.
    # The sweep makes a snapshot only when none was synced (by backups or itself) within
    # max-age, so it stays dormant when the daily backup already keeps one fresh.
    upgrading:
      snapshot:
        scheduled:
          enabled: false # Run the freshness sweep
        cron: "0 0 * * * *" # Hourly
        max-age: 24h

  # Installation identity. Required when epistola.support.enabled=true;
  # ignored otherwise. Override per environment via
  # EPISTOLA_INSTALLATION_COMPANYNAME etc.
  installation:
    company-name: ""
    admin-email: ""
    environment: "" # e.g., "production", "staging"
    name: "" # blank → "${company-name} - ${environment}"
    description: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
        # Expose liveness/readiness ALSO at /livez and /readyz on the MAIN
        # application port. In production the actuator endpoints move to a
        # separate management port (see application-prod.yaml); Kubernetes
        # probes must stay on the main port because the management context can
        # report healthy even when the main app is not. Always-on (not just
        # prod) so the Helm probe paths work in every profile.
        add-additional-paths: true
      show-details: never
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    distribution:
      # Publish histogram buckets for latency timers so percentiles (p95/p99)
      # can be aggregated server-side ACROSS instances. Client-side percentiles
      # cannot be summed; histogram buckets can. Required for trustworthy
      # latency dashboards over a remote fleet.
      percentiles-histogram:
        http.server.requests: true
        epistola.generation.document.duration: true
        epistola.storage.operation.duration: true
        epistola.mediator.command.duration: true
        epistola.mediator.query.duration: true
        epistola.jobs.duration: true
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false
  logging:
    export:
      otlp:
        enabled: false
