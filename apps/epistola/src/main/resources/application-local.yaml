spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:4001/epistola
    username: epistola
    password: epistola

  flyway:
    clean-disabled: false

  batch:
    job:
      enabled: true # enabled for async document generation
  web:
    resources:
      static-locations:
        - file:modules/ # Serves design-system CSS from filesystem for live editing
        - classpath:/static/
      chain:
        strategy:
          content:
            enabled: false
      cache:
        cachecontrol:
          max-age: 0
  devtools:
    restart:
      enabled: true
      poll-interval: 2000ms
      quiet-period: 1000ms
  session:
    timeout: 1m # Longer session timeout for local development

management:
  otlp:
    metrics:
      export:
        enabled: false
  logging:
    export:
      otlp:
        enabled: false
  tracing:
    export:
      enabled: false

epistola:
  demo:
    enabled: true
  auth:
    auto-provision: false # Not needed for in-memory users
    local-users:
      - username: admin@local
        password: admin
        display-name: Local Admin
        tenant: demo
        roles:
          - READER
          - EDITOR
          - GENERATOR
          - MANAGER
        platform-roles:
          - TENANT_MANAGER
      - username: user@local
        password: user
        display-name: Local User
        tenant: demo
        roles:
          - READER
          - EDITOR
          - GENERATOR
  catalog:
    allow-http: true
  editor:
    dev-server:
      auto-start: true
