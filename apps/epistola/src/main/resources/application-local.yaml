spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:4001/epistola
    username: epistola
    password: epistola

  flyway:
    clean-disabled: false

  batch:
    job:
      enabled: true # enabled for async document generation
  web:
    resources:
      static-locations:
        - file:modules/ # Serves design-system CSS from filesystem for live editing
        - classpath:/static/
      chain:
        strategy:
          content:
            enabled: false
      cache:
        cachecontrol:
          max-age: 0
  devtools:
    restart:
      # Disabled to avoid the classpath-jar race: when a Gradle build rewrites
      # an upstream module's `build/libs/<module>-dev.jar` while the watcher is
      # mid-restart, the restart fails with `ZipException: invalid LOC header`
      # and the app dies. The other DevTools defaults (Thymeleaf cache off,
      # static resource cache off, LiveReload server) keep working without the
      # auto-restart watcher. For Kotlin/Java edits, stop the app and re-run
      # `./gradlew :apps:epistola:bootRun` — one consistent classpath, no race.
      enabled: false
      poll-interval: 2000ms
      quiet-period: 1000ms
  session:
    timeout: 1m # Longer session timeout for local development

epistola:
  demo:
    enabled: true
  auth:
    auto-provision: false # Not needed for in-memory users
    local-users:
      - username: admin@local
        password: admin
        display-name: Local Admin
        tenant: demo
        roles:
          - READER
          - EDITOR
          - GENERATOR
          - MANAGER
        platform-roles:
          - TENANT_MANAGER
      - username: user@local
        password: user
        display-name: Local User
        tenant: demo
        roles:
          - READER
          - EDITOR
          - GENERATOR
  catalog:
    allow-http: true
  editor:
    dev-server:
      auto-start: true
