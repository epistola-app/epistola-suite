spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:4001/epistola
    username: epistola
    password: epistola

  batch:
    job:
      enabled: true # enabled for async document generation
  web:
    resources:
      static-locations:
        - file:modules/ # Serves design-system CSS from filesystem for live editing
        - classpath:/static/
      chain:
        strategy:
          content:
            enabled: false
      cache:
        cachecontrol:
          max-age: 0
  devtools:
    restart:
      # Disabled to avoid the classpath-jar race: when a Gradle build rewrites
      # an upstream module's `build/libs/<module>-dev.jar` while the watcher is
      # mid-restart, the restart fails with `ZipException: invalid LOC header`
      # and the app dies. The other DevTools defaults (Thymeleaf cache off,
      # static resource cache off, LiveReload server) keep working without the
      # auto-restart watcher. For Kotlin/Java edits, stop the app and re-run
      # `./gradlew :apps:epistola:bootRun` — one consistent classpath, no race.
      enabled: false
      poll-interval: 2000ms
      quiet-period: 1000ms
  session:
    timeout: 1m # Longer session timeout for local development

epistola:
  demo:
    enabled: true

  # A FIXED local-dev encryption key (not the in-memory ephemeral fallback) so
  # credentials encrypted in your local DB survive app restarts. This is a
  # throwaway, non-secret dev key — same spirit as the admin/admin users below;
  # NEVER use it outside local development. Real environments inject keys from a
  # Secret via the Helm chart. See docs/encryption.md.
  encryption:
    primary-key-id: local-dev
    keys:
      - id: local-dev
        material: 3ILCfy3aRk48CuZ3Z/aWaOQS46/dq64jzl7DpG5Qn3o=
  auth:
    auto-provision: false # Not needed for in-memory users
    local-users:
      - username: admin@local
        password: admin
        display-name: Local Admin
        tenant: demo
        roles:
          - CONTENT_VIEWER
          - CONTENT_AUTHOR
          - DOCUMENT_GENERATOR
          - CONTENT_PUBLISHER
          - TENANT_ADMINISTRATOR
        platform-roles:
          - TENANT_MANAGER
      - username: user@local
        password: user
        display-name: Local User
        tenant: demo
        roles:
          - CONTENT_VIEWER
          - CONTENT_AUTHOR
          - DOCUMENT_GENERATOR
          - CONTENT_PUBLISHER
  catalog:
    allow-http: true
  editor:
    dev-server:
      auto-start: true

  # Support features (feedback/backups/upgrading) default ON here because support is enabled
  # below (their default follows `epistola.support.enabled`); the hub still gates the actual
  # operations via the entitlement. No per-feature toggle needed.

  # Identity reported to epistola-hub when support is enabled. Sensible
  # defaults so a developer can just flip `epistola.support.enabled=true`
  # on the command line without re-typing every required field.
  installation:
    company-name: Local Dev
    admin-email: dev@local
    environment: local

  # Support tier is ON by default for local dev so the Backups/Upgrading features
  # and the Support → Overview page are exercisable out of the box. It points
  # straight at the local epistola-hub gRPC port (9090, plaintext), skipping the
  # .well-known discovery dance. If the hub isn't running, registration retries in
  # the background and the Overview page shows the connection as not reachable —
  # so the suite runs fine without a hub. Set `--epistola.support.enabled=false`
  # to turn the tier off entirely.
  support:
    enabled: true
    hub:
      host: localhost
      port: 9090
      plaintext: true
