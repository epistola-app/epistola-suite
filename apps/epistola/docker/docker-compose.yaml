services:
  postgres:
    image: postgres:18
    container_name: epistola-postgres
    environment:
      POSTGRES_DB: epistola
      POSTGRES_USER: epistola
      POSTGRES_PASSWORD: epistola
    ports:
      - "4001:5432"
    tmpfs:
      - /var/lib/postgresql:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epistola"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: epistola-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro,z
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
